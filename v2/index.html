function drawProgressBar() {
  if(G.phase==='start') return;
  const prog = Math.min(1, G.levelTurns / G.turnsPerLevel);
  const barY = H - BOT_H - 5;
  const barH = 5;

  // Arka plan
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0, barY, W, barH);

  // Dolgu gradyanı
  if(prog > 0) {
    const fw = prog * W;
    const grad = ctx.createLinearGradient(0,barY,W,barY);
    if(prog < 0.5)      { grad.addColorStop(0,'#00d084'); grad.addColorStop(1,'#ffd700'); }
    else if(prog < 0.8) { grad.addColorStop(0,'#ffd700'); grad.addColorStop(1,'#ff9800'); }
    else                { grad.addColorStop(0,'#ff9800'); grad.addColorStop(1,'#ff3d5a'); }
    ctx.save();
    ctx.shadowColor = prog>0.8?'#ff3d5a':'#ffd700'; ctx.shadowBlur=8;
    ctx.fillStyle=grad; ctx.fillRect(0,barY,fw,barH);
    // Parlayan uç
    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.fillRect(Math.max(0,fw-3),barY,3,barH);
    ctx.restore();
  }

  // Bölüm tick işaretleri
  ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=1;
  for(let i=1;i<G.turnsPerLevel;i++) {
    const mx=(i/G.turnsPerLevel)*W;
    ctx.beginPath();ctx.moveTo(mx,barY);ctx.lineTo(mx,barY+barH);ctx.stroke();
  }

  // Skor çarpanı etiketi
  const mCol=G.scoreMultiplier>=2?'#00d084':G.scoreMultiplier>=1?'#ffd700':'#ff3d5a';
  ctx.save();
  ctx.shadowColor=mCol; ctx.shadowBlur=8;
  ctx.fillStyle=mCol; ctx.font='bold 11px Arial';
  ctx.textAlign='right'; ctx.textBaseline='bottom';
  ctx.fillText(`×${G.scoreMultiplier.toFixed(1)}`,W-6,barY-2);
  ctx.restore();
}

// ── Dragon head çizimi (referans görseldeki mavi/cyan karakter) ─────────────
function drawDragonHead(head, neck, ph, meta) {
  meta = meta || BOSS_META.dragon;
  const [mr,mg,mb] = hexToRgbArr(meta.c1);
  const [dr,dg,db] = hexToRgbArr(meta.c2);
  const hcx=head.x+BS/2, hcy=head.y+BS/2;
  const ncx=neck.x+BS/2, ncy=neck.y+BS/2;
  const angle=Math.atan2(hcy-ncy, hcx-ncx);
  const hs=BS*1.26;
  const hpR=head.hp/head.maxHp;
  // Breathing animation — subtle scale pulse
  const breathe = 0.97 + 0.06 * Math.sin(frame * 0.035);
  ctx.save();
  ctx.translate(hcx,hcy);
  ctx.rotate(angle);
  ctx.scale(breathe, breathe);
  const blendR=1-hpR;

  // ── Pulsing dark aura ─────────────────────────────────────
  ctx.save();
  const auraPulse = 0.6 + 0.4 * Math.sin(frame * 0.04);
  const auraR = hs * (0.72 + 0.12 * Math.sin(frame * 0.03));
  const auraG = ctx.createRadialGradient(0,0,hs*0.3,0,0,auraR);
  auraG.addColorStop(0, `rgba(${dr},${dg},${db},0)`);
  auraG.addColorStop(0.6, `rgba(${dr},${dg},${db},${0.15*auraPulse})`);
  auraG.addColorStop(1, `rgba(0,0,0,${0.25*auraPulse})`);
  ctx.fillStyle = auraG;
  ctx.beginPath();ctx.arc(0,0,auraR,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // ── Boyun birleşimi ──────────────────────────────────────
  ctx.save();
  ctx.shadowColor=meta.c1; ctx.shadowBlur=14+Math.sin(ph)*5;
  const neckG2=ctx.createLinearGradient(-hs*0.5,0,0,0);
  neckG2.addColorStop(0,`rgba(${Math.round(mr+blendR*(255-mr)*0.5)},${Math.round(mg-mg*blendR*0.6)},${Math.round(mb-mb*blendR*0.5)},0.9)`);
  neckG2.addColorStop(1,`rgba(${dr},${dg},${db},0)`);
  ctx.beginPath();ctx.ellipse(-hs*0.22,0,hs*0.32,hs*0.30,0,0,Math.PI*2);
  ctx.fillStyle=neckG2;ctx.fill();ctx.shadowBlur=0;ctx.restore();
  // ── Ana kafa şekli ────────────────────────────────────────
  ctx.save();
  ctx.shadowColor=meta.c1;ctx.shadowBlur=16+Math.sin(ph*0.9)*5;
  const hg=ctx.createRadialGradient(-hs*0.08,-hs*0.12,hs*0.04,hs*0.02,0,hs*0.62);
  hg.addColorStop(0,`rgb(${Math.min(255,mr+80)},${Math.min(255,mg+80)},${Math.min(255,mb+80)})`);
  hg.addColorStop(0.30,meta.c1);
  hg.addColorStop(0.65,`rgb(${Math.round(mr+blendR*(200-mr))},${Math.round(mg-mg*blendR*0.8)},${Math.round(mb-mb*blendR*0.8)})`);
  hg.addColorStop(1,meta.c2);
  ctx.beginPath();ctx.ellipse(hs*0.05,0,hs*0.52,hs*0.44,0,0,Math.PI*2);
  ctx.fillStyle=hg;ctx.fill();ctx.shadowBlur=0;ctx.restore();
  // ── Burun ─────────────────────────────────────────────────
  ctx.save();
  const sg=ctx.createRadialGradient(hs*0.42,hs*0.05,0,hs*0.42,hs*0.05,hs*0.22);
  sg.addColorStop(0,`rgb(${Math.min(255,mr+100)},${Math.min(255,mg+100)},${Math.min(255,mb+100)})`);
  sg.addColorStop(1,meta.c1);
  ctx.beginPath();ctx.ellipse(hs*0.42,hs*0.05,hs*0.18,hs*0.14,0.12,0,Math.PI*2);
  ctx.fillStyle=sg;ctx.fill();
  ctx.fillStyle=meta.c2;
  ctx.beginPath();ctx.arc(hs*0.465,hs*0.00,hs*0.022,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(hs*0.465,hs*0.12,hs*0.022,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // ── Jagged mouth with teeth ─────────────────────────────────
  ctx.save();
  const mouthY = hs*0.18;
  const mouthW = hs*0.3;
  const mouthH = hs*0.10 + Math.sin(frame*0.05)*hs*0.02;
  ctx.fillStyle = `rgba(${Math.max(0,dr-40)},0,0,0.9)`;
  ctx.beginPath();
  ctx.moveTo(hs*0.20, mouthY);
  ctx.lineTo(hs*0.20+mouthW, mouthY);
  ctx.lineTo(hs*0.20+mouthW, mouthY+mouthH);
  ctx.lineTo(hs*0.20, mouthY+mouthH);
  ctx.closePath(); ctx.fill();
  // Teeth (top)
  ctx.fillStyle = '#ffffffdd';
  const teethCount = 5;
  const toothW = mouthW / teethCount;
  for(let ti=0;ti<teethCount;ti++){
    const tx = hs*0.20 + ti*toothW;
    ctx.beginPath();
    ctx.moveTo(tx, mouthY);
    ctx.lineTo(tx+toothW*0.5, mouthY+mouthH*0.45);
    ctx.lineTo(tx+toothW, mouthY);
    ctx.closePath(); ctx.fill();
  }
  // Teeth (bottom)
  for(let ti=0;ti<teethCount-1;ti++){
    const tx = hs*0.20 + ti*toothW + toothW*0.5;
    ctx.beginPath();
    ctx.moveTo(tx, mouthY+mouthH);
    ctx.lineTo(tx+toothW*0.5, mouthY+mouthH-mouthH*0.35);
    ctx.lineTo(tx+toothW, mouthY+mouthH);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // ── Angry eyes that track nearest ball ──────────────────────
  // Find nearest active ball for eye tracking
  let ballTargetX = hcx + Math.cos(angle)*hs, ballTargetY = hcy + Math.sin(angle)*hs;
  if(G.activeBalls && G.activeBalls.length > 0) {
    let minDist = Infinity;
    for(const b of G.activeBalls) {
      if(b.done) continue;
      const d = Math.hypot(b.x-hcx, b.y-hcy);
      if(d < minDist) { minDist=d; ballTargetX=b.x; ballTargetY=b.y; }
    }
  }
  // Transform ball position into head's local coordinate space
  const cosA=Math.cos(-angle), sinA=Math.sin(-angle);
  const relBx=(ballTargetX-hcx)*cosA-(ballTargetY-hcy)*sinA;
  const relBy=(ballTargetX-hcx)*sinA+(ballTargetY-hcy)*cosA;
  // Eye positions (two angry eyes)
  const eyePositions = [
    {ex:hs*0.12, ey:-hs*0.18},  // top eye
    {ex:hs*0.12, ey:hs*0.02}    // bottom eye (second eye for menacing look)
  ];
  for(const ep of eyePositions) {
    const {ex,ey} = ep;
    // Eye socket (dark outline)
    ctx.fillStyle=meta.c2;
    ctx.beginPath();ctx.ellipse(ex,ey,hs*0.128,hs*0.108,-0.18,0,Math.PI*2);ctx.fill();
    // Eyeball white
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.ellipse(ex,ey,hs*0.097,hs*0.084,-0.18,0,Math.PI*2);ctx.fill();
    // Pupil tracks ball
    const lookAngle = Math.atan2(relBy-ey, relBx-ex);
    const lookDist = Math.min(hs*0.028, Math.hypot(relBx-ex, relBy-ey)*0.02);
    const pupilX = ex + Math.cos(lookAngle)*lookDist;
    const pupilY = ey + Math.sin(lookAngle)*lookDist;
    // Blink
    const blinkScale=Math.abs(Math.sin(ph*0.28+1.4))>0.94?0.18:1;
    ctx.save();ctx.scale(1,blinkScale);
    // Glowing red iris
    ctx.fillStyle='#ee1133';
    ctx.shadowColor='#ff0000';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(pupilX,pupilY/blinkScale,hs*0.058,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // Dark pupil slit (vertical for menacing look)
    ctx.fillStyle='#110022';
    ctx.beginPath();ctx.ellipse(pupilX+hs*0.004,pupilY/blinkScale,hs*0.015,hs*0.038,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Eye highlight
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.beginPath();ctx.arc(ex-hs*0.020,ey-hs*0.022,hs*0.020,0,Math.PI*2);ctx.fill();
    // Angry eyebrow
    ctx.strokeStyle=meta.c2;ctx.lineWidth=hs*0.032;ctx.lineCap='round';
    ctx.beginPath();
    const browDir = ey < 0 ? -1 : 1;
    ctx.moveTo(ex-hs*0.10,ey-hs*0.12+browDir*hs*0.02);
    ctx.lineTo(ex+hs*0.10,ey-hs*0.14);
    ctx.stroke();
  }

  // ── Horns/spikes on top ────────────────────────────────────
  ctx.save();
  for(let hi=0;hi<2;hi++){
    const side = hi===0?-1:1;
    const hornBaseX = hs*0.05 + side*hs*0.15;
    const hornBaseY = -hs*0.35;
    const hornTipX = hornBaseX + side*hs*0.12;
    const hornTipY = hornBaseY - hs*0.28;
    const hornG2=ctx.createLinearGradient(hornBaseX,hornBaseY,hornTipX,hornTipY);
    hornG2.addColorStop(0,`rgb(${Math.min(255,mr+120)},${Math.min(255,mg+120)},${Math.min(255,mb+120)})`);
    hornG2.addColorStop(0.7,meta.c2);
    hornG2.addColorStop(1,'#ffffff');
    ctx.fillStyle=hornG2;ctx.strokeStyle=`rgba(${dr},${dg},${db},0.6)`;ctx.lineWidth=hs*0.016;
    ctx.beginPath();
    ctx.moveTo(hornBaseX-hs*0.04, hornBaseY);
    const waveH = Math.sin(ph*1.2+hi*2)*hs*0.02;
    ctx.quadraticCurveTo(hornTipX+waveH, hornTipY, hornBaseX+hs*0.04, hornBaseY);
    ctx.closePath();ctx.fill();ctx.stroke();
  }
  ctx.restore();

  // ── Fin/taç (3 tüy) — meta.c1 tonu ──────────────────────
  ctx.save();
  for(let i=0;i<3;i++){
    const fx=-hs*0.20+i*hs*0.14;
    const finH=hs*(0.22+i*0.04);
    const waveOff=Math.sin(ph*1.1+i*0.9)*hs*0.022;
    const finG=ctx.createLinearGradient(fx,-hs*0.28,fx+waveOff,-hs*0.28-finH);
    finG.addColorStop(0,`rgb(${Math.min(255,mr+80)},${Math.min(255,mg+80)},${Math.min(255,mb+80)})`);
    finG.addColorStop(0.5,meta.c1);
    finG.addColorStop(1,meta.c2);
    ctx.fillStyle=finG;
    ctx.beginPath();
    ctx.moveTo(fx-hs*0.045,-hs*0.27);
    ctx.quadraticCurveTo(fx+waveOff,-hs*0.27-finH,fx+hs*0.045,-hs*0.27);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.beginPath();
    ctx.moveTo(fx-hs*0.016,-hs*0.28);
    ctx.quadraticCurveTo(fx+waveOff*0.5,-hs*0.28-finH*0.6,fx+hs*0.014,-hs*0.28);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();

  // ── Cam parlaması ──────────────────────────────────────────
  const shine=ctx.createRadialGradient(-hs*0.16,-hs*0.20,0,-hs*0.08,-hs*0.12,hs*0.42);
  shine.addColorStop(0,'rgba(255,255,255,0.45)');
  shine.addColorStop(0.42,'rgba(255,255,255,0.10)');
  shine.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.ellipse(hs*0.05,0,hs*0.52,hs*0.44,0,0,Math.PI*2);
  ctx.fillStyle=shine;ctx.fill();
  // ── Boss emojisi ────────────────────────────────────────────
  ctx.font=`${Math.floor(hs*0.36)}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#000';ctx.shadowBlur=6;
  ctx.fillText(meta.emoji, hs*0.06, 0);
  ctx.shadowBlur=0;
  // ── HP bar (per-segment, under head) ───────────────────────
  const bw=hs*0.9, barH=4, bx4=-bw/2, by4=hs*0.46;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(bx4,by4,bw,barH);
  const hpCol=hpR>0.55?'#22dd88':hpR>0.28?'#ffcc00':'#ff3d5a';
  ctx.shadowColor=hpCol;ctx.shadowBlur=5;ctx.fillStyle=hpCol;
  ctx.fillRect(bx4,by4,bw*hpR,barH);ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(7,Math.floor(hs*0.18))}px Arial`;
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.shadowColor='#000';ctx.shadowBlur=3;
  ctx.fillText(head.hp,0,by4+barH+1);ctx.shadowBlur=0;
  ctx.restore();
}

function drawCoin(coin) {
  const lifeR=coin.life/coin.maxLife;
  const pulse=1+Math.sin(coin.pulse)*0.12;
  // 3D spin: elips genişliği sin ile değişir
  const spinW=Math.abs(Math.cos(coin.spinAngle));
  const r=Math.max(5,BS*0.22)*pulse;
  ctx.save();
  ctx.globalAlpha=Math.min(1,lifeR*3.5);
  // Dış glow
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=12+Math.sin(coin.pulse)*4;
  // Altın degrade (3D spin için elips)
  const g=ctx.createRadialGradient(coin.x-r*0.28,coin.y-r*0.3,r*0.04,coin.x,coin.y,r);
  g.addColorStop(0,'#fff8aa');
  g.addColorStop(0.25,'#ffd700');
  g.addColorStop(0.65,'#cc8800');
  g.addColorStop(1,'#664400');
  ctx.beginPath();
  ctx.ellipse(coin.x,coin.y, r*(0.25+spinW*0.75), r, 0, 0, Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.shadowBlur=0;
  // Kenar çizgisi
  ctx.strokeStyle='rgba(255,220,50,0.7)'; ctx.lineWidth=1;
  ctx.stroke();
  // Ortadaki G harfi (sadece yeterince geniş görünüyorsa)
  if(spinW>0.4) {
    ctx.globalAlpha*=spinW;
    ctx.fillStyle='rgba(120,60,0,0.85)';
    ctx.font=`bold ${Math.max(6,Math.floor(r*1.1))}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('G', coin.x, coin.y+0.5);
  }
  // Değer baloncuğu (küçük)
  if(coin.value>=5) {
    ctx.globalAlpha=Math.min(1,lifeR*3.5)*0.9;
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=4;
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.beginPath(); ctx.arc(coin.x+r*0.7,coin.y-r*0.7,r*0.45,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd700'; ctx.font=`bold ${Math.max(5,Math.floor(r*0.6))}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(coin.value, coin.x+r*0.7, coin.y-r*0.7);
  }
  ctx.restore();
}

function drawCoins() {
  for(const c of G.coins) if(!c.collected) drawCoin(c);
}

function drawLuckyBox() {
  if(!G.luckyBox || G.luckyBox.collected) return;
  const lb = G.luckyBox;
  const x = lb.x, y = lb.y;
  const sz = 70; // daha büyük sandık
  const half = sz/2;
  const bob = Math.sin(lb.pulse)*4; // yukarı-aşağı salınım
  const cy = y + bob;
  ctx.save();

  if(lb.opened) {
    // ── Açılış animasyonu: ödül gösterimi ──────────────────────
    const t = Math.min(1, lb.openAnim/60);
    const reward = lb.reward;
    const tierColor = reward ? reward.tier.color : '#ffd700';

    // Arka plan parlama
    ctx.globalAlpha = (1 - t) * 0.6;
    const glow = ctx.createRadialGradient(x, cy, 0, x, cy, 120);
    glow.addColorStop(0, tierColor); glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(x-150, cy-150, 300, 300);

    // Sandık açılırken kapak kalkar
    if(t < 0.3) {
      const lidT = t / 0.3;
      ctx.globalAlpha = 1;
      // Gövde
      _drawChestBody(x, cy, sz);
      // Kapak açılıyor — yukarı kalkar
      ctx.save();
      ctx.translate(x - half, cy - half*0.55);
      ctx.rotate(-lidT * 1.2);
      ctx.translate(-(x - half), -(cy - half*0.55));
      _drawChestLid(x, cy, sz);
      ctx.restore();
    }

    // Ödül gösterimi (0.3 sonrası)
    if(t >= 0.2 && reward) {
      const showT = Math.min(1, (t - 0.2) / 0.6);
      ctx.globalAlpha = showT * (1 - Math.max(0, (t-0.85)/0.15));

      // Büyük arka panel
      const panW = Math.min(260, W*0.7), panH = 100;
      const panX = W/2 - panW/2, panY = H/2 - panH/2 - 20;
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      rrect(panX, panY, panW, panH, 16); ctx.fill();
      ctx.strokeStyle = tierColor; ctx.lineWidth = 2.5;
      ctx.shadowColor = tierColor; ctx.shadowBlur = 20;
      rrect(panX, panY, panW, panH, 16); ctx.stroke();
      ctx.shadowBlur = 0;

      // Tier başlık
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${Math.min(28, W*0.065)}px Arial`;
      ctx.fillStyle = tierColor;
      ctx.shadowColor = tierColor; ctx.shadowBlur = 12;
      ctx.fillText(reward.tier.label, W/2, panY + 30);
      ctx.shadowBlur = 0;

      // Altın miktarı
      ctx.font = `bold ${Math.min(22, W*0.05)}px Arial`;
      ctx.fillStyle = '#ffd700';
      let rewardLine = '+' + reward.gold + ' \uD83D\uDCB0';
      ctx.fillText(rewardLine, W/2, panY + 62);

      // Ball buff varsa
      if(reward.ballBuff) {
        const bt = typeof BALL_TYPES !== 'undefined' ? BALL_TYPES[reward.ballBuff.type] : null;
        if(bt) {
          ctx.font = `bold ${Math.min(16, W*0.038)}px Arial`;
          ctx.fillStyle = bt.glow || '#88ffcc';
          ctx.fillText(bt.emoji + ' ' + bt.name, W/2, panY + 86);
        }
      }

      // Kutlama partikülleri (sadece ilk birkaç frame)
      if(lb.openAnim >= 18 && lb.openAnim <= 22) {
        spawnParticles(W/2, H/2-30, tierColor, 8, true);
      }
    }

    ctx.restore();
    return;
  }

  // ── Kapalı sandık çizimi ──────────────────────────────────────

  // Altın glow zeminde
  const glowPulse = 0.5 + 0.5*Math.sin(lb.pulse*2);
  ctx.globalAlpha = 0.25 + glowPulse*0.2;
  const underGlow = ctx.createRadialGradient(x, cy+half+5, 0, x, cy+half+5, sz*0.8);
  underGlow.addColorStop(0, '#ffd700'); underGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = underGlow;
  ctx.fillRect(x-sz, cy+half-10, sz*2, sz*0.6);
  ctx.globalAlpha = 1;

  // Sparkle partiküller
  for(let i=0; i<5; i++) {
    const angle = lb.pulse*2 + i*Math.PI*2/5;
    const dist = sz*0.6 + Math.sin(lb.pulse*3+i)*8;
    const sx2 = x + Math.cos(angle)*dist;
    const sy2 = cy + Math.sin(angle)*dist*0.6 - 5;
    const sparkSz = 2 + Math.sin(lb.pulse*4+i*1.3)*1.5;
    ctx.globalAlpha = 0.4 + Math.sin(lb.pulse*3+i*2)*0.4;
    ctx.fillStyle = '#fffbe0';
    ctx.beginPath();
    // Yıldız şekli
    ctx.moveTo(sx2, sy2-sparkSz);
    ctx.lineTo(sx2+sparkSz*0.3, sy2-sparkSz*0.3);
    ctx.lineTo(sx2+sparkSz, sy2);
    ctx.lineTo(sx2+sparkSz*0.3, sy2+sparkSz*0.3);
    ctx.lineTo(sx2, sy2+sparkSz);
    ctx.lineTo(sx2-sparkSz*0.3, sy2+sparkSz*0.3);
    ctx.lineTo(sx2-sparkSz, sy2);
    ctx.lineTo(sx2-sparkSz*0.3, sy2-sparkSz*0.3);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Sandık gövdesi
  _drawChestBody(x, cy, sz);
  // Sandık kapağı
  _drawChestLid(x, cy, sz);

  // "TAP!" pulse
  const tp = 0.5+Math.sin(lb.pulse*2.5)*0.5;
  ctx.globalAlpha=tp;
  ctx.fillStyle='#ffffff'; ctx.font=`bold 13px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.shadowColor='#000'; ctx.shadowBlur=4;
  ctx.fillText('\u{1F449} DOKUN!', x, cy+half+10);
  ctx.shadowBlur=0;
  ctx.restore();
}

function _drawChestBody(x, cy, sz) {
  const half = sz/2;
  const bodyH = sz*0.55;
  const bodyY = cy - half*0.2;
  // Gövde — kahverengi/altın gradient
  const bodyGrad = ctx.createLinearGradient(x-half, bodyY, x-half, bodyY+bodyH);
  bodyGrad.addColorStop(0, '#c8851e'); bodyGrad.addColorStop(0.3, '#a06818');
  bodyGrad.addColorStop(0.7, '#8b5513'); bodyGrad.addColorStop(1, '#6b3e0e');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(x-half+4, bodyY);
  ctx.lineTo(x+half-4, bodyY);
  ctx.quadraticCurveTo(x+half, bodyY, x+half, bodyY+4);
  ctx.lineTo(x+half, bodyY+bodyH-4);
  ctx.quadraticCurveTo(x+half, bodyY+bodyH, x+half-4, bodyY+bodyH);
  ctx.lineTo(x-half+4, bodyY+bodyH);
  ctx.quadraticCurveTo(x-half, bodyY+bodyH, x-half, bodyY+bodyH-4);
  ctx.lineTo(x-half, bodyY+4);
  ctx.quadraticCurveTo(x-half, bodyY, x-half+4, bodyY);
  ctx.closePath(); ctx.fill();
  // Metal bantlar
  ctx.strokeStyle = '#d4a030'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(x-half+2, bodyY+bodyH*0.35);
  ctx.lineTo(x+half-2, bodyY+bodyH*0.35);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x-half+2, bodyY+bodyH*0.7);
  ctx.lineTo(x+half-2, bodyY+bodyH*0.7);
  ctx.stroke();
  // Dikey metal şerit (ortada)
  ctx.strokeStyle = '#d4a030'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, bodyY); ctx.lineTo(x, bodyY+bodyH);
  ctx.stroke();
  // Köşe süsleri
  ctx.fillStyle = '#e8b83a';
  for(const dx of [-1,1]) {
    for(const dy of [0,1]) {
      ctx.beginPath();
      ctx.arc(x + dx*(half-5), bodyY + dy*bodyH, 3.5, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function _drawChestLid(x, cy, sz) {
  const half = sz/2;
  const lidH = sz*0.38;
  const lidY = cy - half*0.2 - lidH + 4;
  // Kapak — kemerli üst
  const lidGrad = ctx.createLinearGradient(x-half, lidY, x-half, lidY+lidH);
  lidGrad.addColorStop(0, '#e8a020'); lidGrad.addColorStop(0.4, '#c8851e');
  lidGrad.addColorStop(1, '#a06818');
  ctx.fillStyle = lidGrad;
  ctx.beginPath();
  ctx.moveTo(x-half+2, lidY+lidH);
  ctx.lineTo(x-half+2, lidY+lidH*0.4);
  ctx.quadraticCurveTo(x-half+2, lidY-2, x, lidY-6);
  ctx.quadraticCurveTo(x+half-2, lidY-2, x+half-2, lidY+lidH*0.4);
  ctx.lineTo(x+half-2, lidY+lidH);
  ctx.closePath(); ctx.fill();
  // Kapak metal bant
  ctx.strokeStyle = '#d4a030'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x-half+4, lidY+lidH*0.6);
  ctx.lineTo(x+half-4, lidY+lidH*0.6);
  ctx.stroke();
  // Altın kilit / mandal — ortada
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(x, lidY+lidH-2, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#b8860b';
  ctx.beginPath();
  ctx.moveTo(x-2.5, lidY+lidH-2);
  ctx.lineTo(x+2.5, lidY+lidH-2);
  ctx.lineTo(x+2.5, lidY+lidH+5);
  ctx.lineTo(x-2.5, lidY+lidH+5);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
}

function drawBossElements() {
  if(!G.bossActive||!G.boss) return;
  const boss=G.boss;
  const ph=frame*0.055;
  const aliveSegs=boss.segments.filter(s=>!s._dead&&s.hp>0);
  // Helper: get display coords (smooth) for a segment
  function sx(s){ return (s.displayX !== undefined ? s.displayX : s.x) + BS/2; }
  function sy(s){ return (s.displayY !== undefined ? s.displayY : s.y) + BS/2; }
  // ── Boss tipi renkleri ─────────────────────────────────────
  const meta = BOSS_META[boss.type] || BOSS_META.dragon;
  const [mr,mg,mb] = hexToRgbArr(meta.c1);
  const [dr,dg,db] = hexToRgbArr(meta.c2);
  const [pr,pg,pb] = hexToRgbArr(meta.particle);

  if(aliveSegs.length >= 2) {
    // ── Bezier connections between segments — dark outline ──────
    ctx.save();
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.shadowColor=meta.c2;ctx.shadowBlur=10;
    for(let i=0;i<aliveSegs.length-1;i++){
      const a=aliveSegs[i], b=aliveSegs[i+1];
      const ax=sx(a),ay=sy(a),bxx=sx(b),byy=sy(b);
      const midX=(ax+bxx)/2, midY=(ay+byy)/2;
      // Taper width: thicker near head, thinner toward tail
      const widthRatio = 1 - (i / aliveSegs.length) * 0.5;
      ctx.lineWidth = BS * 0.82 * widthRatio;
      ctx.strokeStyle=`rgba(${dr},${dg},${db},0.88)`;
      ctx.beginPath(); ctx.moveTo(ax,ay);
      // Use quadratic bezier with perpendicular offset for smooth curve
      const cpOff = Math.sin(ph*0.7 + i*0.8) * BS * 0.12;
      const perpX = -(byy-ay), perpY = (bxx-ax);
      const pLen = Math.hypot(perpX,perpY)||1;
      ctx.quadraticCurveTo(midX + perpX/pLen*cpOff, midY + perpY/pLen*cpOff, bxx, byy);
      ctx.stroke();
    }
    ctx.restore();

    // ── Bezier connections — main color gradient ────────────────
    ctx.save();
    ctx.lineCap='round';ctx.lineJoin='round';
    const hpRatioAvg=aliveSegs.reduce((a,s)=>a+s.hp/s.maxHp,0)/aliveSegs.length;
    const dmg=1-hpRatioAvg;
    ctx.shadowColor=meta.c1;ctx.shadowBlur=6;
    for(let i=0;i<aliveSegs.length-1;i++){
      const a=aliveSegs[i], b=aliveSegs[i+1];
      const ax=sx(a),ay=sy(a),bxx=sx(b),byy=sy(b);
      const midX=(ax+bxx)/2, midY=(ay+byy)/2;
      const widthRatio = 1 - (i / aliveSegs.length) * 0.5;
      ctx.lineWidth = BS * 0.65 * widthRatio;
      const segG=ctx.createLinearGradient(ax,ay,bxx,byy);
      const r1=Math.round(mr+dmg*(220-mr)), g1=Math.round(mg-mg*dmg*0.7), b1=Math.round(mb-mb*dmg*0.7);
      segG.addColorStop(0,`rgb(${r1},${g1},${b1})`);
      segG.addColorStop(1,meta.c1);
      ctx.strokeStyle=segG;
      ctx.beginPath(); ctx.moveTo(ax,ay);
      const cpOff = Math.sin(ph*0.7 + i*0.8) * BS * 0.12;
      const perpX = -(byy-ay), perpY = (bxx-ax);
      const pLen = Math.hypot(perpX,perpY)||1;
      ctx.quadraticCurveTo(midX + perpX/pLen*cpOff, midY + perpY/pLen*cpOff, bxx, byy);
      ctx.stroke();
    }
    ctx.restore();

    // ── Body segment circles with armor texture ───────────────
    ctx.save();ctx.shadowBlur=0;
    for(let i=1;i<aliveSegs.length;i++){
      const seg=aliveSegs[i];
      if(seg._dead) continue;
      const prev=aliveSegs[i-1], next=aliveSegs[Math.min(i+1,aliveSegs.length-1)];
      const dxx=sx(next)-sx(prev), dyy=sy(next)-sy(prev);
      const segAngle=Math.atan2(dyy,dxx);
      const scx=sx(seg), scy=sy(seg);
      const segR = BS*0.38;
      // Idle wobble
      const wobble = Math.sin(frame * 0.06 + i * 0.9) * BS * 0.02;
      ctx.save();
      ctx.translate(scx + wobble, scy);
      ctx.rotate(segAngle);
      // Gradient body circle
      const bodyGrad = ctx.createRadialGradient(-segR*0.2,-segR*0.2,0,0,0,segR);
      const bv=i%3===0?1.3:i%3===1?1.15:1.0;
      bodyGrad.addColorStop(0,`rgb(${Math.min(255,Math.round(mr*bv+80))},${Math.min(255,Math.round(mg*bv+80))},${Math.min(255,Math.round(mb*bv+80))})`);
      bodyGrad.addColorStop(0.6,meta.c1);
      bodyGrad.addColorStop(1,meta.c2);
      ctx.fillStyle=bodyGrad;
      ctx.beginPath();ctx.arc(0,0,segR,0,Math.PI*2);ctx.fill();
      // Armor-like scale arcs
      ctx.strokeStyle=`rgba(${dr},${dg},${db},0.4)`;ctx.lineWidth=1;
      for(let a=0;a<3;a++){
        const arcOff = (a-1)*segR*0.35;
        ctx.beginPath();ctx.arc(arcOff, 0, segR*0.5, Math.PI*0.8, Math.PI*1.2);ctx.stroke();
      }
      // Belly highlight
      ctx.fillStyle=`rgb(${Math.min(255,Math.round(mr*bv+60))},${Math.min(255,Math.round(mg*bv+60))},${Math.min(255,Math.round(mb*bv+60))})`;
      ctx.beginPath();ctx.ellipse(0,segR*0.15,segR*0.7,segR*0.4,0,0,Math.PI*2);ctx.fill();
      // Shine highlight
      ctx.fillStyle='rgba(255,255,255,0.22)';
      ctx.beginPath();ctx.ellipse(-segR*0.2,-segR*0.2,segR*0.3,segR*0.2,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    ctx.restore();

    // ── Kuyruk alevi (pembe/magenta) ─────────────────────────
    const tail=aliveSegs[aliveSegs.length-1];
    const preTail=aliveSegs[aliveSegs.length-2];
    const tdx=sx(tail)-sx(preTail), tdy=sy(tail)-sy(preTail);
    const tAngle=Math.atan2(tdy,tdx);
    ctx.save();
    ctx.translate(sx(tail),sy(tail));
    ctx.rotate(tAngle+Math.PI);
    const flm=BS*0.72*(0.78+Math.sin(ph*2.4)*0.22);
    ctx.shadowColor=meta.particle;ctx.shadowBlur=18+Math.sin(ph*2.8)*7;
    const fG=ctx.createRadialGradient(0,-flm*0.3,flm*0.05,0,0,flm);
    fG.addColorStop(0,'rgba(255,255,255,0.95)');
    fG.addColorStop(0.25,`rgba(${pr},${pg},${pb},0.88)`);
    fG.addColorStop(0.6,`rgba(${dr},${dg},${db},0.55)`);
    fG.addColorStop(1,`rgba(${dr},${dg},${db},0)`);
    ctx.beginPath();
    ctx.moveTo(-flm*0.22,0);
    ctx.quadraticCurveTo(-flm*0.35,-flm*0.5+Math.sin(ph*3)*flm*0.08,0,-flm);
    ctx.quadraticCurveTo(flm*0.35,-flm*0.5+Math.sin(ph*3+1)*flm*0.08,flm*0.22,0);
    ctx.closePath();ctx.fillStyle=fG;ctx.fill();
    ctx.shadowBlur=0;
    const fG2=ctx.createRadialGradient(0,-flm*0.22,0,0,-flm*0.22,flm*0.32);
    fG2.addColorStop(0,'rgba(255,255,255,0.9)');
    fG2.addColorStop(1,`rgba(${pr},${pg},${pb},0)`);
    ctx.fillStyle=fG2;ctx.fill();ctx.restore();
  }

  // ── Baş çizimi (her şeyin üstüne) ─────────────────────────
  if(aliveSegs.length>=1) {
    const head=aliveSegs[0], neck=aliveSegs[1]||aliveSegs[0];
    // Pass display coords to head drawing
    const headDraw = { ...head, x: (head.displayX !== undefined ? head.displayX : head.x), y: (head.displayY !== undefined ? head.displayY : head.y) };
    const neckDraw = { ...neck, x: (neck.displayX !== undefined ? neck.displayX : neck.x), y: (neck.displayY !== undefined ? neck.displayY : neck.y) };
    drawDragonHead(headDraw,neckDraw,ph,meta);
  }

  // ── Boss name floating above head ──────────────────────────
  if(aliveSegs.length>=1) {
    const head=aliveSegs[0];
    const hx = sx(head), hy = sy(head);
    const bossName = SAVE.customBossName || meta.name;
    const bobY = Math.sin(frame * 0.04) * 4;
    ctx.save();
    ctx.font = 'bold 15px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.strokeStyle = 'rgba(0,0,0,0.85)'; ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    const nameY = hy - BS*0.9 + bobY;
    ctx.strokeText(bossName, hx, nameY);
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = meta.c1; ctx.shadowBlur = 6;
    ctx.fillText(bossName, hx, nameY);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Draw towers
  for(let ti=0;ti<boss.towers.length;ti++) {
    const tw=boss.towers[ti];
    if(tw._dead||tw.hp<=0) continue;
    const sx=tw.shake>0?(Math.random()-0.5)*4:0;
    const sy=tw.shake>0?(Math.random()-0.5)*4:0;
    const x=tw.x+sx, y=tw.y+sy, s=BS;
    const hpR=tw.hp/tw.maxHp;
    ctx.save();
    // PNG kule sprite'ı — sol kule=buz, sağ kule=top, ortada olursa=karanlık
    const towerSprites=['tower_ice','tower_cannon','tower_dark'];
    const sp=SPRITES[towerSprites[ti%3]];
    if(sp){
      const bright=70+Math.round(hpR*60);
      ctx.shadowColor=ti===0?'#44ccff':ti===1?'#ff8800':'#aa44ff';
      ctx.shadowBlur=14+Math.sin(frame*0.1)*4;
      ctx.filter=`brightness(${bright}%)`;
      // Kule sprite 512×1024 (1:2 oran) — düzgün uzun kule
      const tw=s*0.80, th=s*1.60;
      ctx.drawImage(sp, x+(s-tw)/2, y-th+s+4, tw, th);
      ctx.filter='none'; ctx.shadowBlur=0;
    } else {
      ctx.shadowColor='#8866ff'; ctx.shadowBlur=10+Math.sin(frame*0.12)*3;
      const g=ctx.createLinearGradient(x,y,x,y+s);
      g.addColorStop(0,'#9955ff');g.addColorStop(0.5,'#6633cc');g.addColorStop(1,'#220066');
      rrect(x,y,s,s,Math.max(5,s*0.2)); ctx.fillStyle=g; ctx.fill(); ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(200,150,255,0.6)'; ctx.lineWidth=1.5; ctx.stroke();
    }
    // HP bar
    const bw=s-4, bh=4;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(x+2,y+s-8,bw,bh);
    ctx.fillStyle=hpR>0.5?'#8866ff':'#ff44aa';
    ctx.fillRect(x+2,y+s-8,bw*hpR,bh);
    // HP sayısı
    ctx.fillStyle='#fff'; ctx.font=`bold ${Math.max(7,Math.min(12,s*0.35))}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#000'; ctx.shadowBlur=3;
    ctx.fillText(tw.hp,x+s/2,y+s*0.88);
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // Draw black holes — improved visuals
  for(const bh of boss.blackHoles) {
    if(!bh.active) continue;
    const r=BS*0.58, pulse=1+Math.sin(bh.pulse)*0.18;
    ctx.save();

    // Outer pulsating accretion disk rings
    for(let ring=3;ring>=0;ring--) {
      const ringR = r*pulse*(1.8 + ring*0.35);
      const alpha = 0.18 - ring*0.03;
      const hue = 260 + ring*15 + Math.sin(bh.pulse+ring)*10;
      ctx.beginPath();ctx.arc(bh.x,bh.y,ringR,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${hue},80%,55%,${alpha})`; ctx.lineWidth=2.5; ctx.stroke();
    }

    // Swirling accretion disk (purple/blue gradient)
    ctx.shadowColor='#7b2fff'; ctx.shadowBlur=28;
    const diskR = r*pulse*1.4;
    const diskGrad=ctx.createRadialGradient(bh.x,bh.y,r*0.3,bh.x,bh.y,diskR);
    diskGrad.addColorStop(0,'rgba(20,0,50,0.95)');
    diskGrad.addColorStop(0.3,'rgba(90,20,180,0.7)');
    diskGrad.addColorStop(0.55,'rgba(40,80,220,0.5)');
    diskGrad.addColorStop(0.8,'rgba(120,40,200,0.25)');
    diskGrad.addColorStop(1,'rgba(60,20,140,0)');
    ctx.beginPath();ctx.arc(bh.x,bh.y,diskR,0,Math.PI*2);
    ctx.fillStyle=diskGrad; ctx.fill();

    // Swirl arms (rotating)
    ctx.shadowBlur=0;
    for(let i=0;i<6;i++) {
      const a=bh.pulse*1.5+i*Math.PI/3;
      const armGrad = ctx.createLinearGradient(
        bh.x+Math.cos(a)*r*0.3, bh.y+Math.sin(a)*r*0.3,
        bh.x+Math.cos(a+0.8)*diskR, bh.y+Math.sin(a+0.8)*diskR);
      armGrad.addColorStop(0,'rgba(140,60,255,0.6)');
      armGrad.addColorStop(1,'rgba(40,100,255,0)');
      ctx.strokeStyle=armGrad; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(bh.x,bh.y,r*0.6+i*3,a,a+Math.PI*0.5);ctx.stroke();
    }

    // Dark center (event horizon)
    ctx.shadowColor='#000'; ctx.shadowBlur=18;
    const centerGrad=ctx.createRadialGradient(bh.x,bh.y,0,bh.x,bh.y,r*0.55);
    centerGrad.addColorStop(0,'rgba(0,0,0,1)');
    centerGrad.addColorStop(0.6,'rgba(10,0,30,0.95)');
    centerGrad.addColorStop(1,'rgba(30,0,60,0)');
    ctx.beginPath();ctx.arc(bh.x,bh.y,r*0.55,0,Math.PI*2);
    ctx.fillStyle=centerGrad; ctx.fill();

    // Orbit trail
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(120,40,200,0.18)'; ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(bh.centerX,bh.centerY,bh.orbitR,0,Math.PI*2);ctx.stroke();

    // Center emoji
    ctx.font=`${Math.floor(r*0.7)}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('\uD83D\uDD73\uFE0F',bh.x,bh.y);

    // "KARA DELİK" label
    ctx.font=`bold ${Math.floor(r*0.38)}px sans-serif`;
    ctx.fillStyle='rgba(200,150,255,0.85)';
    ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillText('KARA DEL\u0130K',bh.x,bh.y+r*1.1);
    ctx.shadowBlur=0;

    ctx.restore();
  }

  // Kule mermileri (towerShots)
  for(const sh of boss.towerShots) {
    if(sh.life<=0) continue;
    const lifeR = sh.life/sh.maxLife;
    ctx.save();
    ctx.globalAlpha = Math.min(1, lifeR*2);
    // Mermi glow
    ctx.shadowColor=meta.particle; ctx.shadowBlur=12;
    const sg=ctx.createRadialGradient(sh.x,sh.y,0,sh.x,sh.y,sh.r);
    sg.addColorStop(0,'#ffffff');
    sg.addColorStop(0.35,`rgb(${Math.min(255,pr+80)},${Math.min(255,pg+80)},${Math.min(255,pb+80)})`);
    sg.addColorStop(0.7,meta.c1);
    sg.addColorStop(1,`rgba(${dr},${dg},${db},0)`);
    ctx.beginPath();ctx.arc(sh.x,sh.y,sh.r*1.4,0,Math.PI*2);
    ctx.fillStyle=sg; ctx.fill();
    // Mermi izi
    ctx.shadowBlur=0; ctx.strokeStyle=`rgba(${mr},${mg},${mb},0.45)`; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(sh.x,sh.y);
    ctx.lineTo(sh.x-sh.vx*5,sh.y-sh.vy*5);
    ctx.stroke();
    ctx.restore();
  }

  // ── Mechanic-specific visuals ────────────────────────────────
  const mech2 = boss.mechanic;

  // LAZER uyarısı / ateş
  if(mech2 === 'lazer' && boss.lazerActive && (boss.lazerTimer||0) > 0) {
    boss.lazerTimer--;
    const charged = 1 - boss.lazerTimer/90;
    const rowY = by(boss.lazerRow||2) + BS/2;
    ctx.save();
    if(charged < 0.8) {
      ctx.globalAlpha = charged * 0.6;
      ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 4;
      ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 10;
      ctx.setLineDash([8,8]);
      ctx.beginPath(); ctx.moveTo(0, rowY); ctx.lineTo(W, rowY); ctx.stroke();
      ctx.setLineDash([]);
    } else {
      ctx.globalAlpha = Math.min(1, (charged-0.8)/0.2 * 2);
      ctx.fillStyle = 'rgba(255,40,40,0.4)';
      ctx.fillRect(0, rowY-8, W, 16);
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
      ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 20;
      ctx.beginPath(); ctx.moveTo(0,rowY); ctx.lineTo(W,rowY); ctx.stroke();
      // Kill balls on this row
      if(G.activeBalls) {
        for(const ab of G.activeBalls) {
          if(!ab.done && Math.abs(ab.y - rowY) < 14) ab.done = true;
        }
      }
    }
    if(boss.lazerTimer <= 0) boss.lazerActive = false;
    ctx.restore();
  }

  // KABARCIK kalkanları
  if(mech2 === 'kabarcik' && boss.bubbles) {
    const bcV = getBossCenter() || boss.bubbleCenter;
    if(bcV) {
      const bRV = BS * 0.85;
      ctx.save();
      for(const bub of boss.bubbles) {
        if(!bub.alive) continue;
        const bx5 = bcV.x + Math.cos(bub.angle) * bRV;
        const by5 = bcV.y + Math.sin(bub.angle) * bRV;
        const grV = ctx.createRadialGradient(bx5,by5,2,bx5,by5,BS*0.3);
        grV.addColorStop(0,'rgba(180,220,255,0.7)');
        grV.addColorStop(0.6,'rgba(80,160,255,0.35)');
        grV.addColorStop(1,'rgba(40,100,255,0)');
        ctx.beginPath();ctx.arc(bx5,by5,BS*0.3,0,Math.PI*2);
        ctx.fillStyle=grV; ctx.fill();
        ctx.shadowColor='#44bbff'; ctx.shadowBlur=8;
        ctx.strokeStyle='rgba(180,220,255,0.8)'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.shadowBlur=0;
      }
      ctx.restore();
    }
  }

  // MANYETİK alan çizgileri
  if(mech2 === 'manyetik') {
    const bcM = getBossCenter();
    if(bcM) {
      ctx.save();
      ctx.globalAlpha = 0.15 + Math.sin(frame*0.07)*0.07;
      ctx.strokeStyle = meta.c1; ctx.lineWidth = 1;
      for(let i=0;i<8;i++) {
        const aM = i*Math.PI/4 + frame*0.01;
        ctx.beginPath();
        ctx.moveTo(bcM.x + Math.cos(aM)*BS*0.5, bcM.y + Math.sin(aM)*BS*0.5);
        ctx.lineTo(bcM.x + Math.cos(aM)*BS*3.5, bcM.y + Math.sin(aM)*BS*3.5);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  // BUZ FRİZİ: donmuş toplar üstüne buz overlay
  if(mech2 === 'buz_frizi' && boss.frozen) {
    ctx.save();
    ctx.fillStyle='rgba(136,238,255,0.08)';
    ctx.fillRect(0,TOP_H,W,H-TOP_H-BOT_H);
    ctx.restore();
  }

  // ÜÇ FAZLI: faz indikatörü
  if(mech2 === 'uc_fazli' && boss.bossPhase) {
    const phaseColors = ['','#22dd88','#ffaa00','#ff2244'];
    const phaseTxt = ['','FAZ 1','FAZ 2','FAZ 3 🔥'];
    ctx.save();
    ctx.fillStyle=phaseColors[boss.bossPhase];
    ctx.font='bold 11px Arial'; ctx.textAlign='right'; ctx.textBaseline='top';
    ctx.shadowColor=phaseColors[boss.bossPhase]; ctx.shadowBlur=6;
    ctx.fillText(phaseTxt[boss.bossPhase], W-8, TOP_H+6);
    ctx.restore();
  }

  // EVRİM: evo level indicator
  if(mech2 === 'evrim' && (boss.evoLevel||0) > 0) {
    const evoColors=['','#aaff88','#ffff44','#ff4400'];
    ctx.save();
    ctx.fillStyle=evoColors[boss.evoLevel];
    ctx.font='bold 11px Arial'; ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.shadowColor=evoColors[boss.evoLevel]; ctx.shadowBlur=6;
    ctx.fillText(`🦠 EVRİM ${boss.evoLevel}/3`, 8, TOP_H+6);
    ctx.restore();
  }

  // HİBERNASYON: kristal kabuk
  if(mech2 === 'hibernasyon' && boss.hibernated && (boss.shellHp||0) > 0) {
    const bcH = getBossCenter();
    if(bcH) {
      const shellRH = BS * 1.8;
      const shellRatioH = boss.shellHp / boss.shellMaxHp;
      ctx.save();
      ctx.shadowColor='#00ddcc'; ctx.shadowBlur=20*shellRatioH;
      const sgH=ctx.createRadialGradient(bcH.x,bcH.y,shellRH*0.5,bcH.x,bcH.y,shellRH);
      sgH.addColorStop(0,'rgba(0,200,180,0.15)');
      sgH.addColorStop(0.7,`rgba(0,220,200,${0.4*shellRatioH})`);
      sgH.addColorStop(1,'rgba(0,180,160,0)');
      ctx.beginPath();ctx.arc(bcH.x,bcH.y,shellRH,0,Math.PI*2);
      ctx.fillStyle=sgH; ctx.fill();
      ctx.strokeStyle=`rgba(100,255,240,${0.7*shellRatioH})`; ctx.lineWidth=3*shellRatioH; ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(W*0.2,TOP_H+4,W*0.6,6);
      ctx.fillStyle='#00ddcc'; ctx.fillRect(W*0.2,TOP_H+4,W*0.6*shellRatioH,6);
      ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🧊 KABUK', W/2, TOP_H+15);
      ctx.restore();
    }
  }

  // SARKAÇ: salıncak çizgisi
  if(mech2 === 'sarkac' && boss.segments[0]) {
    const segS = boss.segments[0];
    const pivotX = boss.swingCenterX||W/2, pivotY = TOP_H+10;
    ctx.save();
    ctx.strokeStyle='rgba(255,140,0,0.5)'; ctx.lineWidth=2;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(pivotX,pivotY); ctx.lineTo(segS.x+BS/2, segS.y+BS/2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // RAYLI: ray çizgisi
  if(mech2 === 'rayli' && boss.segments[0]) {
    const railRowR = boss.segments[0].row;
    const railYR = by(railRowR) + BS - 3;
    ctx.save();
    ctx.strokeStyle='rgba(160,160,160,0.6)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,railYR); ctx.lineTo(W,railYR); ctx.stroke();
    ctx.strokeStyle='rgba(100,100,100,0.4)'; ctx.lineWidth=1.5;
    for(let rxI=0;rxI<W;rxI+=20) {
      ctx.beginPath(); ctx.moveTo(rxI,railYR-4); ctx.lineTo(rxI,railYR+2); ctx.stroke();
    }
    ctx.restore();
  }

  // ALEV DUVARI: alev duvarı görsel
  if(mech2 === 'alev_duvari' && boss.flameWall) {
    const fwY = H - BOT_H - BS * 2;
    ctx.save();
    const fwPulse = 0.5 + 0.3*Math.sin(frame*0.15);
    ctx.globalAlpha = fwPulse;
    ctx.fillStyle='rgba(255,80,0,0.22)';
    ctx.fillRect(0, fwY, W, H - BOT_H - fwY);
    ctx.strokeStyle='#ff6600'; ctx.lineWidth=2;
    ctx.shadowColor='#ff4400'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(0,fwY); ctx.lineTo(W,fwY); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='#ff8800'; ctx.font='bold 11px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🔥 ALEV DUVARI', W/2, fwY-14);
    ctx.restore();
    // Kill active balls entering the fire wall
    if(G.activeBalls) {
      for(const ab of G.activeBalls) {
        if(!ab.done && ab.y > fwY) ab.done = true;
      }
    }
  }

  // SON HAMLE: ölüm öfkesi timer göstergesi
  if(mech2 === 'son_hamle' && boss.deathRage && (boss.deathRageTimer||0) > 0) {
    const secSH = Math.ceil(boss.deathRageTimer/60);
    const ratioSH = boss.deathRageTimer / (60*30);
    ctx.save();
    const pulseSH = 0.88+Math.sin(frame*0.15)*0.12;
    ctx.globalAlpha = pulseSH;
    ctx.fillStyle=`rgba(255,0,0,${0.1*pulseSH})`;
    ctx.fillRect(0,TOP_H,W,H-TOP_H-BOT_H);
    ctx.globalAlpha=1;
    ctx.fillStyle='#ff2244'; ctx.font=`bold ${Math.min(18,W*0.045)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=12;
    ctx.fillText(`💀 SON HAMLE: ${secSH}s`, W/2, TOP_H+20);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(W*0.1,TOP_H+30,W*0.8,5);
    ctx.fillStyle='#ff2244'; ctx.fillRect(W*0.1,TOP_H+30,W*0.8*ratioSH,5);
    ctx.restore();
  }

  // AYNA KALKAN: dönen kalkan
  if(mech2 === 'ayna_kalkan' && boss.shield && !boss.shield.broken) {
    const bcAK = getBossCenter();
    if(bcAK) {
      ctx.save();
      const shA = boss.shield.angle||0;
      const shR = BS * 1.3;
      ctx.shadowColor='#88ccff'; ctx.shadowBlur=16;
      for(let i=0;i<3;i++) {
        const a = shA + i*Math.PI*2/3;
        const sx2 = bcAK.x + Math.cos(a)*shR;
        const sy2 = bcAK.y + Math.sin(a)*shR;
        ctx.strokeStyle='rgba(180,220,255,0.85)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(sx2,sy2,BS*0.25,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='rgba(180,220,255,0.3)';
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // TELEPORT: flash efekti
  if(mech2 === 'teleport' && (boss.teleportFlash||0) > 0) {
    ctx.save();
    ctx.globalAlpha = (boss.teleportFlash/20)*0.45;
    ctx.fillStyle='rgba(200,100,255,1)';
    ctx.fillRect(0,TOP_H,W,H-TOP_H-BOT_H);
    ctx.restore();
  }
}

function drawShop() {
  if(!G.shopOpen) return;
  if(G.shopScroll===undefined) G.shopScroll=0;
  const pw=Math.min(W-16, 380), ph=Math.min(H*0.95, 700);
  const px=(W-pw)/2, py=(H-ph)/2;
  const sc=G.shopScroll||0;
  ctx.save();
  // Karartma
  ctx.fillStyle='rgba(0,0,15,0.82)'; ctx.fillRect(0,0,W,H);
  // Panel arka plan
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=14;
  rrect(px,py,pw,ph,16);
  const bg=ctx.createLinearGradient(px,py,px,py+ph);
  bg.addColorStop(0,'rgba(12,12,34,0.98)'); bg.addColorStop(1,'rgba(8,8,24,0.98)');
  ctx.fillStyle=bg; ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,215,0,0.45)'; ctx.lineWidth=1.5; ctx.stroke();
  // İçerik clip — scroll ile taşan kısmı gizle
  ctx.save();
  ctx.beginPath(); ctx.rect(px,py+44,pw,ph-52); ctx.clip();
  ctx.translate(0,-sc); // scroll offset

  // Başlık
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=14;
  ctx.fillStyle='#ffd700'; ctx.font=`bold ${Math.min(18,W*0.045)}px Arial`;
  ctx.fillText('🏪  MAĞAZA', W/2, py+22);
  ctx.shadowBlur=0;
  // Altın + slot durumu
  const freeSlotsStr = G.powerupSlots.filter(s=>s===null).length;
  ctx.fillStyle='#ffee88'; ctx.font=`bold ${Math.min(13,W*0.033)}px Arial`;
  ctx.fillText(`💰 ${G.gold} altın`, W/2-40, py+42);
  ctx.fillStyle= freeSlotsStr>0 ? '#88ffcc' : '#ff8888';
  ctx.fillText(`📦 ${freeSlotsStr}/2 slot boş`, W/2+52, py+42);
  // Kapat butonu
  ctx.fillStyle='rgba(255,255,255,0.12)';
  rrect(px+pw-30,py+8,22,22,5); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='bold 14px Arial';
  ctx.fillText('✕', px+pw-19, py+19);

  // Ürünler (5 adet, 2 sütun)
  const itemW=(pw-32)/2, itemH=72, itemGap=8;
  const startY=py+60;
  for(let i=0;i<SHOP_ITEMS.length;i++){
    const it=SHOP_ITEMS[i];
    const col=i%2, row=Math.floor(i/2);
    const ix=px+8+col*(itemW+itemGap);
    const iy=startY+row*(itemH+itemGap);
    const canBuy=G.gold>=it.cost;
    // Arka plan
    rrect(ix,iy,itemW,itemH,10);
    ctx.fillStyle=canBuy?`rgba(${hexToRgb(it.color)},0.14)`:'rgba(40,40,60,0.7)';
    ctx.fill();
    ctx.strokeStyle=canBuy?it.color:'rgba(80,80,100,0.5)';
    ctx.lineWidth=1.2; ctx.stroke();
    // Emoji
    ctx.font=`${Math.min(28,itemH*0.38)}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.globalAlpha=canBuy?1:0.45;
    ctx.fillText(it.emoji, ix+itemW*0.22, iy+itemH*0.38);
    // İsim
    ctx.font=`bold ${Math.min(11,W*0.028)}px Arial`;
    ctx.fillStyle=canBuy?it.color:'#778';
    ctx.textAlign='left';
    ctx.fillText(it.name, ix+itemW*0.40, iy+itemH*0.28);
    // Açıklama
    ctx.font=`${Math.min(9,W*0.022)}px Arial`;
    ctx.fillStyle=canBuy?'rgba(255,255,255,0.7)':'rgba(120,130,150,0.7)';
    ctx.fillText(it.desc, ix+itemW*0.40, iy+itemH*0.52);
    // Fiyat balonu
    const bw=42, bh=20, bx3=ix+itemW-bw-4, by3=iy+itemH-bh-4;
    rrect(bx3,by3,bw,bh,8);
    ctx.fillStyle=canBuy?'rgba(255,215,0,0.22)':'rgba(60,60,80,0.5)';
    ctx.fill();
    ctx.strokeStyle=canBuy?'#ffd700':'#555'; ctx.lineWidth=1; ctx.stroke();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=canBuy?'#ffd700':'#556';
    ctx.font=`bold ${Math.min(10,W*0.025)}px Arial`;
    ctx.globalAlpha=1;
    ctx.fillText(`💰${it.cost}`, bx3+bw/2, by3+bh/2);
  }

  // ── Top Skinleri Bölümü ─────────────────────────────────────────
  const shopRows = Math.ceil(SHOP_ITEMS.length/2);
  const skinStartY = startY + shopRows*(itemH+itemGap) + 12;

  // Ayırıcı çizgi
  ctx.strokeStyle='rgba(255,215,0,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(px+16, skinStartY); ctx.lineTo(px+pw-16, skinStartY); ctx.stroke();

  // Başlık
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ffd700'; ctx.font=`bold ${Math.min(14,W*0.035)}px Arial`;
  ctx.fillText('⚽ Top Skinleri', W/2, skinStartY+16);

  // Skin kartları — 2 sütun grid
  const skCardW=(pw-32)/2, skCardH=100, skCardGap=8;
  const skGridY=skinStartY+34;
  for(let i=0;i<BALL_SKINS.length;i++){
    const sk=BALL_SKINS[i];
    const col=i%2, row=Math.floor(i/2);
    const cx2=px+8+col*(skCardW+skCardGap);
    const cy2=skGridY+row*(skCardH+skCardGap);
    const isUnlocked=(SAVE.unlockedSkins||['classic']).includes(sk.id);
    const isActive=(SAVE.ballSkin||'classic')===sk.id;

    // Kart arka plan
    ctx.save();
    if(isActive){ ctx.shadowColor='#00ffff'; ctx.shadowBlur=12; }
    rrect(cx2,cy2,skCardW,skCardH,10);
    ctx.fillStyle=isUnlocked?'rgba(40,80,60,0.5)':'rgba(40,40,60,0.5)';
    ctx.fill();
    if(isActive){ ctx.strokeStyle='#00ffff'; ctx.lineWidth=2; }
    else if(isUnlocked){ ctx.strokeStyle='#44cc66'; ctx.lineWidth=1.2; }
    else if(sk.price>0){ ctx.strokeStyle='#ff8800'; ctx.lineWidth=1.2; }
    else if(sk.adCount>0){ ctx.strokeStyle='#aa66ff'; ctx.lineWidth=1.2; }
    else { ctx.strokeStyle='rgba(80,80,100,0.5)'; ctx.lineWidth=1; }
    ctx.stroke();
    ctx.restore();

    // Top çizimi
    drawBallSkin(sk.id, cx2+skCardW*0.22, cy2+skCardH*0.36, 22, 0);

    // Aktif/unlocked rozet
    if(isActive){
      ctx.fillStyle='#00ffff'; ctx.font='bold 12px Arial';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('✓', cx2+skCardW-12, cy2+12);
    } else if(isUnlocked){
      ctx.fillStyle='#44cc66'; ctx.font='bold 10px Arial';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('✓', cx2+skCardW-12, cy2+12);
    }

    // İsim
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle=isUnlocked?'#fff':'#aab';
    ctx.font=`bold ${Math.min(11,W*0.028)}px Arial`;
    ctx.fillText(sk.name, cx2+skCardW*0.42, cy2+skCardH*0.22);

    // Stat bilgileri
    ctx.font=`${Math.min(9,W*0.022)}px Arial`;
    ctx.fillStyle='rgba(200,210,230,0.7)';
    const stats=`⚡${sk.speedMult}× 📏${sk.sizeMult}× 💥${sk.damageMult}×`;
    ctx.fillText(stats, cx2+skCardW*0.42, cy2+skCardH*0.42);

    // Açıklama
    ctx.fillStyle='rgba(160,170,190,0.6)';
    ctx.fillText(sk.desc, cx2+skCardW*0.42, cy2+skCardH*0.58);

    // Kilit durumu / fiyat
    if(!isUnlocked){
      ctx.textAlign='center';
      if(sk.price>0){
        const canAfford=G.gold>=sk.price;
        ctx.fillStyle=canAfford?'#ffd700':'#886622';
        ctx.font=`bold ${Math.min(10,W*0.025)}px Arial`;
        ctx.fillText(`💰 ${sk.price}`, cx2+skCardW*0.65, cy2+skCardH*0.80);
      }
      if(sk.adCount>0){
        ctx.fillStyle='#aa66ff';
        ctx.font=`bold ${Math.min(10,W*0.025)}px Arial`;
        const adX=sk.price>0? cx2+skCardW*0.88 : cx2+skCardW*0.65;
        ctx.fillText(`📺 ×${sk.adCount}`, adX, cy2+skCardH*0.80);
      }
    } else if(isActive){
      ctx.textAlign='center'; ctx.fillStyle='#00ffff';
      ctx.font=`bold ${Math.min(10,W*0.025)}px Arial`;
      ctx.fillText('AKTİF', cx2+skCardW*0.65, cy2+skCardH*0.80);
    }
  }
  ctx.restore(); // clip+translate restore

  // Scroll bar göster
  const shopRows99=Math.ceil(SHOP_ITEMS.length/2);
  const skinRows99=Math.ceil(BALL_SKINS.length/2);
  const totalContentH=60+shopRows99*(72+8)+12+34+skinRows99*(100+8)+20;
  const visibleH=ph-52;
  const maxScroll=Math.max(0,totalContentH-visibleH);
  if(G.shopScroll===undefined) G.shopScroll=0;
  G.shopScroll=Math.max(0,Math.min(G.shopScroll,maxScroll));
  if(maxScroll>0){
    const barH=Math.max(20,visibleH*(visibleH/totalContentH));
    const barY=py+44+(visibleH-barH)*(sc/maxScroll);
    ctx.fillStyle='rgba(255,215,0,0.3)';
    rrect(px+pw-6,barY,4,barH,2); ctx.fill();
  }

  // Kapat butonu (scroll etkilemez — en üstte sabit)
  ctx.fillStyle='rgba(255,255,255,0.15)';
  rrect(px+pw-34,py+6,28,28,8); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='bold 16px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✕', px+pw-20, py+20);

  ctx.restore(); // drawShop ana restore
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function shopBtnRect() {
  // Sağ üstte sabit "🏪" butonu konumu
  const bw=64, bh=28, bx=W-bw-8, by2=TOP_H/2-bh/2;
  return {bx, by:by2, bw, bh};
}
function speedBtnRect() {
  // Sağ altta ⚡ 2× hız butonu
  const bw=52, bh=30, bx=W-bw-8, by2=H-BOT_H+BOT_H*0.12;
  return {bx, by:by2, bw, bh};
}

function drawUI() {
  const isBoss = G.bossActive && G.boss;

  // ── Üst çubuk arka planı ──────────────────────────────────────
  const tg=ctx.createLinearGradient(0,0,0,TOP_H);
  tg.addColorStop(0, isBoss?'rgba(35,8,8,0.98)':'rgba(18,18,42,0.98)');
  tg.addColorStop(1, isBoss?'rgba(22,4,4,0.98)':'rgba(10,10,26,0.98)');
  ctx.fillStyle=tg; ctx.fillRect(0,0,W,TOP_H);
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,TOP_H); ctx.lineTo(W,TOP_H); ctx.stroke();

  // Sol: skor
  ctx.fillStyle='#fff'; ctx.textBaseline='middle'; ctx.shadowBlur=0;
  ctx.font=`bold ${Math.min(19,W*0.048)}px Arial`;
  ctx.textAlign='left'; ctx.fillText(G.score, 14, TOP_H/2);

  // Merkez: bölüm + tur bilgisi
  if(isBoss) {
    const tl=G.boss.turnsLeft;
    const tlCol=tl<=5?'#ff2244':tl<=10?'#ff8800':'#ffd700';
    ctx.save();
    ctx.shadowColor='#ff2244'; ctx.shadowBlur=12;
    ctx.fillStyle='#ff5577'; ctx.font=`bold ${Math.min(13,W*0.033)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('👹 BOSS MÜCADELE', W/2, TOP_H/2-7);
    ctx.shadowBlur=0; ctx.shadowColor=tlCol; ctx.shadowBlur=8;
    ctx.fillStyle=tlCol; ctx.font=`bold ${Math.min(11,W*0.028)}px Arial`;
    ctx.fillText(`⚔️ ${tl} tur kaldı`, W/2, TOP_H/2+8);

    // Boss HP bar — full-width at top of play area
    const totalHp=G.boss.segments.reduce((s,sg)=>s+(sg._dead?0:Math.max(0,sg.hp)),0);
    const maxHp=G.boss.segments.reduce((s,sg)=>s+sg.maxHp,0);
    const bprog=maxHp>0?totalHp/maxHp:0;
    // Animated display HP (smooth decrease)
    if(G.boss._displayHpRatio === undefined) G.boss._displayHpRatio = bprog;
    G.boss._displayHpRatio += (bprog - G.boss._displayHpRatio) * 0.08;
    const displayProg = G.boss._displayHpRatio;
    const bbw=W*0.88, bbh=8, bbx=(W-bbw)/2, bby=TOP_H-10;
    ctx.shadowBlur=0;
    // Background
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();
    const bRadius=bbh/2;
    ctx.moveTo(bbx+bRadius,bby);ctx.lineTo(bbx+bbw-bRadius,bby);
    ctx.arcTo(bbx+bbw,bby,bbx+bbw,bby+bRadius,bRadius);
    ctx.arcTo(bbx+bbw,bby+bbh,bbx+bbw-bRadius,bby+bbh,bRadius);
    ctx.lineTo(bbx+bRadius,bby+bbh);
    ctx.arcTo(bbx,bby+bbh,bbx,bby+bRadius,bRadius);
    ctx.arcTo(bbx,bby,bbx+bRadius,bby,bRadius);
    ctx.closePath();ctx.fill();
    if(displayProg>0){
      // Gradient: red→yellow→green based on HP percentage
      const bgg=ctx.createLinearGradient(bbx,bby,bbx+bbw*displayProg,bby);
      if(bprog > 0.5) {
        bgg.addColorStop(0,'#22dd88'); bgg.addColorStop(1,'#88ff44');
      } else if(bprog > 0.25) {
        bgg.addColorStop(0,'#ffaa00'); bgg.addColorStop(1,'#ffcc00');
      } else {
        bgg.addColorStop(0,'#ff2244'); bgg.addColorStop(1,'#ff6644');
      }
      ctx.shadowColor=bprog>0.5?'#22dd88':bprog>0.25?'#ffaa00':'#ff2244'; ctx.shadowBlur=6;
      ctx.fillStyle=bgg;
      ctx.beginPath();
      const fillW=bbw*displayProg;
      ctx.moveTo(bbx+bRadius,bby);ctx.lineTo(bbx+Math.max(fillW-bRadius,bRadius),bby);
      if(fillW>=bbw-1){ctx.arcTo(bbx+bbw,bby,bbx+bbw,bby+bRadius,bRadius);ctx.arcTo(bbx+bbw,bby+bbh,bbx+bbw-bRadius,bby+bbh,bRadius);}
      else{ctx.lineTo(bbx+fillW,bby);ctx.lineTo(bbx+fillW,bby+bbh);}
      ctx.lineTo(bbx+bRadius,bby+bbh);
      ctx.arcTo(bbx,bby+bbh,bbx,bby+bRadius,bRadius);
      ctx.arcTo(bbx,bby,bbx+bRadius,bby,bRadius);
      ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;
    }
    // Boss name + HP text on bar
    const bMeta = BOSS_META[G.boss.type] || BOSS_META.dragon;
    const bossBarName = SAVE.customBossName || bMeta.name;
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(9,W*0.023)}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#000';ctx.shadowBlur=2;
    ctx.fillText(`${bossBarName}  ${totalHp}/${maxHp}`, W/2, bby+bbh/2);
    ctx.shadowBlur=0;
    ctx.restore();
  } else {
    ctx.fillStyle='#fff'; ctx.font=`bold ${Math.min(14,W*0.035)}px Arial`;
    ctx.textAlign='center'; ctx.fillText(`Bölüm ${G.level}`, W/2, TOP_H/2-12);
    // Tur sayacı: büyük pill badge + renk kodlu — boss'ta boss.turnsLeft, toplama fazında gizle
    if(G.bossCollectTimer > 0) { /* boss yenildi, coin toplama — sayaç gösterme */ }
    const turRemain = (G.bossActive && G.boss) ? G.boss.turnsLeft : (G.bossCollectTimer > 0 ? 0 : (G.turnsPerLevel - G.levelTurns));
    const _turTotal = (G.bossActive && G.boss) ? 15 : G.turnsPerLevel;
    const turRatio = turRemain / _turTotal;
    const turCol = turRatio > 0.5 ? '#44ff88' : turRatio > 0.25 ? '#ffcc00' : '#ff4444';
    const turBg  = turRatio > 0.5 ? 'rgba(68,255,136,0.18)' : turRatio > 0.25 ? 'rgba(255,204,0,0.18)' : 'rgba(255,68,68,0.22)';
    const turStr=`\u23F3 ${turRemain} / ${_turTotal} tur`;
    const turFont = Math.min(13,W*0.033);
    ctx.font=`bold ${turFont}px Arial`;
    const turTW = ctx.measureText(turStr).width;
    const pillW = turTW + 16, pillH = turFont + 8;
    const pillX = W/2 - pillW/2, pillY = TOP_H/2 + 1 - pillH/2;
    ctx.save();
    ctx.beginPath();
    const pR = pillH/2;
    ctx.moveTo(pillX+pR, pillY); ctx.lineTo(pillX+pillW-pR, pillY);
    ctx.arc(pillX+pillW-pR, pillY+pR, pR, -Math.PI/2, Math.PI/2);
    ctx.lineTo(pillX+pR, pillY+pillH);
    ctx.arc(pillX+pR, pillY+pR, pR, Math.PI/2, -Math.PI/2);
    ctx.closePath();
    ctx.fillStyle=turBg; ctx.fill();
    ctx.strokeStyle=turCol; ctx.lineWidth=1.2; ctx.stroke();
    ctx.fillStyle=turCol;
    ctx.font=`bold ${turFont}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(turStr, W/2, pillY+pillH/2);
    ctx.restore();
  }

  // Sağ: 🏪 Mağaza butonu
  const {bx:sbx, by:sby, bw:sbw, bh:sbh}=shopBtnRect();
  ctx.save();
  ctx.shadowColor='#ffd700'; ctx.shadowBlur=G.shopOpen?16:5;
  rrect(sbx, sby, sbw, sbh, 10);
  ctx.fillStyle=G.shopOpen?'rgba(255,215,0,0.25)':'rgba(255,215,0,0.10)'; ctx.fill();
  ctx.strokeStyle=G.shopOpen?'#ffd700':'rgba(255,215,0,0.5)'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.shadowBlur=5; ctx.fillStyle='#ffd700';
  ctx.font=`bold ${Math.min(11,W*0.028)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`🏪 ${G.gold}`, sbx+sbw/2, sby+sbh/2);
  ctx.restore();

  drawProgressBar();

  // ── Alt çubuk ─────────────────────────────────────────────────
  const bg=ctx.createLinearGradient(0,H-BOT_H,0,H);
  bg.addColorStop(0,'rgba(10,10,26,0.92)'); bg.addColorStop(1,'rgba(18,18,42,0.98)');
  ctx.fillStyle=bg; ctx.fillRect(0,H-BOT_H,W,BOT_H);
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.moveTo(0,H-BOT_H); ctx.lineTo(W,H-BOT_H); ctx.stroke();

  // Sol: atış topu + top sayısı
  const lx=36, ly=launchY();
  const pu=G.activePowerup!==null?G.powerupSlots[G.activePowerup]:null;
  const activeSpecial=pu?['bomb','lightning','fireball','multi'][pu.type]:null;
  drawBallAt(lx,ly,G.ballColor,BALL_R+4,activeSpecial);
  ctx.fillStyle='rgba(255,215,0,0.92)'; ctx.font='bold 13px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`×${G.ballCount}`, lx, H-BOT_H+14);

  // Hız butonu — sağ alt
  {
    const {bx,by,bw,bh}=speedBtnRect();
    const fast=G.speedMode===2;
    ctx.save();
    rrect(bx,by,bw,bh,8);
    ctx.fillStyle=fast?'rgba(255,180,0,0.22)':'rgba(255,255,255,0.07)';
    ctx.fill();
    ctx.strokeStyle=fast?'#ffcc00':'rgba(255,255,255,0.25)';
    ctx.lineWidth=fast?2:1.2;
    if(fast){ctx.shadowColor='#ffcc00';ctx.shadowBlur=10;}
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.font=`bold ${fast?13:12}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=fast?'#ffe066':'rgba(255,255,255,0.55)';
    ctx.fillText(fast?'⚡ 2×':'1×', bx+bw/2, by+bh/2);
    ctx.restore();
  }

  // Power-up slotları (merkez)
  drawPowerupBar();
  // Skill bar tutorial — ilk bölümde 1 kere göster
  if(G.level <= 2 && G.turn <= 1 && !G._skillTutorialDismissed && G.phase==='aim') {
    const sy = PU_SLOT_Y();
    const arrowY = sy - 50;
    const pulse = 0.7 + 0.3*Math.abs(Math.sin(frame*0.08));
    ctx.save();
    ctx.globalAlpha = pulse;
    // Ok işareti
    ctx.fillStyle='#ffd700'; ctx.font='bold 22px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⬇', W/2, arrowY);
    // Bilgi kutusu
    const bw=Math.min(260,W*0.7), bh=48;
    const bx=W/2-bw/2, by=arrowY-bh-6;
    ctx.fillStyle='rgba(0,0,20,0.88)';
    rrect(bx,by,bw,bh,12); ctx.fill();
    ctx.strokeStyle='rgba(255,215,0,0.6)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#ffd700'; ctx.font=`bold ${Math.min(13,W*0.034)}px Arial`;
    ctx.fillText('💣🔥 Güçler burada! Satın al & aktif et', W/2, by+16);
    ctx.fillStyle='#88ff88'; ctx.font=`${Math.min(11,W*0.028)}px Arial`;
    ctx.fillText('[ Anladım ✓ ]', W/2, by+36);
    ctx.restore();
  }

  // BallBuff göstergesi — sağ alt, hız butonunun altında
  if(G.ballBuff && G.ballBuff.turnsLeft > 0) {
    const bt = BALL_TYPES[G.ballBuff.type];
    if(bt) {
      const bx5=W-64, by5=H-BOT_H+46, bw5=60, bh5=22;
      ctx.save();
      const pulse5 = 0.7+Math.sin(frame*0.10)*0.3;
      ctx.globalAlpha=pulse5;
      rrect(bx5,by5,bw5,bh5,8);
      ctx.fillStyle=`rgba(0,0,0,0.55)`; ctx.fill();
      ctx.strokeStyle=bt.glow; ctx.lineWidth=1.5; ctx.stroke();
      ctx.globalAlpha=1;
      ctx.fillStyle=bt.glow; ctx.font='bold 10px Arial';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor=bt.glow; ctx.shadowBlur=6;
      ctx.fillText(`${bt.emoji} ×${G.ballBuff.turnsLeft}`, bx5+bw5/2, by5+bh5/2);
      ctx.shadowBlur=0;
      ctx.restore();
    }
  }

  // Combo — animated, color-coded, with sparkles
  if(G.combo>1&&G.comboTimer>0) {
    const elapsed = 90 - G.comboTimer;            // 0..90, increases over time
    const fadeAlpha = G.comboTimer/90;            // 1→0 fade out

    // Scale pop-in: 0→1 in first 12 frames with overshoot, then settle
    let scl = 1;
    if(elapsed < 8)       scl = elapsed / 8;
    else if(elapsed < 14) scl = 1 + (elapsed-8)/6 * 0.25;  // overshoot to 1.25
    else if(elapsed < 20) scl = 1.25 - (elapsed-14)/6 * 0.25; // settle to 1.0
    // wobble: slight oscillation in middle phase
    else scl = 1 + Math.sin(elapsed * 0.35) * 0.04;

    // Color by combo level
    let fillCol, glowCol, strokeCol;
    if(G.combo >= 10) {
      // rainbow cycle
      const hue = (Date.now()/12) % 360;
      fillCol  = `hsl(${hue},100%,65%)`;
      glowCol  = `hsl(${hue},100%,50%)`;
      strokeCol= '#fff';
    } else if(G.combo >= 7) {
      fillCol='#ff4466'; glowCol='#ff1144'; strokeCol='#ffaacc';
    } else if(G.combo >= 4) {
      fillCol='#ff8800'; glowCol='#ff6600'; strokeCol='#ffddaa';
    } else {
      fillCol='#ffd700'; glowCol='#ffaa00'; strokeCol='#fff5cc';
    }

    const fs = Math.min(26, W * 0.065);
    const txt = `${G.combo}× COMBO!`;
    const cy  = H / 2 - 70;

    ctx.save();
    ctx.globalAlpha = fadeAlpha;
    ctx.translate(W/2, cy);
    ctx.scale(scl, scl);

    ctx.font = `bold ${fs}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const tw = ctx.measureText(txt).width;
    const ph = fs + 14, pw = tw + 32;

    // Dark pill background — no glow on the pill itself
    rrect(-pw/2, -ph/2, pw, ph, ph/2);
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fill();

    // Thin colored border — no shadow
    ctx.strokeStyle = glowCol;
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    // Dark outline so text pops against any background
    ctx.shadowBlur  = 0;
    ctx.lineWidth   = 4;
    ctx.strokeStyle = 'rgba(0,0,0,0.75)';
    ctx.strokeText(txt, 0, 0);

    // Subtle glow only on the text itself
    ctx.shadowColor = glowCol;
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = fillCol;
    ctx.fillText(txt, 0, 0);
    ctx.shadowBlur  = 0;

    ctx.restore();

    // Sparkles for high combo (every ~8 frames while visible)
    if(G.combo >= 4 && elapsed % 8 === 0 && G.comboTimer > 20) {
      const sparkCount = G.combo >= 10 ? 6 : G.combo >= 7 ? 4 : 2;
      for(let i = 0; i < sparkCount; i++) {
        const sx = W/2 + (Math.random()-0.5) * (tw * scl + 40);
        const sy = cy  + (Math.random()-0.5) * (ph * scl + 20);
        spawnParticles(sx, sy, fillCol, 3, false);
      }
    }
  }
}

function drawBossIntro() {
  const total = 185;
  const elapsed = total - G.bossIntro;
  const t = Math.min(1, elapsed / total);
  const btype = (G.levelCfg && G.levelCfg.bossType) || 'dragon';
  const meta  = BOSS_META[btype] || BOSS_META.dragon;
  ctx.save();

  // ── 1. Renkli vignette (boss tipine göre) ─────────────────────
  const vigA = Math.min(0.80, t * 1.3);
  const [r1,g1,b1] = hexToRgbArr(meta.c2);
  const vig = ctx.createRadialGradient(W/2,H/2,H*0.05,W/2,H/2,H);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(0.4, `rgba(${r1},${g1},${b1},${vigA*0.45})`);
  vig.addColorStop(1,   `rgba(${r1},${g1},${b1},${vigA*0.82})`);
  ctx.fillStyle = vig; ctx.fillRect(0,0,W,H);

  // ── 2. Başlangıç flaşı ────────────────────────────────────────
  if (t < 0.10) {
    ctx.fillStyle = `${meta.flash}${(0.10-t)/0.10 * 0.55})`;
    ctx.fillRect(0,0,W,H);
  }

  // ── 3. Boss adı (0.12 → 0.50) ─────────────────────────────────
  if (t > 0.12) {
    const a = Math.min(1,(t-0.12)/0.14);
    const pulse = 0.65 + 0.35*Math.sin(elapsed*0.28);
    ctx.save();
    ctx.globalAlpha = a * pulse;
    ctx.shadowColor = meta.c1; ctx.shadowBlur = 24+Math.sin(elapsed*0.22)*8;
    ctx.fillStyle = meta.c1;
    ctx.font = `bold ${Math.min(36,W*0.090)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // Kişiselleştirilmiş boss adı varsa göster
    const customName = SAVE.customBossName || '';
    const bossDisplayName = customName ? customName.toUpperCase() : meta.name;
    ctx.fillText(`⚠️  ${bossDisplayName} GELİYOR!`, W/2, H*0.27);
    // Özel ad varsa altında gerçek boss türünü küçük göster
    if(customName) {
      ctx.save();
      ctx.globalAlpha *= 0.6;
      ctx.font = `${Math.min(14,W*0.034)}px Arial`;
      ctx.fillStyle = 'rgba(255,200,200,0.8)';
      ctx.fillText(`(${meta.name})`, W/2, H*0.34);
      ctx.restore();
    }
    ctx.restore();
  }

  // ── 4. Boss emoji büyüyor + sallanan (0.35 → 0.82) ────────────
  if (t > 0.35) {
    const a = Math.min(1,(t-0.35)/0.22);
    const scl = 0.35 + a*0.72 + Math.sin(elapsed*0.14)*0.04;
    const rot = Math.sin(elapsed*0.20)*0.06;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(W/2, H*0.50);
    ctx.scale(scl, scl);
    ctx.rotate(rot);
    ctx.shadowColor = meta.c1; ctx.shadowBlur = 30 + Math.sin(elapsed*0.18)*10;
    ctx.font = `${Math.min(96,W*0.23)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(meta.emoji, 0, 0);
    ctx.restore();
    // Renk partikülleri
    if(elapsed % 8 === 0) spawnParticles(W/2, H*0.50, meta.particle, 4, true);
  }

  // ── 5. "X TUR İÇİNDE YEN!" (0.56 → 0.78) ─────────────────────
  if (t > 0.56) {
    const a = Math.min(1,(t-0.56)/0.14);
    const turStr = G.levelCfg ? `${G.levelCfg.turnsAllowed} TUR İÇİNDE YEN!` : '15 TUR İÇİNDE YEN!';
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#ffdd66';
    ctx.font = `bold ${Math.min(19,W*0.047)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(turStr, W/2, H*0.72);
    ctx.restore();
  }

  // ── 6. "HAZIR OL!" yanıp sönen (0.80 → 1.0) ──────────────────
  if (t > 0.80) {
    const a = Math.min(1,(t-0.80)/0.10);
    const blink = Math.sin(elapsed*0.60) > -0.1 ? 1 : 0.12;
    ctx.save();
    ctx.globalAlpha = a * blink;
    ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 22;
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${Math.min(30,W*0.075)}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⚔️  HAZIR OL!', W/2, H*0.19);
    ctx.restore();
  }

  // ── 7. Şimşek çizgileri (boss renginde) ───────────────────────
  if (t > 0.22 && elapsed % 20 < 5) {
    ctx.save();
    ctx.globalAlpha = 0.50;
    ctx.strokeStyle = meta.c1; ctx.lineWidth = 2;
    ctx.shadowColor = meta.c1; ctx.shadowBlur = 10;
    for (let side = 0; side < 2; side++) {
      const sx2 = side===0 ? 0 : W;
      ctx.beginPath(); let lx2=sx2, ly2=0; ctx.moveTo(lx2,ly2);
      for(let i=0;i<6;i++){
        lx2+=(side===0?1:-1)*(W*0.04+Math.random()*W*0.04);
        ly2+=H*0.07+Math.random()*H*0.05;
        ctx.lineTo(lx2,ly2);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── 8. İlerleme çubuğu ────────────────────────────────────────
  const barW=W*0.52, barH=4, barX=(W-barW)/2, barY=H*0.89;
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(barX,barY,barW,barH);
  const bg=ctx.createLinearGradient(barX,barY,barX+barW,barY);
  bg.addColorStop(0,meta.c1); bg.addColorStop(1,meta.c2);
  ctx.fillStyle=bg; ctx.fillRect(barX,barY,barW*t,barH);

  ctx.restore();
}

function hexToRgbArr(hex) {
  hex=hex.replace('#','');
  if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return [parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];
}

// HARİTA EKRANI
// ═══════════════════════════════════════════════════════════════════
function mapPlayBtnRect() {
  const bw=Math.min(W*0.58,220), bh=48;
  return { bx:W/2-bw/2, by:H-MAP_BOT_H+12, bw, bh };
}

function drawMapScreen() {
  // ── Background with vertical gradient ──────────────────────────
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#030012'); bg.addColorStop(0.4,'#0a0030'); bg.addColorStop(0.7,'#120040'); bg.addColorStop(1,'#1a0050');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // Subtle star field
  ctx.save();
  for(const s of bgStars){
    const a=0.18+0.15*Math.sin(s.phase+frame*s.speed);
    ctx.globalAlpha=a;
    ctx.fillStyle=s.r>0.8?'#ccaaff':'#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // ── Golden bezier path connecting nodes ─────────────────────────
  for(let n=1;n<MAP_TOTAL;n++){
    const a=mapNodePos(n), b=mapNodePos(n+1);
    if(a.y<MAP_TOP_H-40&&b.y<MAP_TOP_H-40) continue;
    if(a.y>H-MAP_BOT_H+40&&b.y>H-MAP_BOT_H+40) continue;
    const done=n<SAVE.level;
    const midX=(a.x+b.x)/2, midY=(a.y+b.y)/2;
    // Offset control point for curvy path
    const cpx = midX + (a.x<b.x ? -20 : 20);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.quadraticCurveTo(cpx, midY, b.x, b.y);
    if(done){
      const pathGrad=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
      pathGrad.addColorStop(0,'rgba(255,215,0,0.45)');
      pathGrad.addColorStop(1,'rgba(255,180,0,0.35)');
      ctx.strokeStyle=pathGrad;
      ctx.lineWidth=3;
      ctx.shadowColor='#ffd700'; ctx.shadowBlur=6;
    } else {
      ctx.setLineDash([4,8]);
      ctx.strokeStyle='rgba(100,80,160,0.35)';
      ctx.lineWidth=1.5;
    }
    ctx.stroke();
    ctx.restore();
  }

  // ── Draw decorative dots along completed path ───────────────────
  for(let n=1;n<Math.min(SAVE.level,MAP_TOTAL);n++){
    const a=mapNodePos(n), b=mapNodePos(n+1);
    if(a.y<MAP_TOP_H-40&&b.y<MAP_TOP_H-40) continue;
    if(a.y>H-MAP_BOT_H+40&&b.y>H-MAP_BOT_H+40) continue;
    ctx.save(); ctx.globalAlpha=0.3;
    for(let t=0.2;t<=0.8;t+=0.3){
      const cpx=(a.x+b.x)/2+(a.x<b.x?-20:20);
      const px=(1-t)*(1-t)*a.x+2*(1-t)*t*cpx+t*t*b.x;
      const py=(1-t)*(1-t)*a.y+2*(1-t)*t*((a.y+b.y)/2)+t*t*b.y;
      ctx.fillStyle='#ffd700';
      ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // ── Level nodes ─────────────────────────────────────────────────
  for(let n=1;n<=MAP_TOTAL;n++){
    const pos=mapNodePos(n);
    if(pos.y < MAP_TOP_H-35 || pos.y > H-MAP_BOT_H+35) continue;
    const cfg=makeLevelConfig(n);
    const unlocked=n<=SAVE.level;
    const done=n<SAVE.level;
    const stars=SAVE.stars[n]||0;
    const isCurrent=n===SAVE.level;
    const isBoss=cfg.isBoss;
    const baseR = isBoss ? MAP_NODE_R+6 : MAP_NODE_R;
    const r = isCurrent ? baseR+3 : !unlocked ? baseR-3 : baseR;

    ctx.save();

    // Outer glow
    if(isCurrent){
      ctx.shadowColor=isBoss?'#ff3355':'#00ccff';
      ctx.shadowBlur=28+Math.sin(frame*0.08)*8;
    } else if(done){
      ctx.shadowColor='#ffd700'; ctx.shadowBlur=8;
    }

    // Node circle fill
    ctx.beginPath(); ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
    const gr=ctx.createRadialGradient(pos.x-r*0.3,pos.y-r*0.35,0,pos.x,pos.y,r);
    if(!unlocked){
      gr.addColorStop(0,'#1a1a30'); gr.addColorStop(1,'#0a0a18');
    } else if(isBoss && isCurrent){
      gr.addColorStop(0,'#ff5577'); gr.addColorStop(0.7,'#aa1133'); gr.addColorStop(1,'#550015');
    } else if(isBoss && done){
      gr.addColorStop(0,'#cc4466'); gr.addColorStop(1,'#441122');
    } else if(isCurrent){
      gr.addColorStop(0,'#33ccff'); gr.addColorStop(0.6,'#1188cc'); gr.addColorStop(1,'#0a4466');
    } else if(done){
      gr.addColorStop(0,'#44aa55'); gr.addColorStop(0.7,'#227733'); gr.addColorStop(1,'#0d3318');
    } else {
      gr.addColorStop(0,'#1a1a30'); gr.addColorStop(1,'#0a0a18');
    }
    ctx.fillStyle=gr; ctx.fill();

    // Border ring
    ctx.lineWidth = isCurrent ? 2.5 : done ? 1.8 : 1;
    if(!unlocked) ctx.strokeStyle='rgba(60,50,100,0.4)';
    else if(isBoss) ctx.strokeStyle=isCurrent?'#ff6688':'#cc3355';
    else if(isCurrent) ctx.strokeStyle='#00eeff';
    else if(done) ctx.strokeStyle='rgba(255,215,0,0.6)';
    else ctx.strokeStyle='rgba(60,50,100,0.4)';
    ctx.stroke();
    ctx.shadowBlur=0;

    // Boss special border — double ring
    if(isBoss && unlocked){
      ctx.save();
      ctx.globalAlpha=0.4+0.2*Math.sin(frame*0.06);
      ctx.strokeStyle=isCurrent?'#ff4466':'#882244';
      ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(pos.x,pos.y,r+4,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // Node content
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(!unlocked){
      // Locked: dim lock icon
      ctx.globalAlpha=0.35;
      ctx.font=`${Math.round(r*0.65)}px serif`;
      ctx.fillText('🔒',pos.x,pos.y);
    } else if(done){
      // Completed: checkmark + number
      if(isBoss){
        const bMeta = BOSS_META[cfg.bossType] || BOSS_META.yassi_yilan;
        ctx.font=`${Math.round(r*0.6)}px serif`;
        ctx.globalAlpha=0.7;
        ctx.fillText(bMeta.emoji,pos.x,pos.y-2);
        ctx.globalAlpha=1;
        // Small checkmark overlay
        ctx.fillStyle='#44ff44'; ctx.font=`bold ${Math.round(r*0.30)}px Arial`;
        ctx.fillText('✓', pos.x+r*0.45, pos.y-r*0.35);
      } else {
        ctx.fillStyle='#44ff88'; ctx.font=`bold ${Math.round(r*0.48)}px Arial`;
        ctx.fillText('✓', pos.x, pos.y-2);
        ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font=`bold ${Math.round(r*0.28)}px Arial`;
        ctx.fillText(String(n), pos.x, pos.y+r*0.45);
      }
      // Star rating below
      if(stars>0){
        ctx.globalAlpha=0.9;
        ctx.font=`${Math.round(r*0.30)}px serif`;
        ctx.fillStyle='#ffd700';
        ctx.fillText('★'.repeat(stars), pos.x, pos.y+r+9);
      }
    } else if(isCurrent){
      // Current: prominent number with pulse
      if(isBoss){
        const bMeta = BOSS_META[cfg.bossType] || BOSS_META.yassi_yilan;
        ctx.font=`${Math.round(r*0.7)}px serif`;
        ctx.fillText(bMeta.emoji,pos.x,pos.y-2);
        ctx.fillStyle='#ffffff'; ctx.font=`bold ${Math.round(r*0.32)}px Arial`;
        ctx.shadowColor='#ffffff'; ctx.shadowBlur=8;
        ctx.fillText(String(n), pos.x, pos.y+r*0.55);
        // BOSS label
        ctx.fillStyle='#ff4466'; ctx.font=`bold ${Math.round(r*0.24)}px Arial`;
        ctx.fillText('BOSS', pos.x, pos.y-r-8);
      } else {
        ctx.fillStyle='#ffffff'; ctx.font=`bold ${Math.round(r*0.58)}px Arial`;
        ctx.shadowColor='#ffffff'; ctx.shadowBlur=10;
        ctx.fillText(String(n), pos.x, pos.y);
      }
      // Pulsing outer ring
      const pulse=0.4+0.6*Math.sin(frame*0.09);
      ctx.globalAlpha=pulse*0.6;
      ctx.strokeStyle=isBoss?'#ff4466':'#00eeff';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(pos.x,pos.y,r+7,0,Math.PI*2); ctx.stroke();
      // Second pulse ring
      ctx.globalAlpha=pulse*0.25;
      ctx.beginPath(); ctx.arc(pos.x,pos.y,r+13,0,Math.PI*2); ctx.stroke();
    } else {
      // Unlocked but not current (shouldn't happen in normal flow, but handle)
      ctx.fillStyle='#ffffff'; ctx.font=`bold ${Math.round(r*0.48)}px Arial`;
      ctx.fillText(String(n), pos.x, pos.y);
    }

    ctx.restore();
  }

  // ── Top bar — pill badges ───────────────────────────────────────
  // Background
  const topBarGrad=ctx.createLinearGradient(0,0,0,MAP_TOP_H);
  topBarGrad.addColorStop(0,'rgba(5,2,20,0.98)');
  topBarGrad.addColorStop(1,'rgba(10,5,30,0.95)');
  ctx.fillStyle=topBarGrad; ctx.fillRect(0,0,W,MAP_TOP_H);
  // Bottom border glow
  ctx.save();
  const borderGrad=ctx.createLinearGradient(0,MAP_TOP_H-2,0,MAP_TOP_H);
  borderGrad.addColorStop(0,'rgba(100,60,200,0.5)');
  borderGrad.addColorStop(1,'rgba(100,60,200,0)');
  ctx.fillStyle=borderGrad; ctx.fillRect(0,MAP_TOP_H-2,W,2);
  ctx.restore();

  // Title
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#8844ff'; ctx.shadowBlur=14;
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.min(17,W*0.043)}px Arial`;
  ctx.fillText('NJOX — HARİTA', W/2, MAP_TOP_H/2);
  ctx.shadowBlur=0;
  ctx.restore();

  // Left pill: Gold count
  ctx.save();
  const goldPillW=Math.min(72,W*0.20), goldPillH=24, goldPillX=8, goldPillY=MAP_TOP_H/2-goldPillH/2;
  rrect(goldPillX,goldPillY,goldPillW,goldPillH,12);
  ctx.fillStyle='rgba(255,215,0,0.12)'; ctx.fill();
  ctx.strokeStyle='rgba(255,215,0,0.35)'; ctx.lineWidth=1; ctx.stroke();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ffd700'; ctx.font=`bold ${Math.min(11,W*0.028)}px Arial`;
  ctx.fillText(`💰 ${SAVE.gold}`, goldPillX+goldPillW/2, goldPillY+goldPillH/2);
  ctx.restore();

  // Right pill: Completion
  ctx.save();
  const doneCount=Math.max(0,SAVE.level-1);
  const compPillW=Math.min(80,W*0.22), compPillH=24, compPillX=W-compPillW-8, compPillY=MAP_TOP_H/2-compPillH/2;
  rrect(compPillX,compPillY,compPillW,compPillH,12);
  ctx.fillStyle='rgba(100,160,255,0.10)'; ctx.fill();
  ctx.strokeStyle='rgba(100,160,255,0.30)'; ctx.lineWidth=1; ctx.stroke();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(170,210,255,0.9)'; ctx.font=`bold ${Math.min(11,W*0.028)}px Arial`;
  ctx.fillText(`${doneCount}/${MAP_TOTAL}`, compPillX+compPillW/2, compPillY+compPillH/2);
  ctx.restore();

  // ── Bottom bar — OYNA button ────────────────────────────────────
  const botBarGrad=ctx.createLinearGradient(0,H-MAP_BOT_H,0,H);
  botBarGrad.addColorStop(0,'rgba(10,5,30,0.95)');
  botBarGrad.addColorStop(1,'rgba(5,2,20,0.98)');
  ctx.fillStyle=botBarGrad; ctx.fillRect(0,H-MAP_BOT_H,W,MAP_BOT_H);
  // Top border glow
  ctx.save();
  const botBorderGrad=ctx.createLinearGradient(0,H-MAP_BOT_H,0,H-MAP_BOT_H+2);
  botBorderGrad.addColorStop(0,'rgba(100,60,200,0)');
  botBorderGrad.addColorStop(1,'rgba(100,60,200,0.5)');
  ctx.fillStyle=botBorderGrad; ctx.fillRect(0,H-MAP_BOT_H,W,2);
  ctx.restore();

  const {bx:pbx, by:pby, bw:pbw, bh:pbh}=mapPlayBtnRect();
  const pulse2=0.88+0.12*Math.sin(frame*0.08);
  ctx.save();
  ctx.shadowColor='#9933ff'; ctx.shadowBlur=(16+Math.sin(frame*0.08)*6)*pulse2;
  rrect(pbx,pby,pbw,pbh,16);
  const btnG=ctx.createLinearGradient(pbx,pby,pbx+pbw,pby+pbh);
  btnG.addColorStop(0,'#7700ee'); btnG.addColorStop(0.45,'#bb44ff'); btnG.addColorStop(1,'#5500bb');
  ctx.fillStyle=btnG; ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(200,150,255,0.4)'; ctx.lineWidth=1.2; ctx.stroke();
  // Shine highlight
  ctx.save(); rrect(pbx,pby,pbw,pbh,16); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.10)'; rrect(pbx+2,pby+2,pbw-4,pbh*0.45,12); ctx.fill();
  ctx.restore();
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.min(18,W*0.045)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#cc88ff'; ctx.shadowBlur=10;
  ctx.fillText(`▶  BÖLÜM ${SAVE.level} OYNA`, W/2, pby+pbh/2);
  ctx.restore();
}
