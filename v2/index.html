function drawResultBtn(cx,y,w,h,label,color){
  const x=cx-w/2;
  rrect(x,y,w,h,14);
  const g=ctx.createLinearGradient(x,y,x+w,y);
  g.addColorStop(0,color);g.addColorStop(1,color+'aa');
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 15px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=color;ctx.shadowBlur=8;
  ctx.fillText(label,cx,y+h/2);ctx.shadowBlur=0;
}

function drawResultScreen(){
  const won=G.levelResult==='win';
  const cfg=G.levelCfg||makeLevelConfig(G.level);

  // Koyu overlay
  ctx.fillStyle='rgba(4,4,18,0.92)';ctx.fillRect(0,0,W,H);

  const pw=Math.min(W-20,340),ph=280;
  const px=W/2-pw/2,py=H/2-ph/2-20;
  ctx.save();
  ctx.shadowColor=won?'#ffd700':'#ff3d5a';ctx.shadowBlur=22;
  rrect(px,py,pw,ph,20);
  ctx.fillStyle='rgba(14,14,38,0.98)';ctx.fill();ctx.shadowBlur=0;
  ctx.strokeStyle=won?'rgba(255,215,0,0.25)':'rgba(255,61,90,0.25)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();

  const cx=W/2;
  ctx.textAlign='center';ctx.textBaseline='middle';

  if(won){
    // Başlık
    ctx.shadowColor='#ffd700';ctx.shadowBlur=18;
    ctx.fillStyle='#ffd700';ctx.font=`bold 26px Arial`;
    ctx.fillText(`BÖLÜM ${G.level} TAMAM!`,cx,py+36);ctx.shadowBlur=0;
    // Yıldızlar
    for(let i=0;i<3;i++){
      const lit=i<G.winStars;
      ctx.save();
      ctx.shadowColor=lit?'#ffd700':'transparent';ctx.shadowBlur=lit?14:0;
      ctx.fillStyle=lit?'#ffd700':'rgba(60,60,90,0.5)';
      ctx.font='32px serif';
      const sx=cx-36+i*36,sy=py+82;
      ctx.fillText('★',sx,sy);ctx.restore();
    }
    // Altın ödülü
    ctx.fillStyle='#ffd700';ctx.font='bold 14px Arial';
    ctx.fillText(`+${cfg.goldReward} 💰 Altın`,cx,py+120);
    // Skor
    ctx.fillStyle='rgba(200,220,255,0.8)';ctx.font='13px Arial';
    ctx.fillText(`Skor: ${G.score}`,cx,py+146);
    // Butonlar
    drawResultBtn(cx,py+174,150,44,'DEVAM ▶','#00aa66');
    drawResultBtn(cx,py+228,150,40,'HARİTA','#444488');
  } else {
    // Başlık
    ctx.shadowColor='#ff3d5a';ctx.shadowBlur=18;
    ctx.fillStyle='#ff3d5a';ctx.font='bold 28px Arial';
    ctx.fillText('BAŞARAMADIN',cx,py+36);ctx.shadowBlur=0;
    ctx.font='40px serif';ctx.fillText('💀',cx,py+82);
    ctx.fillStyle='rgba(200,200,220,0.75)';ctx.font='13px Arial';
    ctx.fillText(`Bölüm ${G.level} — ${G.turn} tur`,cx,py+118);
    ctx.fillText(`Skor: ${G.score}`,cx,py+140);
    // Butonlar
    drawResultBtn(cx,py+168,150,44,'TEKRAR DENE','#cc4400');
    drawResultBtn(cx,py+222,150,40,'HARİTA','#444488');
  }
}

function drawGameOver() {
  ctx.fillStyle='rgba(5,5,20,0.88)';ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  rrect(cx-160,cy-130,320,300,20);
  ctx.fillStyle='rgba(22,22,52,0.98)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='#ff3d5a';ctx.shadowBlur=22;
  ctx.fillStyle='#ff3d5a';ctx.font='bold 34px Arial';
  ctx.fillText('OYUN BİTTİ',cx,cy-88);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='20px Arial';
  ctx.fillText(`Skor: ${G.score}`,cx,cy-38);
  ctx.fillText(`Bölüm: ${G.level}`,cx,cy+2);
  ctx.fillText(`Toplam tur: ${G.turn}`,cx,cy+40);
  const avgKill=(G.turn>0?(G.score/(G.turn*10*G.level)).toFixed(1):'–');
  ctx.fillStyle='rgba(255,215,0,0.9)';ctx.font='15px Arial';
  ctx.fillText(`Verimlilik: ${avgKill}× ort. çarpan`,cx,cy+72);
  ctx.fillStyle='rgba(255,255,255,0.65)';ctx.font='14px Arial';
  ctx.fillText(`Max top: ${G.ballCount}`,cx,cy+98);
  const bx2=cx-90,by2=cy+112,bw=180,bh=50;
  const bgr=ctx.createLinearGradient(bx2,by2,bx2+bw,by2);
  bgr.addColorStop(0,'#00d084');bgr.addColorStop(1,'#2196f3');
  rrect(bx2,by2,bw,bh,14);ctx.fillStyle=bgr;ctx.fill();
  ctx.shadowColor='#00d084';ctx.shadowBlur=12;
  ctx.fillStyle='#fff';ctx.font='bold 18px Arial';
  ctx.fillText('TEKRAR OYNA',cx,by2+bh/2);ctx.shadowBlur=0;
}

function drawStart() {
  // ── Background ────────────────────────────────────────────────
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,   '#050510');
  bg.addColorStop(0.4, '#09091e');
  bg.addColorStop(0.8, '#070718');
  bg.addColorStop(1,   '#030310');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Stars
  for(const s of bgStars) {
    const tw = 0.15 + 0.85*Math.abs(Math.sin(s.phase + frame*s.speed*0.05));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${tw*0.55})`; ctx.fill();
  }

  // Floating colour orbs — slow drift
  const orbDef = [
    {cx:W*0.18, cy:H*0.25, cr:'#2244ff', spd:0.007},
    {cx:W*0.82, cy:H*0.35, cr:'#ff2288', spd:0.009},
    {cx:W*0.50, cy:H*0.78, cr:'#22aaff', spd:0.006},
  ];
  for(const o of orbDef) {
    const ox = o.cx + Math.sin(frame*o.spd)*W*0.06;
    const oy = o.cy + Math.cos(frame*o.spd*1.3)*H*0.04;
    const og = ctx.createRadialGradient(ox,oy,0,ox,oy,W*0.32);
    const rgb = parseInt(o.cr.slice(1,3),16)+','+parseInt(o.cr.slice(3,5),16)+','+parseInt(o.cr.slice(5,7),16);
    og.addColorStop(0, `rgba(${rgb},0.07)`);
    og.addColorStop(1, `rgba(${rgb},0)`);
    ctx.fillStyle = og; ctx.fillRect(0,0,W,H);
  }

  // Small floating particles
  for(let i=0;i<9;i++){
    const px=W*(0.08+i*0.10)+Math.sin(frame*0.011+i*1.1)*22;
    const py=H*(0.12+i*0.085)+Math.cos(frame*0.013+i*1.4)*16;
    const c=COLORS[i%COLORS.length];
    ctx.save();
    ctx.globalAlpha=0.20;
    ctx.shadowColor=c.a; ctx.shadowBlur=10;
    ctx.fillStyle=c.a;
    ctx.beginPath(); ctx.arc(px,py,2.5+Math.sin(frame*0.055+i)*1.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // (eski NJOX logo + tagline + divider silindi — aşağıda yeni versiyon var)

  // ── 3 feature cards ───────────────────────────────────────────
  const cards = [
    {emoji:'🐉', title:'Boss Savaşı',   sub:'Her 3 bölümde\nboss meydan okur', color:'#ff4466'},
    {emoji:'💰', title:'Altın Topla',   sub:'Blok kır, coin al\nözel top satın al',  color:'#ffd700'},
    {emoji:'💣', title:'Power-ups',     sub:'Bomba,Buz,Kristal\nve daha fazlası', color:'#ff9800'},
  ];
  const margin = 10;
  const cw = Math.floor((W - margin*4) / 3);
  const ch = Math.min(Math.floor(H*0.195), 108);
  const cy0 = H*0.415;
  for(let i=0;i<3;i++){
    const card = cards[i];
    const cx3 = margin + i*(cw + margin);
    ctx.save();
    ctx.shadowColor = card.color;
    ctx.shadowBlur  = 8 + Math.sin(frame*0.045+i*2.1)*3;
    rrect(cx3, cy0, cw, ch, 12);
    const cbg = ctx.createLinearGradient(cx3,cy0,cx3,cy0+ch);
    cbg.addColorStop(0,'rgba(18,18,46,0.94)');
    cbg.addColorStop(1,'rgba(10,10,28,0.97)');
    ctx.fillStyle = cbg; ctx.fill();
    ctx.shadowBlur = 0;
    // border
    ctx.strokeStyle = card.color+'88'; ctx.lineWidth = 1.2; ctx.stroke();
    // top accent bar
    rrect(cx3+2, cy0+2, cw-4, 3, 2);
    ctx.fillStyle = card.color+'55'; ctx.fill();
    // emoji
    ctx.font = `${Math.min(ch*0.34,30)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(card.emoji, cx3+cw/2, cy0+ch*0.30);
    // title
    ctx.shadowColor = card.color; ctx.shadowBlur = 6;
    ctx.fillStyle = card.color;
    ctx.font = `bold ${Math.min(11,W*0.027)}px Arial`;
    ctx.fillText(card.title, cx3+cw/2, cy0+ch*0.55);
    // sub lines
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(185,200,220,0.62)';
    ctx.font = `${Math.min(8.5,W*0.021)}px Arial`;
    card.sub.split('\n').forEach((l,li)=>
      ctx.fillText(l, cx3+cw/2, cy0+ch*0.72+li*11));
    ctx.restore();
  }

  // ── BAŞLA button ──────────────────────────────────────────────
  const btnW = Math.min(W*0.64, 235);
  const btnH = 56;
  const btnX = W/2 - btnW/2;
  const btnY = H*0.82 - btnH/2;
  const pulse = 0.86 + 0.14*Math.sin(frame*0.072);
  ctx.save();
  ctx.shadowColor = '#22bbff';
  ctx.shadowBlur  = (16 + Math.sin(frame*0.072)*7) * pulse;
  const bGrad = ctx.createLinearGradient(btnX,btnY,btnX+btnW,btnY+btnH);
  bGrad.addColorStop(0,   '#0077cc');
  bGrad.addColorStop(0.42,'#22aaff');
  bGrad.addColorStop(0.58,'#8833ff');
  bGrad.addColorStop(1,   '#6622cc');
  rrect(btnX,btnY,btnW,btnH,16);
  ctx.fillStyle = bGrad; ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(100,210,255,0.50)'; ctx.lineWidth = 1.5; ctx.stroke();
  // inner shine strip
  ctx.save();
  rrect(btnX,btnY,btnW,btnH,16); ctx.clip();
  ctx.fillStyle = 'rgba(255,255,255,0.11)';
  rrect(btnX+2,btnY+2,btnW-4,btnH*0.44,12); ctx.fill();
  ctx.restore();
  // text
  ctx.shadowColor = 'rgba(0,180,255,0.85)'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${Math.min(22,W*0.054)}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('OYNA  ▶', W/2, btnY+btnH/2);
  ctx.restore();

  // Version tag
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.font = `${Math.min(9,W*0.022)}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('Njox — Block Crusher  v1.0', W/2, H - 6);
}

function introBallMarketHitboxes() {
  // Returns array of {x,y,r,skin} for each skin option
  const count = BALL_SKINS.length;
  const itemW = Math.min(52, (W - 24) / count);
  const startX = W/2 - (count-1)*itemW/2;
  const y = H * 0.62;
  return BALL_SKINS.map((sk,i) => ({ x: startX + i*itemW, y, r: Math.min(20, itemW*0.38), skin: sk }));
}

function drawIntroScreen() {
  // ── Arka plan ─────────────────────────────────────────────────
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#050010'); bg.addColorStop(0.55,'#0f0025'); bg.addColorStop(1,'#050010');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // Yıldızlar (deterministik)
  ctx.save();
  for(let i=0;i<70;i++) {
    const sx = W * (0.5 + 0.5*Math.sin(i*2.399));
    const sy = H * (0.5 + 0.5*Math.cos(i*1.618));
    const sr = 0.5 + Math.abs(Math.sin(i*3.7))*0.8;
    const sa = 0.2 + 0.5*Math.abs(Math.sin(i*0.55 + frame*0.018));
    ctx.globalAlpha = sa;
    ctx.fillStyle = i%7===0?'#ff88cc':i%4===0?'#88ccff':'#ffffff';
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Zıplayan toplar (arka planda hafif)
  for(const b of INTRO_BALLS) {
    const C = COLORS[b.color % COLORS.length];
    for(let i=0;i<b.trail.length;i++) {
      const t = b.trail[i];
      ctx.save(); ctx.globalAlpha = (i/b.trail.length)*0.22;
      ctx.beginPath(); ctx.arc(t.x,t.y,b.r*(0.3+i/b.trail.length*0.7),0,Math.PI*2);
      ctx.fillStyle = C.a; ctx.fill(); ctx.restore();
    }
    ctx.save();
    ctx.shadowColor = C.a; ctx.shadowBlur = 10; ctx.globalAlpha = 0.55;
    const g = ctx.createRadialGradient(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.05,b.x,b.y,b.r);
    g.addColorStop(0,'#ffffff'); g.addColorStop(0.3,C.shine); g.addColorStop(0.7,C.a); g.addColorStop(1,C.b);
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    ctx.restore();
  }

  // ── Oyun adı: NJOX — temiz, yansımasız ─────────────────────────
  const titleY = H*0.20;
  const njoxSize = Math.min(72, W*0.19);
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font = `900 ${njoxSize}px Arial`;
  ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(0,0,20,0.85)';
  ctx.strokeText('NJOX', W/2, titleY);
  const tg1 = ctx.createLinearGradient(W/2-njoxSize*1.5, titleY-njoxSize*0.4, W/2+njoxSize*1.5, titleY+njoxSize*0.4);
  tg1.addColorStop(0,'#ff44ee'); tg1.addColorStop(0.35,'#ffffff'); tg1.addColorStop(0.7,'#bb55ff'); tg1.addColorStop(1,'#44ddff');
  ctx.fillStyle=tg1; ctx.fillText('NJOX', W/2, titleY);
  ctx.restore();

  // "the Game" — düz yazı, shadow yok
  const subTitleY = titleY + njoxSize*0.55;
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`300 ${Math.min(18,W*0.045)}px Arial`;
  ctx.fillStyle='rgba(200,170,255,0.8)';
  ctx.fillText('the Game', W/2, subTitleY);
  ctx.restore();

  // "Kill the Stress!" — düz yazı, shadow yok
  const stressY = subTitleY + Math.min(24, H*0.036);
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(20,W*0.050)}px Arial`;
  ctx.fillStyle='#ffaa33';
  ctx.fillText('Kill the Stress! 😤', W/2, stressY);
  ctx.restore();

  // ── ▶ BAŞLA butonu ────────────────────────────────────────────
  const btnW=Math.min(W*0.55,200), btnH=50, btnX=W/2-btnW/2, btnY=H*0.68;
  const pulse = 0.88+0.12*Math.sin(frame*0.09);
  ctx.save();
  ctx.shadowColor='#9933ff'; ctx.shadowBlur=(18+Math.sin(frame*0.09)*8)*pulse;
  rrect(btnX,btnY,btnW,btnH,16);
  const bG = ctx.createLinearGradient(btnX,btnY,btnX+btnW,btnY+btnH);
  bG.addColorStop(0,'#7700ee'); bG.addColorStop(0.45,'#bb44ff'); bG.addColorStop(1,'#5500bb');
  ctx.fillStyle=bG; ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(200,150,255,0.5)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.save(); rrect(btnX,btnY,btnW,btnH,16); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.12)'; rrect(btnX+2,btnY+2,btnW-4,btnH*0.45,12); ctx.fill(); ctx.restore();
  ctx.shadowColor='rgba(200,140,255,0.9)'; ctx.shadowBlur=10;
  ctx.fillStyle='#ffffff'; ctx.font=`bold ${Math.min(20,W*0.050)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('▶ BAŞLA', W/2, btnY+btnH/2);
  ctx.restore();

  // ── 🏪 Top Dükkanı butonu ──────────────────────────────────────
  const shopBtnW=180, shopBtnH=40;
  const shopBtnX=W/2-shopBtnW/2, shopBtnY=btnY+btnH+20;
  ctx.save();
  ctx.shadowColor='#ff8800'; ctx.shadowBlur=10+Math.sin(frame*0.07)*4;
  rrect(shopBtnX,shopBtnY,shopBtnW,shopBtnH,12);
  const sG = ctx.createLinearGradient(shopBtnX,shopBtnY,shopBtnX+shopBtnW,shopBtnY+shopBtnH);
  sG.addColorStop(0,'#cc6600'); sG.addColorStop(0.45,'#ff9922'); sG.addColorStop(1,'#cc6600');
  ctx.fillStyle=sG; ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,200,100,0.5)'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.save(); rrect(shopBtnX,shopBtnY,shopBtnW,shopBtnH,12); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.10)'; rrect(shopBtnX+2,shopBtnY+2,shopBtnW-4,shopBtnH*0.45,10); ctx.fill(); ctx.restore();
  ctx.shadowColor='rgba(255,200,100,0.8)'; ctx.shadowBlur=6;
  ctx.fillStyle='#ffffff'; ctx.font=`bold ${Math.min(15,W*0.038)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🏪 Top Dükkanı', W/2, shopBtnY+shopBtnH/2);
  ctx.restore();

  // ── Alt bilgi ─────────────────────────────────────────────────
  ctx.save();
  ctx.fillStyle='rgba(140,100,200,0.40)'; ctx.font=`${Math.min(10,W*0.025)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('Njox the Game  v1.0', W/2, H-10);
  ctx.restore();
}

function render() {
  ctx.clearRect(0,0,W,H);
  if(G.phase==='intro') { drawIntroScreen(); drawShop(); return; }
  if(G.phase==='start'){drawStart();return;}
  if(G.phase==='map'){drawMapScreen();return;}
  if(G.phase==='result'){drawResultScreen();return;}
  if(G.phase==='bossNaming'){drawBossNamingScreen();return;}

  ctx.save();
  if(G.shake>0.5) ctx.translate((Math.random()-0.5)*G.shake,(Math.random()-0.5)*G.shake);

  drawBg();
  for(const co of G.collectors) drawCollector(co);
  for(const bl of G.grid) drawMonster(bl);
  drawBossElements();
  drawCoins();
  drawLuckyBox();
  drawParticles();
  drawFloaters();

  if(G.phase==='shoot'){
    drawTrails();
    for(const b of G.activeBalls) if(!b.done) drawBallAt(b.x,b.y,b.color,BALL_R,b.special);
  }
  if(G.phase==='aim') drawAimLine();
  ctx.restore();

  drawUI();  // bar arkası önce çizilsin

  // Topu UI'ın üstüne çiz
  if(G.phase==='aim') {
    const pu=G.activePowerup!==null?G.powerupSlots[G.activePowerup]:null;
    const sp=pu?['bomb','lightning','fireball','multi'][pu.type]:null;
    drawBallAt(G.launchX, launchY(), G.ballColor, BALL_R+3, sp);

    // Aktif power-up banner
    if(pu) {
      const labels=['💣 BOMBA','⚡ ŞİMŞEK','🔥 ATEŞ TOPU','✨ ÇOKLU','💎 KRİSTAL','🧊 BUZ','🌍 DEV TOP'];
      const col=PU_COLOR[pu.type];
      const bannerY=H-BOT_H-20;
      ctx.save();
      const pw=175,ph=22,bpx=W/2-pw/2;
      rrect(bpx,bannerY-ph/2,pw,ph,11);
      ctx.fillStyle='rgba(0,0,0,0.60)'; ctx.fill();
      ctx.strokeStyle=col; ctx.lineWidth=1.5;
      ctx.shadowColor=col; ctx.shadowBlur=10; ctx.stroke();
      ctx.shadowBlur=6; ctx.fillStyle=col;
      ctx.font='bold 11px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(labels[pu.type]+' — ŞİMDİ ATEŞLE!', W/2, bannerY);
      ctx.restore();
    }
  }
  // ── SON ATIŞ countdown warning (last 5 turns) ──────────────
  {
    // Boss bölümlerinde boss.turnsLeft kullan, normal bölümlerde turnsPerLevel - levelTurns
    const _rem = (G.bossActive && G.boss) ? G.boss.turnsLeft : (G.turnsPerLevel - G.levelTurns);
    if(_rem > 0 && _rem <= 5 && !G.bossJustDefeated && G.bossCollectTimer <= 0 && G.phase==='aim') {
      ctx.save();
      const pulse = 0.55 + 0.45 * Math.abs(Math.sin(frame * 0.1));
      // Pulsing scale animasyonu (0.95x — 1.05x)
      const scalePulse = 1.0 + 0.05 * Math.sin(frame * 0.12);
      const warnFont = Math.max(40, Math.min(52, W * 0.13));
      const warnText = _rem === 1 ? 'SON ATI\u015E!' : 'SON ' + _rem + ' ATI\u015E!';
      const warnX = W/2, warnY = H/2;

      ctx.translate(warnX, warnY);
      ctx.scale(scalePulse, scalePulse);
      ctx.translate(-warnX, -warnY);

      // Büyük koyu yarı saydam arka plan pill (tam genişlik, ~80px)
      ctx.globalAlpha = pulse * 0.7;
      const th = 80;
      const tw = W * 0.88;
      const rx = W/2 - tw/2, ry = warnY - th/2, rr = th/2;
      ctx.fillStyle = 'rgba(0,0,0,0.78)';
      ctx.beginPath();
      ctx.moveTo(rx+rr, ry); ctx.lineTo(rx+tw-rr, ry);
      ctx.arc(rx+tw-rr, ry+rr, rr, -Math.PI/2, Math.PI/2);
      ctx.lineTo(rx+rr, ry+th);
      ctx.arc(rx+rr, ry+rr, rr, Math.PI/2, -Math.PI/2);
      ctx.closePath(); ctx.fill();

      // Kırmızı metin — güçlü beyaz outline/stroke
      ctx.globalAlpha = pulse;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${warnFont}px Arial`;
      // Beyaz outline (stroke)
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 5;
      ctx.lineJoin = 'round';
      ctx.shadowColor = '#ff3300'; ctx.shadowBlur = 24 + Math.sin(frame*0.15)*10;
      ctx.strokeText(warnText, W/2, warnY);
      // Kırmızı dolgu
      ctx.fillStyle = '#ff1111';
      ctx.fillText(warnText, W/2, warnY);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  if(G.bossIntro > 0) drawBossIntro();
  // Boss altın toplama geri sayımı
  if(G.bossCollectTimer > 0) {
    const sec = Math.ceil(G.bossCollectTimer / 60);
    const coinLeft = G.coins.filter(c=>!c.collected).length;
    const alpha = Math.min(1, G.bossCollectTimer / 30);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    // Geri sayım pill
    const tw2 = 220, th2 = 36, tx2 = W/2 - tw2/2, ty2 = TOP_H + 10;
    rrect(tx2, ty2, tw2, th2, 18);
    ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fill();
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5;
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10; ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${Math.min(14,W*0.034)}px Arial`;
    ctx.fillText(`💰 ALTIN TOPLA!  ${sec}s  (${coinLeft} kaldı)`, W/2, ty2 + th2/2);
    ctx.restore();
  }
  drawShop();
  if(G.over) drawGameOver();
}

// ── Input ─────────────────────────────────────────────────────
let touching=false;
function getPos(e) {
  const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;
  return {x:(s.clientX-r.left)*(W/r.width),y:(s.clientY-r.top)*(H/r.height)};
}
function calcAngle(px,py) {
  const raw=Math.atan2(py-launchY(),px-G.launchX);
  const MIN=-Math.PI+0.28, MAX=-0.28;  // min ~16° yukarı açı garanti
  if(raw>=0) return px>=G.launchX ? MAX : MIN;  // aşağı tıklama → en yakın geçerli
  return Math.max(MIN,Math.min(MAX,raw));
}
function checkPowerupTap(p) {
  const slotY=PU_SLOT_Y();
  for(let i=0;i<2;i++){
    const sx=puSlotX(i), dx=p.x-sx, dy=p.y-slotY;
    const hitR = PU_SLOT_R + 14;
    if(dx*dx+dy*dy < hitR*hitR) {
      const pu = G.powerupSlots[i];
      if(pu) {
        // Dolu: aktifleştir/iptal et
        const wasActive = G.activePowerup===i;
        G.activePowerup = wasActive ? null : i;
        if(!wasActive) {
          // Büyük merkez floater + parçacıklar + sarsıntı
          spawnFloater(W/2, H*0.38, PU_EMOJI[pu.type]+' '+PU_LABEL[pu.type]+' AKTİF!', PU_COLOR[pu.type]);
          spawnParticles(sx, slotY, PU_COLOR[pu.type], 14, true);
          G.shake = 8;
          G.puActivateFlash[i] = 0; // flash'ı kapat
        } else {
          spawnFloater(sx, slotY-48, '✖ İPTAL', '#888');
          G.shake = 0;
        }
      } else {
        // Boş: mağazayı aç
        G.shopOpen = true;
        spawnFloater(sx, slotY-48, '🏪 Mağaza açıldı', '#ffd700');
      }
      return true;
    }
  }
  return false;
}
function onDown(e) {
  e.preventDefault();const p=getPos(e);
  // Shop açıksa önce shop'u işle (her fazda çalışır)
  if(G.shopOpen) {
    _shopDragY=p.y; // scroll drag başlat
    const pw=Math.min(W-16,380), ph=Math.min(H*0.95,700);
    const px=(W-pw)/2, py=(H-ph)/2;
    const sc=G.shopScroll||0;
    // Kapat butonu (sabit)
    if(p.x>=px+pw-38&&p.x<=px+pw-2&&p.y>=py+2&&p.y<=py+38){G.shopOpen=false;G.shopScroll=0;_shopDragY=null;return;}
    // Dışarı tıklama
    if(p.x<px||p.x>px+pw||p.y<py||p.y>py+ph){G.shopOpen=false;G.shopScroll=0;_shopDragY=null;return;}
    // İçerik: scroll-adjusted pozisyonlar
    const itemW2=(pw-32)/2, itemH2=72, itemGap2=8, startY2=py+60;
    for(let i=0;i<SHOP_ITEMS.length;i++){
      const it=SHOP_ITEMS[i];
      const col=i%2, row=Math.floor(i/2);
      const ix=px+8+col*(itemW2+itemGap2), iy=startY2+row*(itemH2+itemGap2)-sc;
      if(p.x>=ix&&p.x<=ix+itemW2&&p.y>=iy&&p.y<=iy+itemH2&&p.y>py+44&&p.y<py+ph-8){
        if(G.gold>=it.cost){
          const es=G.powerupSlots.indexOf(null);
          if(es!==-1){
            G.gold-=it.cost; SAVE.gold=G.gold; saveSave();
            G.powerupSlots[es]={type:it.puType,pulse:0}; G.puActivateFlash[es]=180;
            spawnParticles(W/2,H/2,it.color,18,true);
            spawnFloater(W/2,H/2-30,it.emoji+' '+it.name+' ALINDI!',it.color);
            G.shake=5;
          } else { spawnFloater(W/2,H*0.55,'⚠️ Slot dolu!','#ff4444'); }
        } else { spawnFloater(W/2,H*0.55,'💰 Yeterli altın yok!','#ff4444'); }
        return;
      }
    }
    // Skin kartları (scroll-adjusted)
    const sr2=Math.ceil(SHOP_ITEMS.length/2);
    const ssY2=startY2+sr2*(itemH2+itemGap2)+12;
    const skW2=(pw-32)/2, skH2=100, skG2=8, sgY2=ssY2+34;
    for(let i=0;i<BALL_SKINS.length;i++){
      const sk=BALL_SKINS[i];
      const col=i%2, row=Math.floor(i/2);
      const cx2=px+8+col*(skW2+skG2), cy2=sgY2+row*(skH2+skG2)-sc;
      if(p.x>=cx2&&p.x<=cx2+skW2&&p.y>=cy2&&p.y<=cy2+skH2&&p.y>py+44&&p.y<py+ph-8){
        const unlocked=(SAVE.unlockedSkins||['classic']).includes(sk.id);
        if(unlocked){
          SAVE.ballSkin=sk.id; saveSave();
          spawnFloater(W/2,H/2-30,'✓ '+sk.name+' seçildi!','#00ffcc');
        } else {
          showSkinUnlockOverlay(sk);
        }
        return;
      }
    }
    return; // panel içi boş alan — kapatma
  }
  if(G.phase==='intro') {
    // BAŞLA butonu (draw ile senkron: H*0.68)
    const btnW=Math.min(W*0.55,200), btnH=50, btnX=W/2-btnW/2, btnY=H*0.68;
    if(p.x>=btnX&&p.x<=btnX+btnW&&p.y>=btnY&&p.y<=btnY+btnH) {
      G.phase='map';
      return;
    }
    // Top Dükkanı butonu
    const shopBtnW=180, shopBtnH=40;
    const shopBtnX=W/2-shopBtnW/2, shopBtnY=btnY+btnH+20;
    if(p.x>=shopBtnX&&p.x<=shopBtnX+shopBtnW&&p.y>=shopBtnY&&p.y<=shopBtnY+shopBtnH) {
      G.shopOpen = true;
      return;
    }
    return;
  }
  if(G.phase==='start'){
    const btnW=Math.min(W*0.64,235),btnH=56;
    const btnX=W/2-btnW/2,btnY=H*0.82-btnH/2;
    if(p.x>btnX&&p.x<btnX+btnW&&p.y>btnY&&p.y<btnY+btnH){
      scrollToCurrentLevel(); G.phase='map';
    }
    return;
  }
  // ── Harita ekranı tıklama ──────────────────────────────────
  if(G.phase==='map'){
    // Alt bar: OYNA butonu
    const {bx:pbx,by:pby,bw:pbw,bh:pbh}=mapPlayBtnRect();
    if(p.x>=pbx&&p.x<=pbx+pbw&&p.y>=pby&&p.y<=pby+pbh){
      startLevel(SAVE.level); return;
    }
    // Üst bar: dokunma scroll olmasın
    if(p.y<MAP_TOP_H){ MAP_DRAG_Y=null; return; }
    // Alt bar alanı
    if(p.y>H-MAP_BOT_H){ MAP_DRAG_Y=null; return; }
    // Bölüm düğmesine tıklandı mı?
    for(let n=1;n<=MAP_TOTAL;n++){
      const pos=mapNodePos(n);
      if(pos.y<MAP_TOP_H-30||pos.y>H-MAP_BOT_H+30) continue;
      const cfg=makeLevelConfig(n);
      const r=(cfg.isBoss?MAP_NODE_R+5:MAP_NODE_R)+8;
      const dx=p.x-pos.x, dy=p.y-pos.y;
      if(dx*dx+dy*dy<r*r){
        if(n>SAVE.level){ spawnFloater(pos.x,pos.y-30,'🔒 Önce kilidini aç!','#ff4444'); return; }
        // Boss replay maliyeti
        if(cfg.isBoss && n < SAVE.level) {
          const cost = Math.min(200, Math.max(50, n * 12));
          if(G.gold < cost) {
            spawnFloater(pos.x,pos.y-30,`💰 ${cost} altın gerek!`,'#ff8800'); return;
          }
          G.gold -= cost; SAVE.gold = G.gold; saveSave();
          spawnFloater(pos.x,pos.y-30,`-${cost}💰`,'#ffcc44');
        }
        startLevel(n); return;
      }
    }
    MAP_DRAG_Y=p.y; MAP_DRAG_VEL=0;
    return;
  }
  // ── Sonuç ekranı tıklama ──────────────────────────────────
  if(G.phase==='result'){
    const won=G.levelResult==='win';
    const ph=280, cx=W/2;
    const py=H/2-ph/2-20; // modal üst kenar — drawResultScreen ile aynı
    const bw=150, bh1=44, bh2=40;
    // DEVAM / TEKRAR DENE butonu
    const btn1y=py+174;
    if(p.x>cx-bw/2&&p.x<cx+bw/2&&p.y>btn1y&&p.y<btn1y+bh1){
      if(won){ startLevel(Math.min(MAP_TOTAL,G.level+1)); }
      else    { startLevel(G.level); }
      return;
    }
    // HARİTA butonu
    const btn2y=py+228;
    if(p.x>cx-bw/2&&p.x<cx+bw/2&&p.y>btn2y&&p.y<btn2y+bh2){
      scrollToCurrentLevel(); G.phase='map'; return;
    }
    return;
  }
  if(G.over){ initGame(); return; }
  // (fireball teklif tıklama kaldırıldı)

  // (duplicate shop handler silindi — onDown başındaki tek handler yeterli)
  // Üst çubukta 🏪 MAĞAZA butonuna tıklama — her fazda çalışır
  if(p.y<TOP_H) {
    const {bx,by,bw,bh}=shopBtnRect();
    if(p.x>=bx&&p.x<=bx+bw&&p.y>=by&&p.y<=by+bh){ G.shopOpen=!G.shopOpen; return; }
    return;
  }
  // Şanslı Kutu tıklama
  if(G.luckyBox && !G.luckyBox.opened && !G.luckyBox.collected) {
    const lb=G.luckyBox, sz=56;
    if(Math.abs(p.x-lb.x)<sz/2 && Math.abs(p.y-lb.y)<sz/2) {
      openLuckyBox(false); return;
    }
  }
  // Alt çubuk: hız butonu her fazda çalışır
  if(p.y>H-BOT_H) {
    const {bx,by,bw,bh}=speedBtnRect();
    if(p.x>=bx&&p.x<=bx+bw&&p.y>=by&&p.y<=by+bh){
      G.speedMode = G.speedMode===2 ? 1 : 2;
      return;
    }
    if(G.phase==='aim') checkPowerupTap(p);
    return;
  }
  // Skill bar tutorial "Anladım" tıklama
  if(G.phase==='aim' && G.level<=2 && G.turn<=1 && !G._skillTutorialDismissed) {
    const sy2=PU_SLOT_Y(), arrowY2=sy2-50, tbh=48, tby=arrowY2-tbh-6;
    const tbw=Math.min(260,W*0.7), tbx=W/2-tbw/2;
    if(p.x>=tbx&&p.x<=tbx+tbw&&p.y>=tby&&p.y<=tby+tbh+30) {
      G._skillTutorialDismissed=true;
      spawnFloater(W/2,H*0.5,'👍 Harika!','#44ff88');
      return;
    }
  }
  if(G.phase!=='aim') return;
  touching=true;G.aimAngle=calcAngle(p.x,p.y);
}
let _shopDragY=null;
function onMove(e) {
  e.preventDefault();
  const p=getPos(e);
  // Shop scroll
  if(G.shopOpen){
    if(_shopDragY!==null){
      const dy=_shopDragY-p.y;
      if(G.shopScroll===undefined) G.shopScroll=0;
      G.shopScroll=Math.max(0,G.shopScroll+dy);
      _shopDragY=p.y;
    } else { _shopDragY=p.y; }
    return;
  } else { _shopDragY=null; }
  if(G.phase==='map'&&MAP_DRAG_Y!==null){
    const dy=MAP_DRAG_Y-p.y;
    MAP_DRAG_VEL=dy*0.4;
    MAP_SCROLL=Math.max(0,Math.min(maxMapScroll(),MAP_SCROLL+dy));
    MAP_DRAG_Y=p.y;
    return;
  }
  if(!touching||G.phase!=='aim')return;
  G.aimAngle=calcAngle(p.x,p.y);
}
function onUp(e) {
  e.preventDefault();
  if(G.phase==='map'){MAP_DRAG_Y=null;return;}
  if(!touching||G.phase!=='aim')return;
  touching=false;
  if(G.aimAngle!==null){
    G.ballQueue=[];
    let special=null,extraBalls=0;
    if(G.activePowerup!==null&&G.powerupSlots[G.activePowerup]){
      const puType=G.powerupSlots[G.activePowerup].type;
      G.powerupSlots[G.activePowerup]=null;G.activePowerup=null;
      if(puType===PU_BOMB)          special='bomb';
      else if(puType===PU_LIGHTNING) special='lightning';
      else if(puType===PU_FIREBALL)  special='fireball';
      else if(puType===PU_MULTI)     extraBalls=G.ballCount;
      else if(puType===PU_CRYSTAL)   special='crystal';
      else if(puType===PU_ICE)       special='ice';
      else if(puType===PU_GIANT)     special='giant';
    }
    const total=G.ballCount+extraBalls;
    for(let i=0;i<total;i++) G.ballQueue.push(mkBall(G.aimAngle,i===0?special:null));
    G.activeBalls=[];G.phase='shoot';G.aimAngle=null;
  }
}
['touchstart','mousedown'].forEach(ev=>canvas.addEventListener(ev,onDown,{passive:false}));
['touchmove', 'mousemove'].forEach(ev=>canvas.addEventListener(ev,onMove,{passive:false}));
['touchend',  'mouseup'  ].forEach(ev=>canvas.addEventListener(ev,onUp,  {passive:false}));
window.addEventListener('resize',()=>resize());

initGame();
initBossNamingButtons();
initSkinUnlockButtons();
(function loop(){update();render();requestAnimationFrame(loop);})();
</script>
