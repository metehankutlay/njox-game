// ── Sprite sistemi ──────────────────────────────────────────────
const SPRITES = {};

// JPG gibi arka planlı görseller için gri piksel silme
function loadSpriteWithBgRemoval(name, src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const oc = document.createElement('canvas');
      oc.width = img.naturalWidth; oc.height = img.naturalHeight;
      const oc2 = oc.getContext('2d');
      oc2.drawImage(img, 0, 0);
      const id = oc2.getImageData(0, 0, oc.width, oc.height);
      const d = id.data;
      const bgR = d[0], bgG = d[1], bgB = d[2];
      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], g = d[i+1], b = d[i+2];
        const distBg = Math.abs(r-bgR) + Math.abs(g-bgG) + Math.abs(b-bgB);
        const isGray = Math.abs(r-g) < 22 && Math.abs(g-b) < 22 && Math.abs(r-b) < 22;
        if (distBg < 60 || (isGray && r > 110)) d[i+3] = 0;
      }
      oc2.putImageData(id, 0, 0);
      SPRITES[name] = oc;
      resolve();
    };
    img.onerror = () => { console.warn('Sprite yüklenemedi:', src); resolve(); };
    img.src = src;
  });
}

// Sprite sheet'ten tek karakter kes + arka planı temizle
function cropSprite(name, img, sx, sy, sw, sh) {
  const oc = document.createElement('canvas');
  oc.width = sw; oc.height = sh;
  const oc2 = oc.getContext('2d');
  oc2.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
  // Köşe piksel rengiyle arka planı sil (şeffaflık yoksa temizle)
  const id = oc2.getImageData(0, 0, sw, sh);
  const d = id.data;
  const bgR = d[0], bgG = d[1], bgB = d[2];
  // Sadece arka plan temizle: köşeye benzer açık/gri pikselller
  for (let i = 0; i < d.length; i += 4) {
    if (d[i+3] < 10) continue; // zaten saydamsa dokunma
    const r = d[i], g = d[i+1], b = d[i+2];
    const distBg = Math.abs(r-bgR) + Math.abs(g-bgG) + Math.abs(b-bgB);
    const isGray = Math.abs(r-g) < 25 && Math.abs(g-b) < 25 && Math.abs(r-b) < 25;
    if (distBg < 80 || (isGray && r > 150)) d[i+3] = 0;
  }
  oc2.putImageData(id, 0, 0);
  SPRITES[name] = oc;
}

// Kule sprite'ları için koyu arka planı sheet'ten kes, arka plan temizleme gerekmez
function cropSpriteFromSheet(name, img, sx, sy, sw, sh) {
  cropSprite(name, img, sx, sy, sw, sh); // kule.png koyu bg'li, canvas'ta güzel durur
}

// Tüm sprite'ları yükle
let SPRITES_READY = false;
async function loadAllSprites() {
  // ghost_blue.jpg — eski tek görseli de yükle (fallback)
  await loadSpriteWithBgRemoval('ghostBlue', 'ghost_blue.jpg');

  // patiler.png — 5 yaratık sprite sheet (1536×1024, PNG alfa)
  // Düzen: 2 üstte (768×512 her biri), 3 altta (512×512 her biri)
  await new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      cropSprite('monster_ghost',  img,  128,   0, 512, 512); // mavi hayalet — merkez 512×512 (aspect fix)
      cropSprite('monster_fire',   img,  896,   0, 512, 512); // turuncu ateş iblisi — merkez 512×512 (aspect fix)
      cropSprite('monster_cyclops',img,    0, 512, 512, 512); // yeşil tek göz
      cropSprite('monster_bat',    img,  512, 512, 512, 512); // mor yarasa
      cropSprite('monster_skull',  img, 1024, 512, 512, 512); // koyu kafatası
      resolve();
    };
    img.onerror = resolve;
    img.src = 'patiler.png';
  });

  // kule.png — 3 kule sprite sheet (1536×1024, koyu arka plan)
  // Düzen: 3 yan yana (512×1024 her biri)
  await new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      cropSpriteFromSheet('tower_ice',    img,    0, 0, 512, 1024); // buz kulesi
      cropSpriteFromSheet('tower_cannon', img,  512, 0, 512, 1024); // top kulesi
      cropSpriteFromSheet('tower_dark',   img, 1024, 0, 512, 1024); // karanlık kule
      resolve();
    };
    img.onerror = resolve;
    img.src = 'kule.png';
  });

  SPRITES_READY = true;
}

function rollLuckyBox() {
  const r = Math.random();
  let tier = LOOT_TIERS[LOOT_TIERS.length-1];
  for(const t of LOOT_TIERS) { if(r < t.chance) { tier=t; break; } }
  const gold = tier.goldMin + rnd(tier.goldMax - tier.goldMin + 1);
  const ballBuff = tier.ballBuff ? { type:tier.ballBuff, turnsLeft:tier.buffTurns } : null;
  let pu = null;
  if(tier.pu) { const puTypes=[0,1,2,3,4,5,6]; pu = puTypes[rnd(puTypes.length)]; }
  return { tier, gold, ballBuff, pu };
}

function mapNodePos(n) {
  const idx    = n - 1;

  const col    = idx % MAP_COLS;
  const isOdd  = row % 2 === 1;
  const acol   = isOdd ? (MAP_COLS - 1 - col) : col;
  const margin = MAP_NODE_R + 6;
  const spacing = (W - margin*2) / (MAP_COLS - 1);
  return {
    x: margin + acol * spacing,
    y: MAP_TOP_H + MAP_NODE_R + 10 + row * MAP_ROW_H - MAP_SCROLL,
  };
}

function maxMapScroll() {
  const rows = Math.ceil(MAP_TOTAL / MAP_COLS);
  return Math.max(0, MAP_TOP_H + MAP_NODE_R + 10 + rows * MAP_ROW_H - (H - MAP_BOT_H));
}

// Mevcut bölüme haritada scroll yap
function scrollToCurrentLevel() {
  // pos.y zaten scroll hesabını içeriyor — raw Y = pos.y + MAP_SCROLL
  const rawY = MAP_TOP_H + MAP_NODE_R + 10 + Math.floor((Math.min(SAVE.level, MAP_TOTAL)-1) / MAP_COLS) * MAP_ROW_H;
  MAP_SCROLL = Math.max(0, Math.min(maxMapScroll(), rawY - H * 0.5));
}

const DPR = Math.min(window.devicePixelRatio || 1, 2); // max 2x — 3x telefonlarda çok ağır

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0); // tüm çizimler otomatik scale
  // Safe area (iPhone notch / home bar)
  const safeDiv = document.createElement('div');
  safeDiv.style.cssText = 'position:fixed;top:env(safe-area-inset-top,0px);left:0;pointer-events:none';
  document.body.appendChild(safeDiv);
  const safeTop = parseInt(getComputedStyle(safeDiv).top)||0;
  safeDiv.style.top = 'env(safe-area-inset-bottom,0px)';
  const safeBot = parseInt(getComputedStyle(safeDiv).top)||0;
  document.body.removeChild(safeDiv);

  TOP_H = 56 + safeTop;
  BOT_H = 114 + safeBot;
  const avH = H - TOP_H - BOT_H;

  // COLS dinamik: her zaman min 34px blok garantisi, max 12 kolon (mobil oyun dengesi)
  const MIN_BS = 34;
  COLS = Math.max(7, Math.min(12, Math.floor((W + GAP) / (MIN_BS + GAP))));
  BS   = Math.floor((W - GAP * (COLS - 1)) / COLS);
  MAX_ROW = Math.min(Math.floor(avH / (BS + GAP)), 16);
  bgStars = Array.from({length:35}, ()=>({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.6+0.3,
    speed: Math.random()*0.3+0.08,
    phase: Math.random()*Math.PI*2
  }));
  if(G && G.phase==='intro') initIntroBalls();
}

function bx(col) { const tw=COLS*BS+(COLS-1)*GAP; return (W-tw)/2+col*(BS+GAP); }
function by(row) { return TOP_H+row*(BS+GAP); }
function launchY() { return H-BOT_H-BALL_R-4; }  // oyun alanının tam alt kenarı, bar üstü
function rnd(n) { return Math.floor(Math.random()*n); }
function blW(bl) { return bl.span ? BS*bl.span + GAP*(bl.span-1) : BS; }

// 2 slot, geniş aralıklı, ortalanmış (sol=0, sağ=1)
function puSlotX(i) { return W*0.5 + (i - 0.5) * 100; }
const PU_SLOT_R = 27;

// ── Progression helpers ───────────────────────────────────────
function getTier() { return Math.floor(G.turn / 5); }

function handleLevelUp() {
  // Her 7 turda bir, level başına max 2 top — kazanılmış hissettirsin
  const gained = G.ballsGainedThisLevel || 0;
  if (G.turn % 7 === 0 && G.turn > 0 && gained < 2) {
    G.ballCount += 1;
    G.ballsGainedThisLevel = gained + 1;
    spawnFloater(60, H - BOT_H - 36, `+1 🎱  (×${G.ballCount})`, '#00e5ff');
    spawnParticles(60, H - BOT_H - 18, '#00e5ff', 12, false);
    G.shake = 4;
  }
}

function spawnBossBlock() {
  const col = Math.floor(COLS/2);
  // Aynı col'da zaten blok varsa spawn etme
  if (G.grid.some(b => b.col===col && b.row===0 && b.hp>0 && !b._dead)) return;
  const hp = 15 + getTier() * 4;
  G.grid.push({
    col, row:0, color: rnd(COLORS.length),
    hp, maxHp:hp, type:T_STONE,
    x:bx(col), y:by(0)-(BS+GAP),
    startY:by(0)-(BS+GAP), targetY:by(0),
    shake:0, _dead:false, isBoss:true
  });
}

// ── Boss system ───────────────────────────────────────────────
function buildBossPath() {
  const bossRows = Math.min(3, Math.floor(MAX_ROW*0.35));
  const path = [];
  for(let r=0;r<bossRows;r++) {
    if(r%2===0) { for(let c=0;c<COLS;c++) path.push({col:c,row:r}); }
    else        { for(let c=COLS-1;c>=0;c--) path.push({col:c,row:r}); }
  }
  return path;
}

function initBoss() {
  G.bossActive = true;
  const tier = getTier();
  const path = buildBossPath();
  const segLen = Math.min(Math.max(6, 5+Math.floor(G.level/2)), path.length);
  const segHp  = 12 + tier*6;
  const segs   = [];
  // segs[0] = baş (path'in önündeki segment), segs[last] = kuyruk
  for(let i=0;i<segLen;i++) {
    const pos = path[segLen-1-i]; // reversed: segs[0] en öndeki (baş)
    segs.push({ col:pos.col, row:pos.row,
                prevCol:pos.col, prevRow:pos.row,
                x:bx(pos.col), y:by(pos.row),
                displayX:bx(pos.col), displayY:by(pos.row),
                hp:segHp, maxHp:segHp,
                shake:0, _dead:false, isHead:(i===0) });
  }
  // Black holes: orbital hareketi var
  const bhCount = Math.max(1, Math.floor(G.level/10));
  const bh = [];
  for(let i=0;i<bhCount;i++) {
    const col = Math.floor(COLS*(i+1)/(bhCount+1));
    const bossRowCount = Math.floor(path.length/COLS);
    const row = Math.min(MAX_ROW-3, bossRowCount+2);
    const cx = bx(col)+BS/2, cy = by(row)+BS/2;
    bh.push({ col, row,
      centerX:cx, centerY:cy,
      x:cx, y:cy,
      angle: Math.random()*Math.PI*2,
      orbitR: BS*1.6 + Math.random()*BS*1.2,
      orbitSpeed: (0.013+Math.random()*0.012) * (Math.random()<0.5?1:-1),
      pulse:0, active:true });
  }
  // Towers: flanking, ateş edebilir
  const towerHp = 20 + tier*8;
  const bossRowCount = Math.floor(path.length/COLS);
  const twRow = Math.min(MAX_ROW-3, bossRowCount+2);
  const towers = [
    { col:1,       row:twRow, x:bx(1),       y:by(twRow), hp:towerHp, maxHp:towerHp, shake:0, _dead:false, fireTimer:55 },
    { col:COLS-2,  row:twRow, x:bx(COLS-2),  y:by(twRow), hp:towerHp, maxHp:towerHp, shake:0, _dead:false, fireTimer:85 },
  ];
  const bossTypeName = (G.levelCfg && G.levelCfg.bossType) || 'yassi_yilan';
  G.boss = {
    segments:segs, path, pathIdx:segLen-1, turnsLeft:15,
    blackHoles:bh, towers, towerShots:[],
    moveT:0, moveSpeed:0.017,   // sürekli hareket hızı (frame başına)
    type: bossTypeName,
    mechanic: bossTypeName,
  };

  // Mechanic-specific initialization
  const mech = G.boss.mechanic;
  if(mech === 'sarkac') {
    G.boss.swingAngle = 0;
    G.boss.swingCenterX = W/2;
    G.boss.swingRange = W * 0.28;
    const midCol = Math.floor(COLS/2);
    for(const seg of G.boss.segments) { seg.col = midCol; seg.x = bx(midCol); }
  }
  else if(mech === 'ayna_kalkan') {
    G.boss.shield = { hp:5, maxHp:5, broken:false, regenTimer:0, angle:0 };
  }
  else if(mech === 'lazer') {
    G.boss.lazerCharge = 0; G.boss.lazerActive = false;
    G.boss.lazerCooldown = 0; G.boss.lazerRow = 1;
  }
  else if(mech === 'manyetik') {
    G.boss.magnetStrength = 0.22;
  }
  else if(mech === 'buz_frizi') {
    G.boss.freezeTimer = 0; G.boss.freezeCooldown = 0; G.boss.frozen = false;
  }
  else if(mech === 'kabarcik') {
    G.boss.bubbles = Array.from({length:5},(_,i)=>({angle:i*Math.PI*2/5, alive:true}));
    G.boss.bubbleRegenTimer = 0;
    G.boss.bubbleCenter = {x:W/2, y:TOP_H+BS*2};
  }
  else if(mech === 'uc_fazli') {
    G.boss.bossPhase = 1;
  }
  else if(mech === 'kaplama') {
    G.boss.armorLayer = 2;
    const totalHp = G.boss.segments.reduce((a,s)=>a+s.maxHp,0);
    G.boss.armorShellHp = Math.floor(totalHp * 0.3);
    G.boss.armorShellMaxHp = G.boss.armorShellHp;
  }
  else if(mech === 'evrim') {
    G.boss.evoLevel = 0; G.boss.evoTurnTimer = 0;
  }
  else if(mech === 'hibernasyon') {
    G.boss.hibernated = false; G.boss.shellHp = 0; G.boss.shellMaxHp = 0;
  }
  else if(mech === 'son_hamle') {
    G.boss.deathRage = false; G.boss.deathRageTimer = 0; G.boss.deathRageRevives = 0;
  }
  else if(mech === 'teleport') {
    G.boss.teleportFlash = 0;
  }
  else if(mech === 'ziplayin') {
    G.boss.jumpPhase = 'grounded'; G.boss.jumpTimer = 0; G.boss.vulnerableTimer = 0;
  }
  else if(mech === 'rayli') {
    G.boss.railDir = 1; G.boss.railCol = Math.floor(COLS/2);
  }
  else if(mech === 'alev_duvari') {
    G.boss.flameWall = false; G.boss.flameWallTimer = 0; G.boss.flameWallTurn = 0;
  }
  else if(mech === 'tunel') {
    G.boss.tunneling = false; G.boss.tunnelTimer = 0; G.boss.tunnelTurn = 0;
  }

  spawnFloater(W/2, H*0.35, '👹 BOSS GELİYOR!', '#ff2244');
  spawnParticles(W/2, H*0.35, '#ff2244', 35, true);
  spawnParticles(W/2, H*0.35, '#ff8800', 20, true);
  G.shake = 18;
}

function stepBossSnake() {
  // Sürekli animasyon için bir adım ilerle, prevCol/Row kaydet
  const boss = G.boss;
  if(!boss) return;
  const newIdx = (boss.pathIdx+1) % boss.path.length;
  // Tail'den başa kadar: her segment öncekinin MEVCUT col/row'unu alır
  for(let i=boss.segments.length-1;i>0;i--) {
    const from = boss.segments[i-1];
    boss.segments[i].prevCol = boss.segments[i].col;
    boss.segments[i].prevRow = boss.segments[i].row;
    boss.segments[i].col = from.col; boss.segments[i].row = from.row;
  }
  // Head yeni path pozisyonuna gider
  boss.segments[0].prevCol = boss.segments[0].col;
  boss.segments[0].prevRow = boss.segments[0].row;
  const np = boss.path[newIdx];
  boss.segments[0].col = np.col; boss.segments[0].row = np.row;
  boss.pathIdx = newIdx;
  boss.moveT = 0; // animasyonu sıfırla
}

function killBossSeg(seg) {
  spawnParticles(seg.x+BS/2, seg.y+BS/2, '#ff2244', 14, true);
  spawnParticles(seg.x+BS/2, seg.y+BS/2, '#ff8800', 8);
  spawnFloater(seg.x+BS/2, seg.y+BS/2-10, seg.isHead?'💥 KAF!':'-HP', '#ff2244');
  G.shake = Math.max(G.shake, seg.isHead?14:6);
  G.score += Math.round(50 * G.level * G.scoreMultiplier);
  G.combo++; G.comboTimer=90;
  // Boss segment altın düşer
  const coinVal = seg.isHead ? 5+rnd(6) : 2+rnd(4);
  const coinCnt = seg.isHead ? 3 : 1;
  for(let i=0;i<coinCnt;i++) {
    const ox=(Math.random()-0.5)*BS*1.5, oy=(Math.random()-0.5)*BS*1.5;
    spawnCoin(seg.x+BS/2+ox, seg.y+BS/2+oy, coinVal);
  }
}

function bossDefeated() {
  // Son hamle: ölüm öfkesi — boss refuses to die
  if(G.boss && G.boss.mechanic === 'son_hamle' && !G.boss.deathRage && (G.boss.deathRageRevives||0) < 2) {
    G.boss.deathRage = true;
    G.boss.deathRageTimer = 60 * 30; // 30 seconds
    G.boss.segments.forEach(s=>{ if(!s._dead) s.hp = Math.max(1, Math.floor(s.maxHp*0.15)); });
    spawnFloater(W/2, H*0.25, '💀 SON HAMLE! 30sn', '#9933ff');
    spawnParticles(W/2, H*0.3, '#cc66ff', 40, true);
    G.shake = 20;
    return; // don't actually die yet
  }
  const bonus = 800 * G.level;
  G.score += bonus;
  G.ballCount += 2;
  spawnFloater(W/2, H*0.38, `🏆 BOSS YIKILDI! +${bonus}`, '#ffd700');
  spawnParticles(W/2, H*0.38, '#ffd700', 45, true);
  spawnParticles(W/2, H*0.38, '#00d084', 25, true);
  G.shake = 22;
  // Daha fazla altın coin — ekrana dağıt
  for(let i=0;i<16;i++) spawnCoin(
    W*0.1 + Math.random()*W*0.8,
    H*0.22 + Math.random()*H*0.40,
    6 + rnd(12));
  G.bossActive = false; G.boss = null;
  // 5 saniyelik altın toplama fazı — phase='aim' kalır, top atabilir
  G.bossCollectTimer = 600; // 600 frame @ 60fps = 10 saniye
  G.bossJustDefeated = true; // turn sayacını durdur
  G.phase = 'aim';
  // ── Şanslı Kutu ─────────────────────────────────────────────
  G.luckyBox = {
    x: W/2, y: H*0.3,
    vy: 0, pulse: 0,
    collected: false, opened: false,
    reward: null, openAnim: 0,
  };
}

function openLuckyBox(auto=false) {
  if(!G.luckyBox || G.luckyBox.opened) return;
  G.luckyBox.opened = true;
  G.luckyBox.openAnim = 0;
  const reward = rollLuckyBox();
  G.luckyBox.reward = reward;
  const t = reward.tier;
  // Altın ekle
  G.gold += reward.gold;
  SAVE.gold = G.gold;
  // BallBuff ekle
  if(reward.ballBuff) {
    G.ballBuff = reward.ballBuff;
    SAVE.ballBuff = {...reward.ballBuff};
    const bt = BALL_TYPES[reward.ballBuff.type];
    if(bt) spawnFloater(W/2, H*0.32, `${bt.emoji} ${bt.name} (${bt.turns} tur)!`, bt.glow);
  }
  // Güç ekle
  if(reward.pu !== null && reward.pu !== undefined) {
    const slotIdx = G.powerupSlots.indexOf(null);
    if(slotIdx >= 0) { G.powerupSlots[slotIdx] = {type:reward.pu, pulse:0}; G.puActivateFlash[slotIdx] = 180; }
    else { G.powerupSlots[1] = {type:reward.pu, pulse:0}; G.puActivateFlash[1] = 180; }
  }
  // Floater + partikül
  spawnFloater(W/2, H*0.40, `${t.label} +${reward.gold}💰`, t.color);
  spawnParticles(W/2, H*0.42, t.color, t.id==='legendary'?50:t.id==='epic'?35:20, true);
  G.shake = t.id==='legendary'?20:t.id==='epic'?14:8;
  saveSave();
}

// ── Top kilit açma sistemi ─────────────────────────────────────
let _pendingUnlockSkin = null;
let _adInterval = null;

function showSkinUnlockOverlay(skin) {
  _pendingUnlockSkin = skin;
  const ov = document.getElementById('skinUnlockOverlay');
  const preview = document.getElementById('skinUnlockPreview');
  const nameEl = document.getElementById('skinUnlockName');
  const descEl = document.getElementById('skinUnlockDesc');

  // Preview: draw on small canvas element or just show emoji placeholder
  const emojiMap = {tennis:'🎾',football:'⚽',basket:'🏀',bowling:'🎳',dart:'🎯',bomb2:'💣',crystal2:'💎',classic:'🔵'};
  preview.textContent = emojiMap[skin.id] || '🎱';
  nameEl.textContent = skin.name;
  descEl.textContent = `${skin.desc}  |  Hız: ${skin.speedMult}×  Boyut: ${skin.sizeMult}×  Hasar: ${skin.damageMult}×`;
  const gold = G ? G.gold : (SAVE.gold||0);
  if(skin.price > 0) {
    buyBtn.style.display='block';
    buyBtn.textContent = `💰 ${skin.price} Altın ile Satın Al  (Bakiye: ${gold})`;
    buyBtn.style.background = gold >= skin.price ? 'linear-gradient(135deg,#9922ff,#5511aa)' : 'rgba(80,40,80,0.7)';
    buyBtn.onclick = () => {
      if((G ? G.gold : SAVE.gold) >= skin.price) {
        if(G) G.gold -= skin.price;
        SAVE.gold = (G ? G.gold : SAVE.gold);
        SAVE.unlockedSkins = [...(SAVE.unlockedSkins||['classic']), skin.id];
        SAVE.ballSkin = skin.id;
        saveSave();
        hideSkinUnlockOverlay();
      } else {
        buyBtn.style.background = 'rgba(180,40,40,0.8)';
        buyBtn.textContent = '❌ Yetersiz Altın!';
      }
    };
  } else {
    buyBtn.style.display='none';
  }
  if(skin.adCount > 0) {
    adBtn.style.display='block';
    adBtn.textContent = `📺 ${skin.adCount} Reklam İzle`;
    adBtn.onclick = () => { hideSkinUnlockOverlay(); startAdWatch(skin); };
  } else {
    adBtn.style.display='none';
  }
  ov.style.display='block';
}
function hideSkinUnlockOverlay() {
  const ov = document.getElementById('skinUnlockOverlay');
  if(ov) ov.style.display='none';
}
function startAdWatch(skin) {
  const ov = document.getElementById('adOverlay');
  const timerFill = document.getElementById('adTimerFill');
  const timerNum = document.getElementById('adTimerNum');
  const closeBtn = document.getElementById('adCloseBtn');
  if(!ov) return;
  let adCount = skin._adWatched || 0;
  let sec = 5;
  ov.style.display='block';
  timerFill.style.width='100%';
  timerFill.style.transition='none';
  timerNum.textContent=sec;
  closeBtn.style.display='none';
  setTimeout(()=>{timerFill.style.transition='width 5s linear';timerFill.style.width='0%';},50);
  _adInterval = setInterval(()=>{
    sec--;
    timerNum.textContent=Math.max(0,sec);
    if(sec<=0){
      clearInterval(_adInterval);
      closeBtn.style.display='block';
      adCount++;
      skin._adWatched = adCount;
      if(adCount >= skin.adCount) {
        closeBtn.textContent=`✓ ${skin.name} Açıldı! Kapat`;
        closeBtn.onclick=()=>{
          SAVE.unlockedSkins=[...(SAVE.unlockedSkins||['classic']),skin.id];
          SAVE.ballSkin=skin.id; saveSave();
          ov.style.display='none';
        };
      } else {
        closeBtn.textContent=`${adCount}/${skin.adCount} Reklam İzlendi — Devam Et`;
        closeBtn.onclick=()=>{ov.style.display='none';startAdWatch(skin);};
      }
    }
  },1000);
}
function initSkinUnlockButtons() {
  const cancelBtn = document.getElementById('skinUnlockCancel');
  if(cancelBtn) cancelBtn.addEventListener('click', hideSkinUnlockOverlay);
}

function drawBossNamingScreen() {

  ctx.fillStyle='rgba(4,0,18,0.88)'; ctx.fillRect(0,0,W,H);

function bossFailed() {
  spawnFloater(W/2, H*0.35, '⚠️ BOSS KAÇTI!', '#ff6600');
  spawnParticles(W/2, H*0.35, '#ff6600', 20, true);
  // penalty: add 2 extra heavy rows
  const tier = getTier();
  const extraRow = [];
  for(let c=0;c<COLS;c++) {
    if(Math.random()<0.6) {
      const b = mkBlock(c,0,G.level);
      b.type=T_STONE; b.hp=Math.round(b.hp*1.5); b.maxHp=b.hp;
      b.startY=by(0)-(BS+GAP)*2; b.y=b.startY;
      extraRow.push(b);
    }
  }
  G.grid.push(...extraRow);
  G.bossActive = false; G.boss = null;
  G.phase = 'fall'; G.fallProg = 0;
}

// ── Block factory ─────────────────────────────────────────────
function mkBlock(col, row, level) {
  const tier = getTier();
  const isIceWorld = G.levelCfg ? G.levelCfg.isIceWorld : isIceLevel(level);
  const r = Math.random();
  let type = T_NORMAL;
  // Buz dünyasında buz duvarı şansı eklendi
  const iceWallChance = isIceWorld ? Math.min(0.20, 0.08 + (level - ICE_WORLD_START)*0.012) : 0;
  const bombChance    = 0.08; // sabit %8 bomba şansı
  const stoneChance   = isIceWorld ? 0 : Math.min(0.05 + tier*0.010, 0.20); // buz dünyasında taş yok
  const rainbowChance = Math.min(0.05 + tier*0.005, 0.15);
  const bigChance     = Math.min(0.06 + tier*0.008, 0.13);
  const spawnerChance = Math.min(0.03 + tier*0.006, 0.09);
  if      (r < iceWallChance)                                                                              type = T_ICE_WALL;
  else if (r < iceWallChance+bombChance)                                                                   type = T_BOMB;
  else if (r < iceWallChance+bombChance+stoneChance)                                                       type = T_STONE;
  else if (r < iceWallChance+bombChance+stoneChance+rainbowChance)                                         type = T_RAINBOW;
  else if (r < iceWallChance+bombChance+stoneChance+rainbowChance+bigChance)                               type = T_BIG;
  else if (r < iceWallChance+bombChance+stoneChance+rainbowChance+bigChance+spawnerChance)                 type = T_SPAWNER;
  const color = (type===T_RAINBOW||type===T_ICE_WALL) ? -1 : rnd(COLORS.length);
  // HP: azaltılmış zorluk ölçeği
  // L1: 4-7  L5: 9-12  L10: 15-20  L20: 27-35  L50: 63-80  L100: 123-155
  const base = Math.round(3 + level * 1.2);
  const spread = Math.max(4, Math.floor(level * 0.5));
  let hp = base + rnd(spread);
  if (type===T_BOMB)     hp = 1;                        // bomba tek vuruşta patlar
  if (type===T_STONE)    hp = Math.round(hp * 3.0);   // taş sert ama makul
  if (type===T_ICE_WALL) hp = Math.round(base * 1.5);  // buz duvarı sert
  const bl = { col, row, color, hp, maxHp:hp, type,
               x:bx(col), y:by(row), startY:by(row), targetY:by(row), shake:0, _dead:false };
  if (type === T_BIG) { bl.span = 2; bl.hp = Math.round(hp * 3); bl.maxHp = bl.hp; } // dev canavar
  return bl;
}

function genRow(rowIdx, level) {
  const row=[], tier=getTier();
  // Base fill chance — config'den al (daha yoğun başlangıç — ZORLUK ↑)
  const cfgFill = G.levelCfg ? G.levelCfg.fillChance : 0.70;
  const baseChance = Math.max(0.50, cfgFill - tier * 0.008);

  // Column bias pattern — rotates every 4 turns so layout keeps changing
  // 0=left-heavy  1=right-heavy  2=center-peak  3=edges  4=random-scatter
  const biasType = Math.floor(G.turn / 4) % 5;
  // Random strength so consecutive rows don't look identical
  const bStr = 0.45 + Math.random() * 0.55;

  let c = 0;
  while (c < COLS) {
    const norm = COLS > 1 ? c / (COLS - 1) : 0.5; // 0→1 across the row
    let mod = 1.0;
    if      (biasType === 0) mod = 2.0 - norm * 1.8;               // strong left fade
    else if (biasType === 1) mod = 0.2 + norm * 1.8;               // strong right fade
    else if (biasType === 2) mod = 0.2 + Math.sin(norm*Math.PI)*1.8; // centre peak
    else if (biasType === 3) mod = 0.3 + Math.abs(norm-0.5)*3.0;  // both edges
    else                     mod = 0.3 + Math.random() * 1.5;       // scattered

    // Blend bias with flat fill so it never feels too thin on one side
    const colChance = Math.min(0.88, Math.max(0.03,
      baseChance * mod * bStr + baseChance * (1 - bStr)));

    if (Math.random() < colChance) {
      const bl = mkBlock(c, rowIdx, level);
      row.push(bl);
      c += bl.span ? bl.span : 1;
    } else c++;
  }
  // Safety: guarantee at least 1 block per row
  if (row.length === 0) {
    const fc = rnd(COLS);
    const fb = mkBlock(fc, rowIdx, level);
    fb.x = bx(fc); fb.y = by(rowIdx);
    row.push(fb);
  }
  return row;
}

function mkCollector(col, rowIdx) {
  return { col, row:rowIdx,
           x:bx(col)+BS/2, y:by(rowIdx)+BS/2,
           startY:by(rowIdx)+BS/2, targetY:by(rowIdx)+BS/2,
           collected:false, pulse:Math.random()*Math.PI*2 };
}

function genCollectors(rowIdx) {
  const cols=[];
  for(let c=0;c<COLS;c++) if(Math.random()>0.65) cols.push(c);
  if(!cols.length) cols.push(rnd(COLS));
  return cols.slice(0,2).map(c=>mkCollector(c,rowIdx));
}

function startLevel(n) {
  const cfg = makeLevelConfig(n);
  resize();
  G = {
    grid:[], collectors:[],
    phase:'aim',
    ballColor:rnd(COLORS.length), nextColor:rnd(COLORS.length),
    ballCount: Math.max(5, Math.min(35, 4 + Math.floor(n * 0.30))),  // L1=5 L10=7 L30=13 L100=34
    activeBalls:[], ballQueue:[],
    launchX:W/2, aimAngle:null,
    score:0, level:n, turn:0,
    particles:[], floaters:[],
    combo:0, comboTimer:0,
    fallProg:0, over:false,
    powerupSlots:[null,null],
    activePowerup:null, bombUsedThisTurn:false, shake:0,
    fireballOfferTimer:0, puActivateFlash:[0,0],
    levelTurns:0, turnsPerLevel:cfg.turnsAllowed,
    scoreMultiplier:3.0, blocksKilledThisLevel:0,
    bossActive:false, boss:null,
    gold:SAVE.gold, coins:[], shopOpen:false,
    bossIntro:0, bossIntroTimer:0, bossCollectTimer:0, bossJustDefeated:false,
    levelCfg:cfg, levelResult:null, winStars:0,
    blocksTotal:0, speedMode:1,
    ballsGainedThisLevel:0,
    ballBuff: SAVE.ballBuff ? {...SAVE.ballBuff} : {type:null, turnsLeft:0},
    luckyBox: null,
  };
  if (cfg.isBoss) {
    G.bossIntro = 185;
    G.bossIntroTimer = 0;
    // Boss intro animasyonu bittikten sonra initBoss() çağrılır — grid boş kalır
  } else {
    for (let r = 0; r < cfg.initRows; r++) {
      const row = genRow(r, n);
      G.grid.push(...row);
      G.collectors.push(...genCollectors(r));
      G.blocksTotal += row.length;
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// BÖLÜM TAMAMLANDI / KAYBEDİLDİ
// ═══════════════════════════════════════════════════════════════════
function levelComplete(won) {
  const n   = G.level;
  const cfg = G.levelCfg || makeLevelConfig(n);
  // Ekrandaki toplanmamış altınları otomatik topla (boss bitişinde coin kalabilir)
  const leftoverGold = G.coins.filter(c=>!c.collected).reduce((s,c)=>s+c.value, 0);
  G.gold += leftoverGold;
  G.coins = [];
  let stars = 0;
  if (won) {
    const pct = G.blocksTotal > 0 ? (G.blocksKilledThisLevel / G.blocksTotal) * 100 : 100;
    const [s1, s2, s3] = cfg.starThresholds;
    stars = pct >= s3 ? 3 : pct >= s2 ? 2 : pct >= s1 ? 1 : 1;
    const prev = SAVE.stars[n] || 0;
    if (stars > prev) SAVE.stars[n] = stars;
    if (SAVE.level <= n) SAVE.level = Math.min(MAP_TOTAL, n + 1);
    SAVE.gold      = G.gold + cfg.goldReward;
    SAVE.ballCount = G.ballCount;
    G.gold += cfg.goldReward;
    saveSave();
  }
  G.winStars    = stars;
  G.levelResult = won ? 'win' : 'lose';
  // Kazanıldıysa: sadece sıradaki seviye boss ise boss naming göster
  const nextLv = (SAVE ? SAVE.level : G.level) + 1;
  const nextIsBoss = !!(BOSS_SCHEDULE[nextLv] || (nextLv > 35 && nextLv % 10 === 0));
  if(won && nextIsBoss) {
    G.phase = 'bossNaming';
    showBossNamingOverlay();
  } else {
    G.phase = 'result';
  }
}

function initGame() {
  resize();
  SAVE = loadSave();
  // Daily bonus: +25 gold if more than 8 hours since last play
  const now = Date.now();
  if(!SAVE.lastPlay || now - SAVE.lastPlay > 8*3600*1000) {
    SAVE.gold = (SAVE.gold||0) + 25;
    SAVE.lastPlay = now;
    saveSave();
  }
  scrollToCurrentLevel();
  initIntroBalls();
  G = {
    grid:[], collectors:[],
    phase:'intro',
    ballColor:0, nextColor:0,
    ballCount: 5,   // yeni oyun = 5 top
    activeBalls:[], ballQueue:[],
    launchX:W/2, aimAngle:null,
    score:0, level:SAVE.level, turn:0,
    particles:[], floaters:[],
    combo:0, comboTimer:0,
    fallProg:0, over:false,
    powerupSlots:[null,null],
    activePowerup:null, bombUsedThisTurn:false, shake:0,
    fireballOfferTimer:0, puActivateFlash:[0,0],
    levelTurns:0, turnsPerLevel:10,
    scoreMultiplier:3.0, blocksKilledThisLevel:0,
    bossActive:false, boss:null,
    gold:SAVE.gold, coins:[], shopOpen:false,
    bossIntro:0, bossIntroTimer:0, bossCollectTimer:0, bossJustDefeated:false,
    levelCfg:null, levelResult:null, winStars:0, blocksTotal:0, speedMode:1,
    ballsGainedThisLevel:0,
    ballBuff: SAVE.ballBuff ? {...SAVE.ballBuff} : {type:null, turnsLeft:0},
    luckyBox: null,
  };
}

// ── Ball factory ──────────────────────────────────────────────
function mkBall(angle, special=null) {
  const buffType = G.ballBuff && G.ballBuff.turnsLeft > 0 ? G.ballBuff.type : null;
  const skin = BALL_SKINS.find(s=>s.id===(SAVE.ballSkin||'classic')) || BALL_SKINS[0];
  const spd = BALL_SPD * (special ? 1.0 : (skin.speedMult||1.0));
  const sz  = special==='giant' ? BALL_R*2.2 : BALL_R * (special ? 1.0 : (skin.sizeMult||1.0));
  return { x:G.launchX, y:launchY(),
           vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
           color:G.ballColor, done:false, special, trail:[],
           r:sz, buffType,
           damageMult: special ? 1.0 : (skin.damageMult||1.0),
           bounces:0,
  };
}

// ── Particles ─────────────────────────────────────────────────
function spawnParticles(cx,cy,color,cnt,big=false) {
  for(let i=0;i<cnt;i++) {
    const a=Math.PI*2*i/cnt+Math.random()*0.9;
    const sp=big?(6+Math.random()*11):(3+Math.random()*6);
    G.particles.push({ x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      color, life:big?65+rnd(30):45+rnd(20), maxLife:95,
      size:big?(4+Math.random()*8):(2+Math.random()*4) });
  }
}

function spawnFloater(x,y,text,color) {
  G.floaters.push({x,y,text,color,life:75,maxLife:75,vy:-1.9});
}

function spawnCoin(x, y, value) {
  G.coins.push({ x, y, vy:-0.18, value,
    life:420, maxLife:420, pulse:Math.random()*Math.PI*2,
    spinAngle:Math.random()*Math.PI*2, collected:false });
}

// ── Kill block ────────────────────────────────────────────────
function blockAt(col,row) {
  return G.grid.find(b=>{
    if(b.hp<=0||b._dead) return false;
    if(b.span===2) return (col===b.col||col===b.col+1)&&b.row===row;
    return b.col===col&&b.row===row;
  });
}

function killBlock(bl, fromBomb=false) {
  if(bl._dead) return;
  bl._dead=true;
  const cx=bl.x+BS/2, cy=bl.y+BS/2;
  const col=bl.color>=0?COLORS[bl.color].a:'#fff';
  spawnParticles(cx,cy,col,14);

  if(bl.type===T_BOMB) {
    spawnParticles(cx,cy,'#ff9800',24,true);
    spawnParticles(cx,cy,'#ffffff',8,true);
    G.shake=Math.max(G.shake,12);
    for(let dc=-1;dc<=1;dc++) for(let dr=-1;dr<=1;dr++) {
      if(dc===0&&dr===0) continue;
      const nb=blockAt(bl.col+dc,bl.row+dr);
      if(nb&&!nb._dead){const bombDmg=Math.max(3,Math.floor(G.level*0.5));nb.hp-=bombDmg;nb.shake=8;if(nb.hp<=0){nb.hp=0;killBlock(nb,true);}}
    }
  }

  if(bl.type===T_SPAWNER && !fromBomb) {
    // Spawn 2 new blocks in nearby empty cols of same row
    let spawned=0;
    for(let dc=-2;dc<=2&&spawned<2;dc++){
      if(dc===0) continue;
      const nc=bl.col+dc;
      if(nc<0||nc>=COLS) continue;
      if(G.grid.find(b=>b.col===nc&&b.row===bl.row&&!b._dead&&b.hp>0)) continue;
      const nb=mkBlock(nc,bl.row,G.level);
      nb.type=T_NORMAL; nb.hp=Math.max(1,Math.floor(nb.hp*0.6)); nb.maxHp=nb.hp;
      nb.x=bx(nc); nb.y=by(bl.row);
      nb.startY=nb.y; nb.targetY=nb.y;
      G.grid.push(nb);
      spawnParticles(nb.x+BS/2,nb.y+BS/2,'#ff44aa',8);
      spawned++;
    }
    spawnFloater(cx,cy-18,'👾 SPAWN!','#ff44aa');
  }

  const pts=Math.round(10*G.level*(fromBomb?2:1)*G.scoreMultiplier);
  G.score+=pts; G.combo++; G.comboTimer=90; G.blocksKilledThisLevel++;
  spawnFloater(cx,cy-10, bl.type===T_BOMB?'BOOM! 💥':`+${pts}`,
               bl.color>=0?COLORS[bl.color].shine:'#fff');

  // Coin drop based on block type and level
  const coinChance = bl.isBoss ? 0.25 : 0.15;
  const baseVal = bl.isBoss ? 3 + Math.floor(G.level/5) : 1 + Math.floor(G.level/10);
  const goldBuff = G.ballBuff && G.ballBuff.turnsLeft > 0 && G.ballBuff.type === 'gold';
  const coinValue = goldBuff ? baseVal * 3 : baseVal;
  if(!fromBomb && Math.random()<coinChance) {
    spawnCoin(cx, cy, coinValue);
  }
}

// ── Boss center helper ────────────────────────────────────────
function getBossCenter() {
  if(!G.boss||!G.boss.segments) return null;
  const alive = G.boss.segments.filter(s=>!s._dead&&s.hp>0);
  if(alive.length===0) return null;
  const x = alive.reduce((a,s)=>a+s.x,0)/alive.length + BS/2;
  const y = alive.reduce((a,s)=>a+s.y,0)/alive.length + BS/2;
  return {x,y};
}

// ── Ball step ─────────────────────────────────────────────────
function stepBall(b) {
  if(b.done) return;
  b.trail.push({x:b.x,y:b.y,life:9});
  if(b.trail.length>9) b.trail.shift();
  for(const t of b.trail) t.life--;
  b.trail=b.trail.filter(t=>t.life>0);

  const br=b.r||BALL_R;
  // Buz frizi: freeze durumunda hareketsiz kal
  if(G.bossActive && G.boss && G.boss.mechanic === 'buz_frizi' && G.boss.frozen) {
    return; // don't move
  }
  // Manyetik boss çekimi
  if(G.bossActive && G.boss && G.boss.mechanic === 'manyetik') {
    const bc = getBossCenter();
    if(bc) {
      const dx=bc.x-b.x, dy=bc.y-b.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>0 && dist<W*0.7) {
        b.vx += dx/dist * (G.boss.magnetStrength||0.22);
        b.vy += dy/dist * (G.boss.magnetStrength||0.22) * 0.5;
      }
    }
  }
  b.x+=b.vx; b.y+=b.vy;
  if(b.x-br<0)      {b.x=br;       b.vx=Math.abs(b.vx);  b.bounces=(b.bounces||0)+1;}
  if(b.x+br>W)      {b.x=W-br;     b.vx=-Math.abs(b.vx); b.bounces=(b.bounces||0)+1;}
  if(b.y-br<TOP_H)  {b.y=TOP_H+br; b.vy=Math.abs(b.vy);  b.bounces=(b.bounces||0)+1;}
  // Sonsuz sekme önlemi: 28+ sekmede topu aşağı zorla
  if((b.bounces||0) >= 28) { b.vy=Math.abs(b.vy)||2; b.bounces=0; }
  // Min dikey hız: yatay hapı önler
  { const _s=Math.sqrt(b.vx*b.vx+b.vy*b.vy); const _m=_s*0.18;
    if(Math.abs(b.vy)<_m) b.vy=b.vy<0?-_m:_m; }
  // Kabarcık kalkan: top kabarcığa çarpınca kabarcığı patlat
  if(G.bossActive && G.boss && G.boss.mechanic === 'kabarcik' && G.boss.bubbles) {
    const bc2 = getBossCenter() || G.boss.bubbleCenter;
    if(bc2) {
      const bR = BS * 0.85;
      for(const bub of G.boss.bubbles) {
        if(!bub.alive) continue;
        const bx3 = bc2.x + Math.cos(bub.angle)*bR;
        const by3 = bc2.y + Math.sin(bub.angle)*bR;
        const dx=b.x-bx3, dy=b.y-by3, dist=Math.sqrt(dx*dx+dy*dy);
        if(dist < (b.r + BS*0.3)) {
          bub.alive = false;
          spawnParticles(bx3,by3,'#44bbff',8,false);
          b.vx *= -1; b.vy *= -1;
          if(G.boss.bubbles.every(bb=>!bb.alive)) {
            G.boss.bubbleRegenTimer = 4 * 60;
            spawnFloater(W/2,H*0.4,'🫧 Kalkan düştü!','#44bbff');
          }
        }
      }
      // Track bubble shield state
      G.boss._bubbleShielded = G.boss.bubbles.some(bub=>bub.alive);
    }
  }
  if(b.y+br>=H-BOT_H){b.done=true;G.launchX=b.x;return;} // oyun alanı alt sınırı

  for(const bl of G.grid) {
    if(bl.hp<=0||bl._dead) continue;
    const nx=Math.max(bl.x,Math.min(b.x,bl.x+blW(bl)));
    const ny=Math.max(bl.y,Math.min(b.y,bl.y+BS));
    const dx=b.x-nx, dy=b.y-ny;
    if(dx*dx+dy*dy<br*br) {

      if(b.special==='bomb') {
        spawnParticles(bl.x+BS/2,bl.y+BS/2,'#ff9800',28,true);
        spawnParticles(bl.x+BS/2,bl.y+BS/2,'#fff',10,true);
        G.shake=Math.max(G.shake,14);
        for(let dc=-1;dc<=1;dc++) for(let dr=-1;dr<=1;dr++) {
          const nb=blockAt(bl.col+dc,bl.row+dr);
          if(nb&&!nb._dead){nb.hp=0;killBlock(nb,true);}
        }
        if(!bl._dead){bl.hp=0;killBlock(bl,true);}
        b.done=true;
        G.bombUsedThisTurn=true;
        return;
      }

      if(b.special==='lightning') {
        G.shake=Math.max(G.shake,10);
        // En alt satırı bul (oyuncuya en yakın, en yüksek row numarası)
        const aliveBlocks=G.grid.filter(nb=>nb.hp>0&&!nb._dead);
        const maxRow=aliveBlocks.reduce((m,nb)=>Math.max(m,nb.row),-1);
        for(const nb of aliveBlocks) {
          if(nb.row===maxRow) {
            nb.hp=0; killBlock(nb,true);
            spawnParticles(nb.x+BS/2,nb.y+BS/2,'#ffd700',14,true);
            spawnParticles(nb.x+BS/2,nb.y+BS/2,'#fffbe6',6,false);
          }
        }
        // Yıldırım çarpma efekti: dikey şimşek çizgisi
        spawnFloater(W/2, H*0.5, '⚡ YILDIRIM!', '#ffd700');
        b.special=null;
        const ox2=b.x-bl.x-BS/2, oy2=b.y-bl.y-BS/2;
        if(Math.abs(ox2)>Math.abs(oy2)) b.vx=ox2>0?Math.abs(b.vx):-Math.abs(b.vx);
        else b.vy=oy2>0?Math.abs(b.vy):-Math.abs(b.vy);
        return;
      }

      if(b.special==='fireball') {
        const cx=bl.col, cy=bl.row;
        bl.hp-=4; bl.shake=6;
        if(bl.type===T_STONE) bl.hp-=3;
        if(bl.hp<=0){bl.hp=0;killBlock(bl);}
        // AOE hasar 3×3
        for(let dc=-1;dc<=1;dc++) for(let dr=-1;dr<=1;dr++) {
          const nb=blockAt(cx+dc,cy+dr);
          if(nb&&!nb._dead){nb.hp-=2;nb.shake=4;if(nb.hp<=0){nb.hp=0;killBlock(nb,true);}}
        }
        spawnParticles(bl.x+BS/2,bl.y+BS/2,'#ff3d5a',20,true);
        spawnParticles(bl.x+BS/2,bl.y+BS/2,'#ff9800',12,true);
        spawnParticles(bl.x+BS/2,bl.y+BS/2,'#ffff66',8,false);
        return;
      }

      // Kristal top: zıplamadan geçer
      if(b.special==='crystal') {
        let dmg=b.special==='crystal'?3:1;
        bl.hp-=dmg; bl.shake=4;
        if(bl.hp<=0){bl.hp=0;killBlock(bl);}
        spawnParticles(bl.x+blW(bl)/2,bl.y+BS/2,'#88eeff',6);
        continue; // zıplamadan devam et
      }
      // Buz topu: 5×5 alan dondurma
      if(b.special==='ice') {
        const fc=bl.col,fr=bl.row;
        for(let dc=-2;dc<=2;dc++) for(let dr=-2;dr<=2;dr++){
          const nb=blockAt(fc+dc,fr+dr);
          if(nb&&!nb._dead){nb.hp=Math.max(1,Math.floor(nb.hp*0.72));nb.shake=5;spawnParticles(nb.x+BS/2,nb.y+BS/2,'#aaddff',3);}
        }
        spawnParticles(bl.x+blW(bl)/2,bl.y+BS/2,'#ffffff',22,true);
        spawnFloater(bl.x+blW(bl)/2,bl.y+BS/2-12,'🧊 DONDURULDU!','#aaddff');
        G.shake=Math.max(G.shake,6); b.special=null;
      }
      // Dev top: 3× hasar
      const ox=b.x-bl.x-blW(bl)/2, oy=b.y-bl.y-BS/2;
      b.bounces=(b.bounces||0)+1;
      // 28+ sekmede topu aşağı zorla (blok arasında sıkışma önlemi)
      if(b.bounces>=28){ b.vy=Math.abs(b.vy)||2; b.vx*=0.5; b.bounces=0; }
      else if(Math.abs(ox)*BS>Math.abs(oy)*BS) b.vx=ox>0?Math.abs(b.vx):-Math.abs(b.vx);
      else                                 b.vy=oy>0?Math.abs(b.vy):-Math.abs(b.vy);
      // Blok çarpışmasında min dikey hız
      { const _s2=Math.sqrt(b.vx*b.vx+b.vy*b.vy); const _m2=_s2*0.18;
        if(Math.abs(b.vy)<_m2) b.vy=b.vy<0?-_m2:_m2; }
      const skinDmg = b.damageMult || 1.0;
      let dmg = Math.round(skinDmg);
      if(b.special==='giant')           dmg=Math.round(3*skinDmg);
      else if(bl.type===T_RAINBOW)      dmg=3;
      else if(bl.type!==T_STONE&&bl.color===b.color) dmg=Math.round(2*skinDmg);
      else                              dmg=Math.max(1,Math.round(skinDmg));
      // Buz duvarı: sadece buz topu 3× hasar verir, diğerleri 1 hasar
      if(bl.type===T_ICE_WALL) dmg = b.special==='ice' ? 3 : 1;
      // ── BallBuff etkileri ──────────────────────────────────────
      const bt = b.buffType;
      if(bt === 'fire') {
        dmg *= 2;
        // AOE: komşulara 1 hasar
        for(let dc=-1;dc<=1;dc++) for(let dr=-1;dr<=1;dr++) {
          if(dc===0&&dr===0) continue;
          const nb=blockAt(bl.col+dc,bl.row+dr);
          if(nb&&!nb._dead){nb.hp-=1;nb.shake=3;if(nb.hp<=0){nb.hp=0;killBlock(nb,true);}}
        }
        spawnParticles(bl.x+BS/2,bl.y+BS/2,'#ff6600',5,false);
      } else if(bt === 'heavy') {
        if(bl.type===T_STONE) dmg = Math.max(dmg, 3);
        else dmg = Math.max(dmg, 2);
      } else if(bt === 'rainbow') {
        // Aynı satırdaki tüm blokları öldür
        const rr = bl.row;
        for(const nb of G.grid) {
          if(nb.row===rr&&!nb._dead&&nb.hp>0) { nb.hp=0; killBlock(nb,true); spawnParticles(nb.x+BS/2,nb.y+BS/2,'#cc44ff',6); }
        }
        dmg = 0; // already killed
      } else if(bt === 'ice') {
        // Blok HP'sini yar
        bl.hp = Math.max(1, Math.floor(bl.hp * 0.5));
        spawnParticles(bl.x+BS/2,bl.y+BS/2,'#88eeff',4,false);
      }
      bl.hp-=dmg; bl.shake=5;
      if(bl.hp<=0){bl.hp=0;killBlock(bl);}
      // Buz dünyası T_BIG canavarı: %32 ihtimalle topu dondurur/patlatır
      if(bl.type===T_BIG && G.levelCfg && G.levelCfg.isIceWorld && Math.random()<0.32) {
        b.done=true;
        spawnParticles(b.x,b.y,'#aaddff',18,true);
        spawnParticles(b.x,b.y,'#ffffff',6);
        spawnFloater(b.x,b.y-16,'❄️ DONDU!','#aaddff');
      }
      break;
    }
  }

  for(const co of G.collectors) {
    if(co.collected) continue;
    const dx=b.x-co.x, dy=b.y-co.y;
    const r=Math.max(6,BS*0.22);
    if(dx*dx+dy*dy<(BALL_R+r)*(BALL_R+r)) {
      co.collected=true;
      G.ballCount++;
      spawnParticles(co.x,co.y,'#ffd700',16);
      spawnFloater(co.x,co.y-10,'+1 TOP ⭐','#ffd700');
    }
  }
  // Altın toplama
  for(const coin of G.coins) {
    if(coin.collected) continue;
    const cdx=b.x-coin.x, cdy=b.y-coin.y;
    const cr=Math.max(7,BS*0.25);
    if(cdx*cdx+cdy*cdy<(br+cr)*(br+cr)) {
      coin.collected=true;
      G.gold+=coin.value;
      spawnParticles(coin.x,coin.y,'#ffd700',14,true);
      spawnParticles(coin.x,coin.y,'#fff8aa',6);
      spawnFloater(coin.x,coin.y-14,`+${coin.value} 💰`,'#ffd700');
    }
  }

  // ── Boss collision ─────────────────────────────────────────
  if(!G.bossActive||!G.boss) return;

  // Kule mermileri topu patlatır
  for(const sh of G.boss.towerShots) {
    if(sh.life<=0) continue;
    const dx=b.x-sh.x, dy=b.y-sh.y;
    if(dx*dx+dy*dy<(BALL_R+sh.r)*(BALL_R+sh.r)) {
      b.done=true; sh.life=0;
      spawnParticles(b.x,b.y,'#aa44ff',14,true);
      spawnParticles(b.x,b.y,'#ffffff',5);
      spawnFloater(b.x,b.y-14,'💥 PATLATILDI!','#cc44ff');
      return;
    }
  }

  // Black holes swallow balls
  for(const bh of G.boss.blackHoles) {
    if(!bh.active) continue;
    const dx=b.x-bh.x, dy=b.y-bh.y;
    const r=BS*0.55;
    if(dx*dx+dy*dy<(BALL_R+r)*(BALL_R+r)) {
      b.done=true;
      spawnParticles(bh.x,bh.y,'#4400aa',16,true);
      spawnFloater(bh.x,bh.y-14,'🕳️ YUTULD!','#8844ff');
      return;
    }
  }

  // Tower collision
  for(const tw of G.boss.towers) {
    if(tw._dead||tw.hp<=0) continue;
    const nx=Math.max(tw.x,Math.min(b.x,tw.x+BS));
    const ny=Math.max(tw.y,Math.min(b.y,tw.y+BS));
    const dx=b.x-nx, dy=b.y-ny;
    if(dx*dx+dy*dy<BALL_R*BALL_R) {
      if(b.special==='bomb'){tw.hp=0;tw._dead=true;spawnParticles(tw.x+BS/2,tw.y+BS/2,'#ff9800',20,true);b.done=true;G.bombUsedThisTurn=true;return;}
      if(b.special==='fireball'){tw.hp-=4;tw.shake=6;}
      else{tw.hp-=1;tw.shake=5;}
      if(tw.hp<=0){tw._dead=true;spawnParticles(tw.x+BS/2,tw.y+BS/2,'#ff9800',18,true);spawnFloater(tw.x+BS/2,tw.y+BS/2-10,'🗼 YIKIL!','#ff9800');G.score+=Math.round(200*G.level);G.combo++;G.comboTimer=90;}
      const ox=b.x-tw.x-BS/2,oy=b.y-tw.y-BS/2;
      if(Math.abs(ox)*BS>Math.abs(oy)*BS) b.vx=ox>0?Math.abs(b.vx):-Math.abs(b.vx);
      else b.vy=oy>0?Math.abs(b.vy):-Math.abs(b.vy);
      return;
    }
  }

  // Boss segment collision
  for(const seg of G.boss.segments) {
    if(seg._dead||seg.hp<=0) continue;
    const nx=Math.max(seg.x,Math.min(b.x,seg.x+BS));
    const ny=Math.max(seg.y,Math.min(b.y,seg.y+BS));
    const dx=b.x-nx, dy=b.y-ny;
    if(dx*dx+dy*dy<BALL_R*BALL_R) {
      // Kabarcık kalkan: boss segmentine hasar yok iken kalkan aktifse
      if(G.boss._bubbleShielded && G.boss.mechanic === 'kabarcik') {
        const ox=b.x-seg.x-BS/2,oy=b.y-seg.y-BS/2;
        if(Math.abs(ox)*BS>Math.abs(oy)*BS) b.vx=ox>0?Math.abs(b.vx):-Math.abs(b.vx);
        else b.vy=oy>0?Math.abs(b.vy):-Math.abs(b.vy);
        break;
      }
      if(b.special==='bomb'){seg.hp=0;seg._dead=true;killBossSeg(seg);b.done=true;G.bombUsedThisTurn=true;return;}
      if(b.special==='fireball'){
        seg.hp-=4; seg.shake=6;
        // AOE: hit adjacent segments
        const sidx=G.boss.segments.indexOf(seg);
        for(let di=-1;di<=1;di++){const ns=G.boss.segments[sidx+di];if(ns&&!ns._dead){ns.hp-=2;ns.shake=4;if(ns.hp<=0){ns._dead=true;killBossSeg(ns);}}}
        if(seg.hp<=0){seg._dead=true;killBossSeg(seg);}
        spawnParticles(seg.x+BS/2,seg.y+BS/2,'#ff3d5a',14,true);
        return;
      }
      if(b.special==='lightning'){
        // Hits all segments in same row
        for(const ns of G.boss.segments){if(!ns._dead&&ns.row===seg.row){ns.hp-=3;ns.shake=5;if(ns.hp<=0){ns._dead=true;killBossSeg(ns);}}}
        spawnParticles(seg.x+BS/2,seg.y+BS/2,'#ffd700',12);
        b.special=null;
      }
      let dmg=1;
      if(seg.isHead) dmg=2; // head takes double damage
      seg.hp-=dmg; seg.shake=5;
      if(seg.hp<=0){seg._dead=true;killBossSeg(seg);}
      // Teleport boss: teleport after taking accumulated damage
      if(G.boss && G.boss.mechanic === 'teleport') {
        if(!G.boss._lastTeleportHp) G.boss._lastTeleportHp = G.boss.segments.reduce((a,s)=>a+s.hp,0);
        const nowHp = G.boss.segments.filter(s=>!s._dead).reduce((a,s)=>a+s.hp,0);
        if(G.boss._lastTeleportHp - nowHp >= 8) {
          G.boss._lastTeleportHp = nowHp;
          const headSeg = G.boss.segments[0];
          if(headSeg && !headSeg._dead) {
            headSeg.prevCol = headSeg.col; headSeg.prevRow = headSeg.row;
            headSeg.col = rnd(COLS); headSeg.row = Math.min(3, rnd(4));
            headSeg.x = bx(headSeg.col); headSeg.y = by(headSeg.row);
            G.boss.teleportFlash = 20;
            spawnParticles(headSeg.x+BS/2, headSeg.y+BS/2, '#cc44ff', 12, false);
          }
        }
      }
      const ox=b.x-seg.x-BS/2,oy=b.y-seg.y-BS/2;
      if(Math.abs(ox)*BS>Math.abs(oy)*BS) b.vx=ox>0?Math.abs(b.vx):-Math.abs(b.vx);
      else b.vy=oy>0?Math.abs(b.vy):-Math.abs(b.vy);
      break;
    }
  }
}

// ── Advance turn ──────────────────────────────────────────────
function advanceTurn() {
  // Boss yenildiyse tur sayacını artırma — oyuncu loot toplasın
  if(G.bossJustDefeated) return;
  G.turn++;
  G.levelTurns++;

  // ── Boss phase turn ───────────────────────────────────────
  if(G.bossActive && G.boss) {
    G.scoreMultiplier = Math.max(0.5, 3.0 - (G.levelTurns/G.turnsPerLevel)*2.5);
    G.grid=G.grid.filter(b=>b.hp>0&&!b._dead);
    G.boss.segments=G.boss.segments.filter(s=>!s._dead);
    G.boss.blackHoles=G.boss.blackHoles.filter(bh=>bh.active);
    G.boss.towers=G.boss.towers.filter(t=>!t._dead);
    G.boss.towerShots=G.boss.towerShots.filter(s=>s.life>0);
    G.coins=G.coins.filter(c=>!c.collected&&c.life>0);
    G.ballColor=G.nextColor; G.nextColor=rnd(COLORS.length);
    G.combo=0;
    const aliveCnt=G.boss.segments.filter(s=>!s._dead&&s.hp>0).length;
    if(aliveCnt===0) { bossDefeated(); return; }
    G.boss.turnsLeft--;
    if(G.boss.turnsLeft<=0) { bossFailed(); return; }
    // Snake hareket artık update()'de sürekli yapılıyor — burada ekstra hız ver
    G.boss.moveSpeed = Math.min(0.032, G.boss.moveSpeed + 0.002);

    // Boss turn-based mechanics
    const mechT = G.boss.mechanic;
    const bossT = G.boss;

    // BUZ FRİZİ: her 6 turda bir dondur
    if(mechT === 'buz_frizi') {
      bossT.freezeCooldown = (bossT.freezeCooldown||0) + 1;
      if(bossT.freezeCooldown >= 6) {
        bossT.freezeCooldown = 0;
        bossT.frozen = true;
        bossT.freezeTimer = 90;
        spawnFloater(W/2, H*0.3, '❄️ DONDURULDU! 1.5sn', '#88eeff');
        spawnParticles(W/2, H*0.35, '#ccffff', 20, true);
      }
    }

    // EVRİM: her 3 turda evo level artır
    if(mechT === 'evrim') {
      bossT.evoTurnTimer = (bossT.evoTurnTimer||0) + 1;
      if(bossT.evoTurnTimer >= 3 && (bossT.evoLevel||0) < 3) {
        bossT.evoLevel = (bossT.evoLevel||0) + 1;
        bossT.evoTurnTimer = 0;
        const bonus = Math.floor((bossT.segments[0]?.maxHp||20) * 0.2);
        bossT.segments.filter(s=>!s._dead&&s.hp>0).forEach(s=>{
          s.hp = Math.min(s.maxHp, s.hp + bonus);
        });
        const evoColors = ['','#aaff88','#ffff44','#ff4400'];
        spawnFloater(W/2, H*0.3, `🦠 EVRİM ${bossT.evoLevel}!`, evoColors[bossT.evoLevel]);
        spawnParticles(W/2, H*0.3, evoColors[bossT.evoLevel], 25, true);
        G.shake = 10;
      }
    }

    // LAZER: her 5 turda lazer ateşle
    if(mechT === 'lazer') {
      bossT.lazerCooldown = (bossT.lazerCooldown||0) + 1;
      if(bossT.lazerCooldown >= 5) {
        bossT.lazerCooldown = 0;
        bossT.lazerActive = true;
        bossT.lazerTimer = 90;
        bossT.lazerRow = bossT.segments[0] ? bossT.segments[0].row + 1 : 2;
        spawnFloater(W/2, H*0.3, '🔴 LAZER!', '#ff2222');
      }
    }

    // ALEV DUVARI: her 4 turda aktif/pasif
    if(mechT === 'alev_duvari') {
      bossT.flameWallTurn = (bossT.flameWallTurn||0) + 1;
      if(bossT.flameWallTurn >= 4) {
        bossT.flameWallTurn = 0;
        bossT.flameWall = !(bossT.flameWall||false);
        spawnFloater(W/2, H*0.35, bossT.flameWall?'🔥 ALEV DUVARI!':'🔥 Duvar kalktı', '#ff6600');
      }
    }

    // TUNEL: her 5 turda tünel
    if(mechT === 'tunel') {
      bossT.tunnelTurn = (bossT.tunnelTurn||0) + 1;
      if(bossT.tunnelTurn >= 5 && !bossT.tunneling) {
        bossT.tunnelTurn = 0;
        bossT.tunneling = true;
        bossT.tunnelTimer = 60;
        bossT._tunnelTargetCol = rnd(COLS);
        spawnFloater(W/2, H*0.3, '🌀 TÜNEL!', '#00ff99');
      }
    }

    G.phase='aim'; G.aimAngle=null;
    return;
  }
  // ── Normal turn continues below ───────────────────────────

  // Çarpan her turda erir: 3.0 → 0.5 arası
  G.scoreMultiplier = Math.max(0.5, 3.0 - (G.levelTurns / G.turnsPerLevel) * 2.5);

  G.grid=G.grid.filter(b=>b.hp>0&&!b._dead);
  G.collectors=G.collectors.filter(c=>!c.collected);
  G.coins=G.coins.filter(c=>!c.collected&&c.life>0);
  for(const b of G.grid) b._dead=false;

  if(G.bombUsedThisTurn) {
    spawnFloater(W/2,H*0.38,'💥 BLOKLAR DURDU!','#ff9800');
  } else {
    for(const b of G.grid){b.startY=b.y;b.row++;b.targetY=by(b.row);}
    for(const co of G.collectors){co.startY=co.y;co.row++;co.targetY=by(co.row)+BS/2;}

    // ── Değişken iniş: en alttaki 1-2 blok ekstra 1 sıra iner ──
    {
      let maxRow = 0;
      for(const b of G.grid){ if(b.hp>0 && !b._dead && b.row>maxRow) maxRow=b.row; }
      const bottomBlocks = G.grid.filter(b => b.hp>0 && !b._dead && b.row===maxRow);
      const advanceCount = Math.min(2, Math.floor(Math.random()*3)); // 0-2 blok
      for(let i=0; i<advanceCount && bottomBlocks.length>0; i++){
        const idx = Math.floor(Math.random()*bottomBlocks.length);
        const b = bottomBlocks.splice(idx,1)[0];
        b.row += 1; // normal +1'e ek +1
        b.targetY = by(b.row);
      }
    }

    // ── Bölüm sonu kontrolü (harita sistemi) ─────────────────
    if(G.levelTurns >= G.turnsPerLevel) {
      levelComplete(true);
      return;
    }

    const nb=genRow(0,G.level), nc=genCollectors(0);
    G.blocksTotal += nb.length;
    for(const b of nb){b.startY=by(0)-(BS+GAP);b.y=b.startY;G.grid.push(b);}
    for(const c of nc){c.startY=by(0)-(BS+GAP)+BS/2;c.y=c.startY;G.collectors.push(c);}
  }

  G.bombUsedThisTurn=false;
  G.ballColor=G.nextColor; G.nextColor=rnd(COLORS.length);
  G.combo=0;

  // Kalan tur floating text — boss'ta boss.turnsLeft kullan
  const remaining = (G.bossActive && G.boss) ? G.boss.turnsLeft : (G.turnsPerLevel - G.levelTurns);
  const _tTotal = (G.bossActive && G.boss) ? 15 : G.turnsPerLevel;
  if(remaining > 0 && remaining <= _tTotal) {
    const turColor = remaining <= 3 ? '#ff4444' : remaining <= Math.ceil(_tTotal/2) ? '#ffaa00' : '#44ff88';
    spawnFloater(W/2, H*0.5, '\u23F3 ' + remaining + ' tur kald\u0131', turColor);
  }

  handleLevelUp();
  if (G.turn % 10 === 0 && !G.bossActive) spawnBossBlock();

  // BallBuff tur sayacı
  if(G.ballBuff && G.ballBuff.turnsLeft > 0) {
    G.ballBuff.turnsLeft--;
    if(G.ballBuff.turnsLeft <= 0) {
      const bt = BALL_TYPES[G.ballBuff.type];
      G.ballBuff = {type:null, turnsLeft:0};
      SAVE.ballBuff = G.ballBuff;
      if(bt) spawnFloater(W/2, H*0.45, `${bt.emoji} ${bt.name} bitti!`, bt.color);
    }
  }

  // (fireball teklif banner'ı kaldırıldı)

  G.phase='fall'; G.fallProg=0;
}

function eio(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

// ── Update ────────────────────────────────────────────────────
let frame=0;
function update() {
  frame++;
  // Harita momentum scroll — map fazında da çalışır
  if(MAP_DRAG_VEL !== 0) {
    MAP_SCROLL = Math.max(0, Math.min(maxMapScroll(), MAP_SCROLL - MAP_DRAG_VEL));
    MAP_DRAG_VEL *= 0.88;
    if(Math.abs(MAP_DRAG_VEL) < 0.3) MAP_DRAG_VEL = 0;
  }
  if(G.phase==='intro') {
    for(const b of INTRO_BALLS) {
      b.trail.push({x:b.x,y:b.y});
      if(b.trail.length>12) b.trail.shift();
      b.x+=b.vx; b.y+=b.vy;
      if(b.x-b.r<0||b.x+b.r>W) b.vx*=-1;
      if(b.y-b.r<0||b.y+b.r>H) b.vy*=-1;
    }
    return;
  }
  if(G.phase==='start'||G.phase==='map'||G.phase==='result'||G.phase==='bossNaming'||G.over) return;

  if(G.shake>0){G.shake*=0.78;if(G.shake<0.3)G.shake=0;}

  G.particles=G.particles.filter(p=>p.life>0);
  for(const p of G.particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.vx*=0.93;p.life--;}
  G.floaters=G.floaters.filter(f=>f.life>0);
  for(const f of G.floaters){f.y+=f.vy;f.life--;}
  for(const b of G.grid) if(b.shake>0) b.shake--;
  for(const co of G.collectors) co.pulse=(co.pulse+0.08)%(Math.PI*2);
  for(const pu of G.powerupSlots) if(pu) pu.pulse=(pu.pulse+0.06)%(Math.PI*2);
  // fireballOfferTimer kaldırıldı
  for(let i=0;i<2;i++) if(G.puActivateFlash[i]>0) G.puActivateFlash[i]--;
  if(G.bossActive&&G.boss) {
    const boss=G.boss;
    // ── Yılan sürekli hareketi ──────────────────────────────
    boss.moveT += boss.moveSpeed;
    if(boss.moveT >= 1) stepBossSnake(); // bir sonraki adıma geç
    // Interpolasyon: her segmentin x,y'sini smooth güncelle
    const t = Math.min(1, boss.moveT);
    const te = t<0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out
    for(let si=0; si<boss.segments.length; si++) {
      const seg = boss.segments[si];
      if(seg._dead) continue;
      const px = bx(seg.prevCol !== undefined ? seg.prevCol : seg.col);
      const py = by(seg.prevRow !== undefined ? seg.prevRow : seg.row);
      const tx2 = bx(seg.col), ty2 = by(seg.row);
      seg.x = px + (tx2-px)*te;
      seg.y = py + (ty2-py)*te;
      // Smooth display positions with lerp — head faster, body segments follow with delay
      const lerpFactor = si === 0 ? 0.18 : Math.max(0.06, 0.14 - si * 0.012);
      if(seg.displayX === undefined) { seg.displayX = seg.x; seg.displayY = seg.y; }
      seg.displayX += (seg.x - seg.displayX) * lerpFactor;
      seg.displayY += (seg.y - seg.displayY) * lerpFactor;
      // Snake-like undulation perpendicular to movement direction
      if(si > 0) {
        const prevSeg = boss.segments[si-1];
        const mdx = seg.x - (prevSeg._dead ? seg.x : prevSeg.x);
        const mdy = seg.y - (prevSeg._dead ? seg.y : prevSeg.y);
        const moveAngle = Math.atan2(mdy, mdx);
        const wave = Math.sin(frame * 0.08 + si * 1.2) * BS * 0.08;
        seg.displayX += Math.cos(moveAngle + Math.PI/2) * wave;
        seg.displayY += Math.sin(moveAngle + Math.PI/2) * wave;
      }
      if(seg.shake>0) seg.shake--;
    }
    // ── Kara delik orbital hareketi ─────────────────────────
    for(const bh of boss.blackHoles) {
      bh.pulse=(bh.pulse+0.07)%(Math.PI*2);
      bh.angle=(bh.angle+bh.orbitSpeed)%(Math.PI*2);
      bh.x = Math.max(BS, Math.min(W-BS, bh.centerX + Math.cos(bh.angle)*bh.orbitR));
      bh.y = Math.max(TOP_H+BS, Math.min(H-BOT_H-BS*2, bh.centerY + Math.sin(bh.angle)*bh.orbitR));
    }
    // ── Kule: titreşim + ateş ───────────────────────────────
    for(const tw of boss.towers) {
      if(tw.shake>0) tw.shake--;
      if(tw._dead||tw.hp<=0) continue;
      tw.fireTimer--;
      if(tw.fireTimer<=0) {
        tw.fireTimer = 70 + rnd(40); // ~1.2-1.8 saniyede bir
        // Topların bulunduğu yöne ateş et
        const tx2=G.launchX, ty2=launchY();
        const dx=tx2-(tw.x+BS/2), dy=ty2-(tw.y+BS/2);
        const dist=Math.hypot(dx,dy)||1;
        const spd=5.5;
        boss.towerShots.push({
          x:tw.x+BS/2, y:tw.y+BS/2,
          vx:dx/dist*spd + (Math.random()-0.5)*1.5,
          vy:dy/dist*spd,
          life:140, maxLife:140, r:5,
        });
        spawnParticles(tw.x+BS/2,tw.y+BS/2,'#aa44ff',6);
        tw.shake=3;
      }
    }
    // ── Kule mermileri hareket ──────────────────────────────
    for(const sh of boss.towerShots) {
      sh.x+=sh.vx; sh.y+=sh.vy;
      sh.vy+=0.07; // hafif yer çekimi efekti
      sh.life--;
    }
    boss.towerShots = boss.towerShots.filter(s=>s.life>0&&s.y<H-BOT_H+20);

    // ── Per-mechanic boss update ──────────────────────────────
    const mech = boss.mechanic;

    // SARKAÇ: sinüs dalgasıyla yatay sallanma
    if(mech === 'sarkac') {
      boss.swingAngle = (boss.swingAngle||0) + 0.025;
      const targetX = boss.swingCenterX + Math.sin(boss.swingAngle) * boss.swingRange;
      const targetCol = Math.max(0, Math.min(COLS-1, Math.round((targetX - BS/2) / BS)));
      if(boss.segments[0]) {
        boss.segments[0].col = targetCol;
        boss.segments[0].x = bx(targetCol);
      }
    }

    // AYNA KALKAN: kalkan dönüyor
    if(mech === 'ayna_kalkan' && boss.shield) {
      boss.shield.angle = (boss.shield.angle + 0.03) % (Math.PI*2);
      if(boss.shield.broken) {
        boss.shield.regenTimer--;
        if(boss.shield.regenTimer <= 0) {
          boss.shield.broken = false;
          boss.shield.hp = boss.shield.maxHp;
          spawnFloater(W/2, H*0.35, '🪞 KALKAN YENİLENDİ!', '#88ccff');
        }
      }
    }

    // TELEPORT: flash timer
    if(mech === 'teleport' && (boss.teleportFlash||0) > 0) {
      boss.teleportFlash--;
    }

    // BUZ FRİZİ: freeze timer countdown
    if(mech === 'buz_frizi') {
      if(boss.frozen && (boss.freezeTimer||0) > 0) {
        boss.freezeTimer--;
        if(boss.freezeTimer <= 0) {
          boss.frozen = false;
          spawnFloater(W/2, H*0.4, '❄️ Buz çözüldü!', '#88eeff');
        }
      }
    }

    // KABARCIK: regen timer + rotate
    if(mech === 'kabarcik' && boss.bubbles) {
      const bc3 = getBossCenter();
      if(bc3) boss.bubbleCenter = bc3;
      if((boss.bubbleRegenTimer||0) > 0) {
        boss.bubbleRegenTimer--;
        if(boss.bubbleRegenTimer <= 0) {
          boss.bubbles.forEach(b2=>b2.alive=true);
          boss._bubbleShielded = true;
          spawnFloater(W/2, H*0.4, '🫧 Kabarcıklar yenilendi!', '#44bbff');
        }
      }
      boss.bubbles.forEach((b2,i)=>{b2.angle=(b2.angle+0.025)%(Math.PI*2);});
    }

    // ÜÇ FAZLI: HP threshold checks
    if(mech === 'uc_fazli' && boss.segments) {
      const aliveS = boss.segments.filter(s=>!s._dead&&s.hp>0);
      const totHpP = aliveS.reduce((a,s)=>a+s.hp,0);
      const totMaxP = aliveS.reduce((a,s)=>a+s.maxHp,0);
      const hpRP = totMaxP > 0 ? totHpP/totMaxP : 1;
      const newPhase = hpRP > 0.6 ? 1 : hpRP > 0.3 ? 2 : 3;
      if(newPhase !== (boss.bossPhase||1)) {
        boss.bossPhase = newPhase;
        boss.moveSpeed *= 1.5;
        spawnFloater(W/2, H*0.3, `🐲 FAZ ${newPhase}!`, newPhase===2?'#ffaa00':'#ff2244');
        spawnParticles(W/2, H*0.3, newPhase===2?'#ffaa00':'#ff2244', 30, true);
        G.shake = 14;
      }
    }

    // ZİPLAYIN: jump phases (frame-based)
    if(mech === 'ziplayin') {
      boss.vulnerableTimer = Math.max(0, (boss.vulnerableTimer||0) - 1);
      if((boss.jumpPhase||'grounded') === 'grounded') {
        boss.jumpTimer = (boss.jumpTimer||0) + 1;
        if(boss.jumpTimer > 120) {
          boss.jumpPhase = 'jumping';
          boss.jumpTimer = 0;
          boss.jumpTarget = { col: rnd(COLS), row: Math.min(3, rnd(4)) };
        }
      } else if(boss.jumpPhase === 'jumping') {
        boss.jumpTimer = (boss.jumpTimer||0) + 1;
        if(boss.jumpTimer > 40) {
          boss.jumpPhase = 'landing';
          boss.jumpTimer = 0;
          if(boss.segments[0]) {
            boss.segments[0].col = boss.jumpTarget.col;
            boss.segments[0].x = bx(boss.jumpTarget.col);
            boss.segments[0].row = boss.jumpTarget.row;
            boss.segments[0].y = by(boss.jumpTarget.row);
          }
          spawnParticles(boss.segments[0]?boss.segments[0].x+BS/2:W/2, boss.segments[0]?boss.segments[0].y+BS/2:H*0.3, '#44dd44', 20, false);
          G.shake = 6;
        }
      } else if(boss.jumpPhase === 'landing') {
        boss.vulnerableTimer = 90;
        boss.jumpPhase = 'grounded';
        boss.jumpTimer = 0;
      }
    }

    // RAYLI: rail movement (frame-based)
    if(mech === 'rayli' && boss.segments[0]) {
      const hpSegsR = boss.segments.filter(s=>!s._dead);
      const hpRR = hpSegsR.length > 0 ? hpSegsR.reduce((a,s)=>a+s.hp,0)/hpSegsR.reduce((a,s)=>a+s.maxHp,0) : 1;
      // Move every ~20 frames
      if(frame % 20 === 0) {
        const speed = Math.ceil(1 + (1-hpRR)*2);
        boss.railCol = (boss.railCol||Math.floor(COLS/2)) + (boss.railDir||1) * speed;
        if(boss.railCol >= COLS-1) { boss.railCol = COLS-1; boss.railDir = -1; }
        if(boss.railCol <= 0) { boss.railCol = 0; boss.railDir = 1; }
        boss.segments.forEach(s=>{ s.col=boss.railCol; s.x=bx(boss.railCol); });
      }
    }

    // ALEV DUVARI: frame-based toggle
    if(mech === 'alev_duvari') {
      boss.flameWallTimer = (boss.flameWallTimer||0) + 1;
      if(boss.flameWallTimer > 300) {
        boss.flameWall = !(boss.flameWall||false);
        boss.flameWallTimer = 0;
      }
    }

    // HİBERNASYON: %50 HP'de kristal kabuk
    if(mech === 'hibernasyon' && !boss.hibernated && boss.segments) {
      const aliveH = boss.segments.filter(s=>!s._dead&&s.hp>0);
      const totHpH = aliveH.reduce((a,s)=>a+s.hp,0);
      const totMaxH = aliveH.reduce((a,s)=>a+s.maxHp,0);
      if(totMaxH > 0 && totHpH/totMaxH < 0.5) {
        boss.hibernated = true;
        boss.shellHp = Math.floor(totMaxH * 0.3);
        boss.shellMaxHp = boss.shellHp;
        spawnFloater(W/2, H*0.35, '🧊 HİBERNASYON!', '#00ddcc');
        spawnParticles(W/2, H*0.35, '#66ffee', 25, true);
      }
    }

    // SON HAMLE: ölüm öfkesi timer
    if(mech === 'son_hamle' && boss.deathRage && (boss.deathRageTimer||0) > 0) {
      boss.deathRageTimer--;
      if(boss.deathRageTimer <= 0) {
        if((boss.deathRageRevives||0) < 2) {
          boss.deathRageRevives = (boss.deathRageRevives||0) + 1;
          boss.deathRage = false;
          const reviveHp = Math.floor((boss.segments[0]?.maxHp||40) * 0.25);
          boss.segments.forEach(s=>{ if(!s._dead) { s.hp = reviveHp; } });
          spawnFloater(W/2, H*0.3, `💀 GERİ DÖNDÜ! (${boss.deathRageRevives}/2)`, '#9933ff');
          spawnParticles(W/2, H*0.3, '#cc66ff', 35, true);
          G.shake = 16;
        } else {
          bossDefeated();
        }
      }
    }

    // TUNEL: tunnelTimer countdown
    if(mech === 'tunel' && boss.tunneling) {
      boss.tunnelTimer--;
      if(boss.tunnelTimer <= 0) {
        boss.tunneling = false;
        boss.segments.forEach(s=>{
          s.col = boss._tunnelTargetCol||Math.floor(COLS/2);
          s.x = bx(s.col);
        });
        spawnParticles(bx(boss._tunnelTargetCol||Math.floor(COLS/2))+BS/2, by(1), '#00ff99', 15, false);
      }
    }
  }
  // ── Coin animasyonu ─────────────────────────────────────────
  for(const c of G.coins) {
    c.pulse=(c.pulse+0.08)%(Math.PI*2);
    c.spinAngle=(c.spinAngle+0.055)%(Math.PI*2);
    c.y+=c.vy;
    c.life--;
  }
  G.coins=G.coins.filter(c=>!c.collected&&c.life>0);
  if(G.comboTimer>0) G.comboTimer--;

  // ── Boss altın toplama geri sayımı ───────────────────────────
  if(G.bossCollectTimer > 0) {
    G.bossCollectTimer--;
    const allGone = G.coins.filter(c=>!c.collected).length === 0;
    const boxDone = !G.luckyBox || G.luckyBox.collected;
    // Sadece timer bittiğinde VEYA (tüm coinler + kutu toplandıysa) seviye biter
    if(G.bossCollectTimer === 0 || (allGone && boxDone)) {
      G.bossCollectTimer = 0;
      G.bossJustDefeated = false;
      // Şanslı kutu toplanmadıysa otomatik topla
      if(G.luckyBox && !G.luckyBox.opened) openLuckyBox(true);
      levelComplete(true);
      return;
    }
  }
  // ── Şanslı Kutu fiziği ──────────────────────────────────────
  if(G.luckyBox && !G.luckyBox.collected) {
    const lb = G.luckyBox;
    lb.pulse = (lb.pulse + 0.07) % (Math.PI*2);
    lb.vy += 0.22; // yerçekimi
    lb.y += lb.vy;
    // Belirli bir noktada zıpla
    const restY = H * 0.45;
    if(lb.y >= restY) { lb.y = restY; lb.vy = lb.vy < -1 ? lb.vy * -0.55 : 0; }
    if(lb.opened && lb.openAnim !== undefined) {
      lb.openAnim++;
      if(lb.openAnim > 90) lb.collected = true;
    }
  }

  // ── Boss intro countdown ─────────────────────────────────────
  if(G.bossIntro > 0) {
    G.bossIntroTimer++;
    G.shake = Math.max(G.shake, 2 + Math.sin(G.bossIntroTimer*0.18)*2);
    // Periodic red particles from edges
    if(G.bossIntroTimer % 10 === 0) {
      const ex = Math.random()<0.5 ? 0 : W;
      const ey = Math.random()*H*0.75;
      spawnParticles(ex, ey, '#ff2244', 5, true);
    }
    if(G.bossIntroTimer % 18 === 0) {
      spawnParticles(Math.random()*W, Math.random()*H*0.5, '#ff8800', 4, false);
    }
    G.bossIntro--;
    if(G.bossIntro === 0) {
      // Transition complete — launch boss
      initBoss();
      G.phase = 'aim';
    }
  }

  if(G.phase==='shoot') {
    const isFast = G.speedMode === 2;
    const launchEvery = isFast ? 3 : 5;
    if(G.ballQueue.length>0&&frame%launchEvery===0) G.activeBalls.push(G.ballQueue.shift());
    for(const b of G.activeBalls) stepBall(b);
    if(isFast) for(const b of G.activeBalls) if(!b.done) stepBall(b);
    const done=G.ballQueue.length===0&&G.activeBalls.length>0&&G.activeBalls.every(b=>b.done);
    if(done) advanceTurn();
  }

  if(G.phase==='fall') {
    G.fallProg+=0.055;
    if(G.fallProg>=1) {
      G.fallProg=1;
      for(const b of G.grid) b.y=b.targetY;
      for(const co of G.collectors) co.y=co.targetY;
      if(G.grid.some(b=>b.hp>0&&by(b.row)+BS>=H-BOT_H-BALL_R*2)){ levelComplete(false); return; }
      else{G.phase='aim';}
    } else {
      const t=eio(G.fallProg);
      for(const b of G.grid) b.y=b.startY+(b.targetY-b.startY)*t;
      for(const co of G.collectors) co.y=co.startY+(co.targetY-co.startY)*t;
    }
  }
}

// ── Draw helpers ──────────────────────────────────────────────
function rrect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawBg() {
  const isIce = G.levelCfg && G.levelCfg.isIceWorld;
  const bg=ctx.createLinearGradient(0,0,0,H);
  if(isIce){
    bg.addColorStop(0,'#050f1a');bg.addColorStop(0.5,'#091422');bg.addColorStop(1,'#050f1a');
  } else {
    bg.addColorStop(0,'#08081a');bg.addColorStop(0.5,'#0c0c24');bg.addColorStop(1,'#08081a');
  }
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Buz dünyası: hafif kar tanesi efekti (düşen noktalar)
  if(isIce) {
    ctx.save();
    for(let i=0;i<12;i++){
      const sx=(i*137+frame*0.7)%W, sy=(i*83+frame*(0.4+i*0.05))%H;
      ctx.globalAlpha=0.12+Math.sin(frame*0.05+i)*0.05;
      ctx.fillStyle='#aaeeff';
      ctx.font='9px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('❄',sx,sy);
    }
    ctx.restore();
  }
  for(const s of bgStars) {
    const tw=0.3+0.7*Math.abs(Math.sin(s.phase+frame*s.speed*0.05));
    const sc=isIce?`rgba(160,220,255,${tw*0.50})`:`rgba(255,255,255,${tw*0.45})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=sc;ctx.fill();
  }
  ctx.save();ctx.globalAlpha=0.04;
  for(let c=0;c<=COLS;c++) for(let r=0;r<=MAX_ROW;r++) {
    ctx.beginPath();ctx.arc(bx(c)-GAP/2,by(r)-GAP/2,1.2,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
  }
  ctx.restore();
}

function drawBlock(bl) {
  if(bl.hp<=0||bl._dead) return;
  const sx=bl.shake>0?(Math.random()-0.5)*4:0;
  const sy=bl.shake>0?(Math.random()-0.5)*4:0;
  const x=bl.x+sx, y=bl.y+sy, s=BS, sw=blW(bl);
  const R=Math.max(7,s*0.30); // çok yuvarlak köşe — jelly stili
  const hpRatio=bl.hp/bl.maxHp;

  ctx.save();
  ctx.globalAlpha=0.65+0.35*hpRatio;

  // Glow sadece özel bloklara
  if(bl.isBoss)          { ctx.shadowColor='#ff0000'; ctx.shadowBlur=10+Math.sin(frame*0.1)*4; }
  else if(bl.type===T_BOMB)    { ctx.shadowColor='#ff7700'; ctx.shadowBlur=8; }
  else if(bl.type===T_RAINBOW) { ctx.shadowColor='#cc66ff'; ctx.shadowBlur=7; }
  else if(bl.type===T_BIG) { ctx.shadowColor='#ff8800'; ctx.shadowBlur=12+Math.sin(frame*0.12)*4; }

  // ── 1. Ana dolgu ──────────────────────────────────────────
  let fill;
  if(bl.type===T_STONE) {
    const g=ctx.createLinearGradient(x,y,x,y+s);
    g.addColorStop(0,'#b0bcc0');g.addColorStop(0.45,'#7a8890');g.addColorStop(1,'#2e3a3e');fill=g;
  } else if(bl.type===T_RAINBOW) {
    const g=ctx.createLinearGradient(x,y,x+s,y+s);
    g.addColorStop(0,'#ff2244');g.addColorStop(0.25,'#ff8800');
    g.addColorStop(0.5,'#22dd66');g.addColorStop(0.75,'#1199ff');g.addColorStop(1,'#aa22ff');fill=g;
  } else {
    const c=COLORS[bl.color];
    const g=ctx.createLinearGradient(x,y,x,y+s);
    g.addColorStop(0,c.a);g.addColorStop(0.55,c.a);g.addColorStop(1,c.b);fill=g;
  }
  rrect(x,y,sw,s,R); ctx.fillStyle=fill; ctx.fill();
  ctx.shadowBlur=0;

  // ── 2. Alt karanlık bevel (derinlik) ─────────────────────
  ctx.save();
  rrect(x,y,sw,s,R); ctx.clip();
  ctx.fillStyle='rgba(0,0,0,0.32)';
  rrect(x+1,y+s*0.52,sw-2,s*0.46,R*0.6); ctx.fill();
  ctx.restore();

  // ── 3. Büyük cam parlaması — görseldeki geniş beyaz alan ─
  ctx.save();
  rrect(x,y,sw,s,R); ctx.clip();
  const shineG=ctx.createLinearGradient(x,y+1,x,y+s*0.60);
  shineG.addColorStop(0,'rgba(255,255,255,0.78)');
  shineG.addColorStop(0.38,'rgba(255,255,255,0.28)');
  shineG.addColorStop(1,'rgba(255,255,255,0)');
  rrect(x+2,y+2,sw-4,s*0.56,R*0.75); ctx.fillStyle=shineG; ctx.fill();
  ctx.restore();

  // ── 4. Beyaz kenar çizgisi ────────────────────────────────
  rrect(x+0.5,y+0.5,sw-1,s-1,R);
  ctx.strokeStyle='rgba(255,255,255,0.40)'; ctx.lineWidth=1.5; ctx.stroke();

  // ── 5. Küçük speküler nokta (sol üst) ────────────────────
  ctx.beginPath();
  ctx.arc(x+sw*0.24,y+s*0.19,s*0.075,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.68)'; ctx.fill();

  // ── 6. Hasar çatlakları ───────────────────────────────────
  if(hpRatio<0.65 && bl.type!==T_STONE) {
    ctx.save();
    rrect(x,y,sw,s,R); ctx.clip();
    ctx.strokeStyle=`rgba(0,0,0,${0.6*(1-hpRatio)})`; ctx.lineWidth=1;
    const mx=x+sw/2, my=y+s/2;
    ctx.beginPath();
    ctx.moveTo(mx-s*0.08,my-s*0.28);ctx.lineTo(mx+s*0.22,my+s*0.12);
    ctx.moveTo(mx+s*0.05,my-s*0.05);ctx.lineTo(mx-s*0.25,my+s*0.26);
    ctx.moveTo(mx+s*0.12,my+s*0.02);ctx.lineTo(mx+s*0.30,my+s*0.30);
    ctx.stroke();
    ctx.restore();
  }

  // ── 7. İkon ──────────────────────────────────────────────
  if(bl.type!==T_NORMAL && s>=20) {
    ctx.font=`${Math.max(9,Math.floor(s*0.38))}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(bl.isBoss?'👑':bl.type===T_BOMB?'💣':bl.type===T_RAINBOW?'🌈':bl.type===T_BIG?'🧱':bl.type===T_SPAWNER?'👾':'🪨',
                 x+sw/2, y+s*0.38);
  }

  // ── 8. HP sayısı ──────────────────────────────────────────
  const fs=Math.max(7,Math.min(12,s*0.38));
  const ty=(bl.type!==T_NORMAL&&s>=20)?y+s*0.76:y+s*0.56;
  ctx.shadowColor='rgba(0,0,0,0.85)'; ctx.shadowBlur=3;
  ctx.fillStyle='#fff'; ctx.font=`bold ${fs}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(bl.hp,x+sw/2,ty);
  ctx.restore();
}

// ════════════════════════════════════════════════════════════════
// MONSTER RENDERERS — each block type draws an animated creature
// ════════════════════════════════════════════════════════════════

// ── Common: HP bar ───────────────────────────────────────────────
function drawMonsterHpBar(sw, s, hpR) {
  const bw=sw*0.80, bh=3.5, bx2=-sw/2+sw*0.10, by2=s*0.40;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(bx2,by2,bw,bh);
  const col=hpR>0.60?'#44ee66':hpR>0.30?'#ffcc00':'#ff3333';
  ctx.shadowColor=col; ctx.shadowBlur=4;
  ctx.fillStyle=col; ctx.fillRect(bx2,by2,bw*hpR,bh);
  ctx.shadowBlur=0;
}

// ── Common: angry eyes ───────────────────────────────────────────
function drawAngryEyes(eyeSep, eyeY, eyeR, irisCol, phase, browDir) {
  const blink=Math.sin(phase*0.19)>0.91;
  for(let side=-1;side<=1;side+=2){
    const ex=side*eyeSep;
    ctx.fillStyle='rgba(0,0,20,0.65)';
    ctx.beginPath();
    ctx.ellipse(ex,eyeY,eyeR,blink?eyeR*0.20:eyeR*1.18,0,0,Math.PI*2); ctx.fill();
    if(!blink){
      ctx.fillStyle=irisCol;
      ctx.beginPath(); ctx.ellipse(ex,eyeY,eyeR*0.70,eyeR*0.88,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#110022';
      ctx.beginPath(); ctx.arc(ex+eyeR*0.12,eyeY+eyeR*0.12,eyeR*0.42,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.88)';
      ctx.beginPath(); ctx.arc(ex-eyeR*0.24,eyeY-eyeR*0.32,eyeR*0.28,0,Math.PI*2); ctx.fill();
      // angry V-brow
      ctx.strokeStyle='rgba(0,0,20,0.70)'; ctx.lineWidth=eyeR*0.50; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(ex-eyeR*1.05,eyeY-eyeR*1.55);
      ctx.lineTo(ex+side*browDir*eyeR*1.05,eyeY-eyeR*0.95+side*browDir*eyeR*0.50);
      ctx.stroke();
    }
  }
}

// ── Common: open fanged mouth ────────────────────────────────────
function drawFangedMouth(mouthY, mouthW, mouthH, fangCount) {
  ctx.beginPath();
  ctx.ellipse(0,mouthY,mouthW,mouthH,0,0,Math.PI);
  ctx.fillStyle='rgba(0,0,20,0.82)'; ctx.fill();
  ctx.fillStyle='#ffffff';
  const step=mouthW*1.8/fangCount;
  const tw=step*0.38;
  for(let i=0;i<fangCount;i++){
    const tx=-mouthW*0.9+i*step+step*0.5;
    ctx.beginPath();
    ctx.moveTo(tx-tw,mouthY); ctx.lineTo(tx,mouthY+mouthH*1.30);
    ctx.lineTo(tx+tw,mouthY); ctx.closePath(); ctx.fill();
  }
}

// ── Ghost body path (bell / ghost silhouette) ────────────────────
function ghostBodyPath(r, wobY, phase, waveAmp) {
  const bots=r*1.62, boty=wobY+r*0.10;
  ctx.beginPath();
  ctx.arc(0,wobY-r*0.06,r,Math.PI,0);
  ctx.lineTo(r,boty);
  ctx.quadraticCurveTo(r*0.72,boty+waveAmp*Math.sin(phase),     r*0.36,boty-r*0.04);
  ctx.quadraticCurveTo(r*0.10,boty+waveAmp*Math.sin(phase+1.8), 0,     boty-r*0.04);
  ctx.quadraticCurveTo(-r*0.10,boty+waveAmp*Math.sin(phase+3.6),-r*0.36,boty-r*0.04);
  ctx.quadraticCurveTo(-r*0.72,boty+waveAmp*Math.sin(phase+5.4),-r,     boty);
  ctx.closePath();
}

// ────────────────────────────────────────────────────────────────
// Genel PNG sprite çizici — tüm canavar fonksiyonlarında kullanılır
// ────────────────────────────────────────────────────────────────
function drawPngSprite(spriteName, s, phase, hpR, hue, glowColor) {
  const sp = SPRITES[spriteName];
  if (!sp) return false; // sprite yoksa false dön → canvas fallback
  const wobY  = Math.sin(phase * 0.9) * s * 0.05;
  const pulse  = 0.88 + Math.sin(phase * 1.4) * 0.04;
  const hw     = s * 1.20 * pulse;  // 1.2× büyütme (aspect ratio düzeltmesinden sonra)
  const bright = 75 + Math.round(hpR * 75);
  const sat    = 60 + Math.round(hpR * 90);
  const hueStr = hue ? `hue-rotate(${hue}deg) ` : '';
  ctx.filter = `${hueStr}brightness(${bright}%) saturate(${sat}%)`;
  ctx.shadowColor = glowColor || '#ffffff';
  ctx.shadowBlur  = 12 + Math.sin(phase * 2) * 4;
  ctx.drawImage(sp, -hw/2, -hw/2 + wobY, hw, hw);
  ctx.filter = 'none';
  ctx.shadowBlur = 0;
  // Hasar çatlakları
  if (hpR < 0.45) {
    const r = s * 0.38;
    ctx.strokeStyle = `rgba(255,255,255,${0.7 - hpR})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-r*0.1, wobY-r*0.2); ctx.lineTo(r*0.2, wobY+r*0.15);
    ctx.moveTo(r*0.06, wobY-r*0.05); ctx.lineTo(-r*0.22, wobY+r*0.25);
    ctx.stroke();
  }
  return true;
}

// ────────────────────────────────────────────────────────────────
// T_NORMAL — Jelly Ghost  (PNG sprite + renk filtresi)
// ────────────────────────────────────────────────────────────────
// colorIdx → 0=kırmızı 1=yeşil 2=mavi 3=mor 4=turuncu 5=pembe
const GHOST_HUE = [195, 140, 0, 250, 160, 210]; // mavi=0 baz, diğerleri hue-rotate

function drawGhostMonster(s, colorIdx, phase, hpR) {
  const C = COLORS[colorIdx];
  const hue = GHOST_HUE[colorIdx] || 0;
  // patiler.png mavi hayalet (üst-sol) → tüm renkler için hue-rotate
  if (drawPngSprite('monster_ghost', s, phase, hpR, hue, C.a)) return;
  // Fallback: ghost_blue.jpg (eski tek görsel)
  if (SPRITES.ghostBlue) {
    const wobY = Math.sin(phase)*s*0.055, pulse = 0.90+Math.sin(phase*1.4)*0.045;
    const hw=s*pulse, bright=80+Math.round(hpR*70), sat=70+Math.round(hpR*80);
    ctx.filter=`hue-rotate(${hue}deg) brightness(${bright}%) saturate(${sat}%)`;
    ctx.shadowColor=C.a; ctx.shadowBlur=14+Math.sin(phase*2)*4;
    ctx.drawImage(SPRITES.ghostBlue,-hw/2,-hw/2+wobY,hw,hw);
    ctx.filter='none'; ctx.shadowBlur=0; return;
  }
  // Canvas fallback
  const wobY=Math.sin(phase)*s*0.055, r=s*0.40, wA=s*0.068;
  ghostBodyPath(r,wobY,phase,wA);
  ctx.shadowColor=C.a; ctx.shadowBlur=10+Math.sin(phase*2)*3;
  const g=ctx.createRadialGradient(-r*0.22,wobY-r*0.30,r*0.04,0,wobY-r*0.06,r*1.45);
  g.addColorStop(0,C.shine); g.addColorStop(0.38,C.a); g.addColorStop(1,C.b);
  ctx.fillStyle=g; ctx.fill(); ctx.shadowBlur=0;
  ctx.save(); ghostBodyPath(r,wobY,phase,wA); ctx.clip();
  const sh=ctx.createRadialGradient(-r*0.30,wobY-r*0.44,0,-r*0.12,wobY-r*0.22,r*0.82);
  sh.addColorStop(0,'rgba(255,255,255,0.52)'); sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh; ctx.fill(); ctx.restore();
  drawAngryEyes(r*0.42,wobY-r*0.08,r*0.175,'#ff44cc',phase,1);
  drawFangedMouth(wobY+r*0.50,r*0.38,r*0.20,3);
}

// ────────────────────────────────────────────────────────────────
// T_BOMB — Fire Demon  (orange/red, flame crown, horns, 4 fangs)
// ────────────────────────────────────────────────────────────────
function drawFireMonster(s, phase, hpR) {
  // patiler.png turuncu ateş iblisi (üst-sağ)
  if (drawPngSprite('monster_fire', s, phase, hpR, 0, '#ff5500')) return;
  const r=s*0.38;

  // animated flame crown (3 tongues)
  for(let i=-1;i<=1;i++){
    const fx=i*r*0.50, fh=s*(0.32+Math.abs(i)*0.10)*(0.76+Math.sin(phase*2.4+i)*0.24);
    ctx.save();
    ctx.shadowColor='#ffaa00'; ctx.shadowBlur=9;
    const fg=ctx.createLinearGradient(fx,-r*0.85,fx,-r*0.85-fh);
    fg.addColorStop(0,'#ff6600'); fg.addColorStop(0.5,'#ffdd00'); fg.addColorStop(1,'rgba(255,200,0,0)');
    ctx.fillStyle=fg;
    ctx.beginPath();
    ctx.moveTo(fx-r*0.22,-r*0.88);
    ctx.quadraticCurveTo(fx+Math.sin(phase*1.7+i)*r*0.14,-r*0.88-fh*0.55,fx,-r*0.88-fh);
    ctx.quadraticCurveTo(fx-Math.sin(phase*1.7+i)*r*0.14,-r*0.88-fh*0.55,fx+r*0.22,-r*0.88);
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
