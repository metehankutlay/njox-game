  // body (squarish)
  ctx.shadowColor='#ff5500'; ctx.shadowBlur=12+Math.sin(phase*2)*5;
  rrect(-r,-r*0.88,r*2,r*1.88,r*0.35);
  const bg=ctx.createRadialGradient(-r*0.14,-r*0.22,r*0.04,0,0,r*1.22);
  bg.addColorStop(0,'#ffee44'); bg.addColorStop(0.28,'#ff8800'); bg.addColorStop(0.7,'#ff3300'); bg.addColorStop(1,'#aa1100');
  ctx.fillStyle=bg; ctx.fill(); ctx.shadowBlur=0;

  // body inner shine
  ctx.save(); rrect(-r,-r*0.88,r*2,r*1.88,r*0.35); ctx.clip();
  const bs=ctx.createRadialGradient(-r*0.30,-r*0.55,0,-r*0.10,-r*0.30,r*0.75);
  bs.addColorStop(0,'rgba(255,255,255,0.38)'); bs.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=bs; ctx.fill(); ctx.restore();

  // horns
  ctx.fillStyle='#cc3300'; ctx.strokeStyle='#771100'; ctx.lineWidth=1;
  for(let side=-1;side<=1;side+=2){
    ctx.beginPath();
    ctx.moveTo(side*r*0.72,-r*0.88);
    ctx.quadraticCurveTo(side*r*1.10,-r*1.45,side*r*0.85,-r*1.65);
    ctx.quadraticCurveTo(side*r*0.94,-r*1.20,side*r*0.48,-r*0.84);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  drawAngryEyes(r*0.42,-r*0.18,r*0.175,'#ffee00',phase,1);
  drawFangedMouth(r*0.42,r*0.56,r*0.24,4);
}

// ────────────────────────────────────────────────────────────────
// T_STONE — Skull  (gray, hollow glowing eyes, horns, cracks)
// ────────────────────────────────────────────────────────────────
function drawSkullMonster(s, phase, hpR) {
  // patiler.png koyu kafatası (alt-sağ)
  if (drawPngSprite('monster_skull', s, phase, hpR, 0, '#aaaacc')) return;
  const r=s*0.38;
  ctx.shadowColor='#8888aa'; ctx.shadowBlur=8+Math.sin(phase)*3;

  // skull dome
  ctx.beginPath(); ctx.arc(0,-r*0.22,r,0,Math.PI*2);
  const sg=ctx.createLinearGradient(0,-r*1.15,0,r*0.42);
  sg.addColorStop(0,'#c8d0d8'); sg.addColorStop(0.5,'#808898'); sg.addColorStop(1,'#484860');
  ctx.fillStyle=sg; ctx.fill(); ctx.shadowBlur=0;

  // jaw
  rrect(-r*0.65,r*0.12,r*1.30,r*0.72,r*0.16);
  const jg=ctx.createLinearGradient(0,r*0.10,0,r*0.86);
  jg.addColorStop(0,'#606878'); jg.addColorStop(1,'#3a3a50');
  ctx.fillStyle=jg; ctx.fill();

  // upper teeth (3 peaks inside jaw)
  ctx.fillStyle='#b0b8c4';
  for(let i=-1;i<=1;i++){
    ctx.beginPath();
    ctx.moveTo(i*r*0.36-r*0.11,r*0.12);
    ctx.lineTo(i*r*0.36,r*0.12-r*0.22);
    ctx.lineTo(i*r*0.36+r*0.11,r*0.12);
    ctx.closePath(); ctx.fill();
  }

  // horns
  ctx.fillStyle='#3a3a50'; ctx.strokeStyle='#22223a'; ctx.lineWidth=1;
  for(let side=-1;side<=1;side+=2){
    ctx.beginPath();
    ctx.moveTo(side*r*0.70,-r*0.98);
    ctx.quadraticCurveTo(side*r*1.14,-r*1.55,side*r*0.84,-r*1.80);
    ctx.quadraticCurveTo(side*r*0.92,-r*1.38,side*r*0.44,-r*0.94);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  // hollow eye sockets + orange glow
  const eyeY=-r*0.32;
  for(let side=-1;side<=1;side+=2){
    const ex=side*r*0.38;
    ctx.fillStyle='rgba(0,0,0,0.92)';
    ctx.beginPath(); ctx.ellipse(ex,eyeY,r*0.21,r*0.24,0,0,Math.PI*2); ctx.fill();
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=10+Math.sin(phase*1.6+side)*4;
    ctx.fillStyle='#ffaa00';
    ctx.beginPath(); ctx.ellipse(ex,eyeY,r*0.11,r*0.13,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  // nose cavity
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.beginPath(); ctx.moveTo(0,r*0.0); ctx.lineTo(-r*0.09,r*0.14); ctx.lineTo(r*0.09,r*0.14); ctx.closePath(); ctx.fill();

  // shine on dome
  ctx.save(); ctx.beginPath(); ctx.arc(0,-r*0.22,r,0,Math.PI*2); ctx.clip();
  const dsh=ctx.createRadialGradient(-r*0.32,-r*0.72,0,-r*0.12,-r*0.52,r*0.60);
  dsh.addColorStop(0,'rgba(255,255,255,0.28)'); dsh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=dsh; ctx.fill(); ctx.restore();
}

// ────────────────────────────────────────────────────────────────
// T_ICE_WALL — Buz Duvarı  (kristal mavi, kırılabilir ama sert)
// ────────────────────────────────────────────────────────────────
function drawIceWall(s, phase, hpR) {
  const R = Math.max(6, s * 0.18);
  const pulse = 1 + Math.sin(phase * 1.2) * 0.03;
  const ss = s * pulse;

  // Dış buz parıltısı
  ctx.shadowColor = '#66ddff'; ctx.shadowBlur = 10 + Math.sin(phase*1.5)*4;

  // Ana buz bloğu
  rrect(-ss/2, -ss/2, ss, ss, R);
  const g = ctx.createLinearGradient(-ss/2, -ss/2, ss/2, ss/2);
  g.addColorStop(0,   '#ddf4ff');
  g.addColorStop(0.30,'#88ddff');
  g.addColorStop(0.65,'#3399bb');
  g.addColorStop(1,   '#0f5577');
  ctx.fillStyle = g; ctx.fill(); ctx.shadowBlur = 0;

  // Üst parlaklık (cam efekti)
  ctx.save();
  rrect(-ss/2, -ss/2, ss, ss, R); ctx.clip();
  const sh = ctx.createLinearGradient(-ss/2, -ss/2, -ss/2, -ss/2 + ss*0.48);
  sh.addColorStop(0, 'rgba(255,255,255,0.70)');
  sh.addColorStop(1, 'rgba(255,255,255,0)');
  rrect(-ss/2+2, -ss/2+2, ss-4, ss*0.45, R*0.5);
  ctx.fillStyle = sh; ctx.fill();
  ctx.restore();

  // Kristal çatlak damarları
  ctx.strokeStyle = `rgba(180,240,255,${0.40+hpR*0.20})`; ctx.lineWidth = 0.9;
  ctx.beginPath();
  ctx.moveTo(-ss*0.08, -ss*0.28); ctx.lineTo(ss*0.24, ss*0.08);
  ctx.moveTo(-ss*0.22, ss*0.05);  ctx.lineTo(ss*0.10, ss*0.30);
  ctx.moveTo(ss*0.04,  -ss*0.32); ctx.lineTo(-ss*0.16, ss*0.12);
  ctx.stroke();

  // Hasar durumunda çatlama yoğunlaşır
  if(hpR < 0.60) {
    ctx.strokeStyle = `rgba(255,255,255,${0.5*(1-hpR)})`; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-ss*0.30, -ss*0.15); ctx.lineTo(ss*0.18, ss*0.28);
    ctx.moveTo(ss*0.10,  -ss*0.20); ctx.lineTo(-ss*0.24, ss*0.32);
    ctx.stroke();
  }

  // Kenar çizgisi
  rrect(-ss/2+0.5, -ss/2+0.5, ss-1, ss-1, R);
  ctx.strokeStyle = 'rgba(160,230,255,0.55)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Kar tanesi ikonu
  ctx.font = `${Math.max(10, Math.floor(ss*0.44))}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('❄️', 0, -ss*0.05);

  // HP barı
  drawMonsterHpBar(ss, ss, hpR);
}

// ────────────────────────────────────────────────────────────────
// T_RAINBOW — Rainbow slime  (cycling hue, 3 white eyes, sparkles)
// ────────────────────────────────────────────────────────────────
function drawRainbowMonster(s, phase, hpR) {
  // patiler.png yeşil tek göz (alt-sol) — gökkuşağı blok için
  if (drawPngSprite('monster_cyclops', s, phase, hpR, 0, '#44ff88')) return;
  const r=s*0.40, wobY=Math.sin(phase)*s*0.024, wA=s*0.060;
  const hue=(frame*2.2)%360;

  ghostBodyPath(r,wobY,phase,wA);
  ctx.shadowColor=`hsl(${hue},100%,60%)`; ctx.shadowBlur=14+Math.sin(phase*2)*4;
  const rg=ctx.createLinearGradient(-r,wobY-r,r,wobY+r);
  rg.addColorStop(0,   `hsl(${hue},100%,65%)`);
  rg.addColorStop(0.25,`hsl(${(hue+72)%360},100%,65%)`);
  rg.addColorStop(0.50,`hsl(${(hue+144)%360},100%,65%)`);
  rg.addColorStop(0.75,`hsl(${(hue+216)%360},100%,65%)`);
  rg.addColorStop(1,   `hsl(${(hue+288)%360},100%,65%)`);
  ctx.fillStyle=rg; ctx.fill(); ctx.shadowBlur=0;

  // shine
  ctx.save(); ghostBodyPath(r,wobY,phase,wA); ctx.clip();
  const rsh=ctx.createRadialGradient(-r*0.28,wobY-r*0.42,0,-r*0.10,wobY-r*0.22,r*0.78);
  rsh.addColorStop(0,'rgba(255,255,255,0.50)'); rsh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=rsh; ctx.fill(); ctx.restore();

  // 3 eyes in a row
  const eyeY=wobY-r*0.10;
  const blink=Math.sin(phase*0.22)>0.90;
  const eyeXs=[-r*0.38,0,r*0.38];
  for(const ex of eyeXs){
    ctx.fillStyle='rgba(0,0,20,0.55)';
    ctx.beginPath(); ctx.ellipse(ex,eyeY,r*0.15,blink?r*0.04:r*0.17,0,0,Math.PI*2); ctx.fill();
    if(!blink){
      ctx.fillStyle='#ffffff'; ctx.beginPath(); ctx.ellipse(ex,eyeY,r*0.10,r*0.13,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#220033'; ctx.beginPath(); ctx.arc(ex,eyeY+r*0.02,r*0.06,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.beginPath(); ctx.arc(ex-r*0.04,eyeY-r*0.06,r*0.035,0,Math.PI*2); ctx.fill();
    }
  }

  // sparkles orbiting body
  ctx.shadowBlur=7;
  for(let i=0;i<4;i++){
    const sa=phase+i*Math.PI*0.5, sr=r*1.14;
    ctx.shadowColor=`hsl(${(hue+i*72)%360},100%,70%)`;
    ctx.fillStyle=`hsl(${(hue+i*72)%360},100%,82%)`;
    ctx.beginPath(); ctx.arc(Math.cos(sa)*sr,wobY+Math.sin(sa)*sr*0.55,s*0.028,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0;

  // small mischievous smile (2 fangs)
  const mY=wobY+r*0.50;
  ctx.beginPath(); ctx.ellipse(0,mY-r*0.08,r*0.30,r*0.16,0,0.18,Math.PI-0.18);
  ctx.fillStyle='rgba(0,0,20,0.75)'; ctx.fill();
  ctx.fillStyle='#fff';
  for(let fi=-1;fi<=1;fi+=2){
    ctx.beginPath(); ctx.moveTo(fi*r*0.14-r*0.07,mY-r*0.08);
    ctx.lineTo(fi*r*0.14,mY+r*0.11); ctx.lineTo(fi*r*0.14+r*0.07,mY-r*0.08);
    ctx.closePath(); ctx.fill();
  }
}

// ────────────────────────────────────────────────────────────────
// T_SPAWNER — Purple Bat  (round body, animated wings, red eyes, fangs)
// ────────────────────────────────────────────────────────────────
function drawBatMonster(s, phase, hpR) {
  // patiler.png mor yarasa (alt-orta)
  if (drawPngSprite('monster_bat', s, phase, hpR, 0, '#cc44ff')) return;
  const r=s*0.36, flap=Math.sin(phase*2.6)*s*0.055;

  // wings (behind body, drawn first)
  ctx.fillStyle='#6622bb'; ctx.strokeStyle='#3a0d88'; ctx.lineWidth=1;
  for(let side=-1;side<=1;side+=2){
    ctx.beginPath();
    ctx.moveTo(side*r*0.42,r*0.05);
    ctx.bezierCurveTo(side*r*1.0,flap*side-r*0.30, side*r*1.45,flap*side-r*0.55, side*r*1.68,flap*side-r*0.95);
    ctx.bezierCurveTo(side*r*1.25,flap*side-r*0.38, side*r*0.90,flap*side+r*0.10, side*r*0.50,r*0.08);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // wing membrane veins
    ctx.strokeStyle='rgba(180,100,255,0.38)'; ctx.lineWidth=0.8;
    for(let v=1;v<=2;v++){
      ctx.beginPath();
      ctx.moveTo(side*r*(0.42+v*0.10),r*0.05);
      ctx.lineTo(side*r*(1.0+v*0.22),flap*side-r*(0.30+v*0.16));
      ctx.stroke();
    }
    ctx.strokeStyle='#3a0d88'; ctx.lineWidth=1;
  }

  // body
  ctx.shadowColor='#9944ff'; ctx.shadowBlur=10+Math.sin(phase*2)*3;
  const bbg=ctx.createRadialGradient(-r*0.22,-r*0.28,r*0.04,0,0,r*1.12);
  bbg.addColorStop(0,'#dd88ff'); bbg.addColorStop(0.42,'#9944ee'); bbg.addColorStop(1,'#440d88');
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=bbg; ctx.fill(); ctx.shadowBlur=0;

  // body shine
  ctx.save(); ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
  const bsh2=ctx.createRadialGradient(-r*0.30,-r*0.42,0,-r*0.14,-r*0.26,r*0.64);
  bsh2.addColorStop(0,'rgba(255,255,255,0.44)'); bsh2.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=bsh2; ctx.fill(); ctx.restore();

  // ears/horns on top
  ctx.fillStyle='#5511aa';
  for(let side=-1;side<=1;side+=2){
    ctx.beginPath();
    ctx.moveTo(side*r*0.34,-r*0.75);
    ctx.quadraticCurveTo(side*r*0.60,-r*1.32,side*r*0.44,-r*1.48);
    ctx.quadraticCurveTo(side*r*0.50,-r*1.08,side*r*0.17,-r*0.72);
    ctx.closePath(); ctx.fill();
  }

  // red eyes
  drawAngryEyes(r*0.38,-r*0.12,r*0.165,'#ff2244',phase,1);

  // 2 long downward fangs
  const fY=r*0.26;
  ctx.fillStyle='#ffffff';
  for(let fi=-1;fi<=1;fi+=2){
    ctx.beginPath();
    ctx.moveTo(fi*r*0.18-r*0.10,fY);
    ctx.lineTo(fi*r*0.18,fY+r*0.35);
    ctx.lineTo(fi*r*0.18+r*0.10,fY);
    ctx.closePath(); ctx.fill();
  }
}

// ────────────────────────────────────────────────────────────────
// T_BIG — Giant Ghost  (wide 2-col, extra eyes, 5 fangs)
//         Buz dünyasında → Buz devi (mavi-beyaz, dondurma aurası)
// ────────────────────────────────────────────────────────────────
function drawBigMonster(sw, s, colorIdx, phase, hpR, isIce=false) {
  const C = isIce ? {a:'#44ccff', b:'#0066aa', shine:'#ccf4ff'} : COLORS[colorIdx];
  const r=Math.min(sw*0.42, s*0.44);
  const wobY=Math.sin(phase)*s*0.022, wA=s*0.075;

  // wider ghost body
  const wBody=sw*0.86;
  ctx.beginPath();
  ctx.arc(0,wobY-r*0.06,wBody/2,Math.PI,0);
  ctx.lineTo(wBody/2,wobY+r*0.55);
  ctx.quadraticCurveTo(wBody*0.36,wobY+r*0.72+wA*Math.sin(phase), wBody*0.18,wobY+r*0.55);
  ctx.quadraticCurveTo(0,wobY+r*0.72+wA*Math.sin(phase+2.0), -wBody*0.18,wobY+r*0.55);
  ctx.quadraticCurveTo(-wBody*0.36,wobY+r*0.72+wA*Math.sin(phase+4.0), -wBody/2,wobY+r*0.55);
  ctx.closePath();

  ctx.shadowColor=C.a; ctx.shadowBlur=14+Math.sin(phase*2)*5;
  const g=ctx.createRadialGradient(-wBody*0.20,wobY-r*0.26,r*0.04,0,wobY-r*0.06,wBody*0.62);
  g.addColorStop(0,C.shine); g.addColorStop(0.35,C.a); g.addColorStop(1,C.b);
  ctx.fillStyle=g; ctx.fill(); ctx.shadowBlur=0;

  // wide shine
  ctx.save();
  ctx.beginPath();
  ctx.arc(0,wobY-r*0.06,wBody/2,Math.PI,0);
  ctx.lineTo(wBody/2,wobY+r*0.55); ctx.lineTo(-wBody/2,wobY+r*0.55); ctx.closePath(); ctx.clip();
  const gsh=ctx.createRadialGradient(-wBody*0.28,wobY-r*0.44,0,-wBody*0.10,wobY-r*0.24,wBody*0.55);
  gsh.addColorStop(0,'rgba(255,255,255,0.50)'); gsh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gsh; ctx.fill(); ctx.restore();

  // Buz dünyası: dondurma aurası (pulsing icy ring)
  if(isIce) {
    const auraR = wBody*0.62 + Math.sin(phase*1.8)*wBody*0.06;
    ctx.save();
    ctx.globalAlpha = 0.30 + Math.sin(phase*2)*0.08;
    ctx.shadowColor = '#aaeeff'; ctx.shadowBlur = 14;
    ctx.strokeStyle = '#66ddff'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.ellipse(0, wobY, auraR, auraR*0.65, 0, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 0.15 + Math.sin(phase*2.5)*0.05;
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.ellipse(0, wobY, auraR*0.72, auraR*0.46, 0, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // 2 pairs of eyes (4 total, wide-set)
  const eyeY=wobY-r*0.05;
  const irisCol = isIce ? '#00eeff' : (colorIdx===2?'#ff44cc':colorIdx===1?'#ff6600':'#ff44cc');
  drawAngryEyes(wBody*0.30,eyeY,r*0.175,irisCol,phase,1);

  // wide mouth, 5 fangs
  const mY=wobY+r*0.42;
  ctx.beginPath(); ctx.ellipse(0,mY,wBody*0.36,r*0.23,0,0,Math.PI);
  ctx.fillStyle='rgba(0,0,20,0.82)'; ctx.fill();
  ctx.fillStyle = isIce ? '#aaeeff' : '#ffffff';
  const mw=wBody*0.36, step2=mw*1.8/5;
  for(let i=0;i<5;i++){
    const tx=-mw*0.9+i*step2+step2*0.5, tw3=step2*0.36;
    ctx.beginPath(); ctx.moveTo(tx-tw3,mY); ctx.lineTo(tx,mY+r*0.30); ctx.lineTo(tx+tw3,mY);
    ctx.closePath(); ctx.fill();
  }
}

// ────────────────────────────────────────────────────────────────
// isBoss block — Crown Demon  (red/gold, crown, big fangs, glow)
// ────────────────────────────────────────────────────────────────
function drawBossDemonMonster(s, phase, hpR) {
  const r=s*0.38;
  // Crown (before body)
  const crownColors=['#ffd700','#ffaa00','#ffd700'];
  for(let i=0;i<3;i++){
    const cx2=-r*0.36+i*r*0.36, ch=r*(0.42+Math.abs(i-1)*0.22)+Math.sin(phase*1.5+i)*s*0.02;
    ctx.fillStyle=crownColors[i]; ctx.strokeStyle='#aa7700'; ctx.lineWidth=0.8;
    ctx.beginPath();
    ctx.moveTo(cx2-r*0.18,-r*0.88); ctx.lineTo(cx2,-r*0.88-ch); ctx.lineTo(cx2+r*0.18,-r*0.88);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  // Crown base band
  rrect(-r*0.92,-r*0.98,r*1.84,r*0.20,r*0.08);
  ctx.fillStyle='#ffd700'; ctx.fill(); ctx.strokeStyle='#aa7700'; ctx.lineWidth=0.8; ctx.stroke();

  // body
  ctx.shadowColor='#ff0000'; ctx.shadowBlur=14+Math.sin(phase*0.14)*5;
  rrect(-r,-r*0.88,r*2,r*1.88,r*0.30);
  const rbg=ctx.createRadialGradient(-r*0.15,-r*0.20,r*0.04,0,0,r*1.20);
  rbg.addColorStop(0,'#ff6644'); rbg.addColorStop(0.38,'#cc1100'); rbg.addColorStop(1,'#660000');
  ctx.fillStyle=rbg; ctx.fill(); ctx.shadowBlur=0;

  // shine
  ctx.save(); rrect(-r,-r*0.88,r*2,r*1.88,r*0.30); ctx.clip();
  const dbs=ctx.createRadialGradient(-r*0.30,-r*0.52,0,-r*0.10,-r*0.28,r*0.72);
  dbs.addColorStop(0,'rgba(255,255,255,0.36)'); dbs.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=dbs; ctx.fill(); ctx.restore();

  drawAngryEyes(r*0.42,-r*0.18,r*0.188,'#ffd700',phase,1);
  drawFangedMouth(r*0.44,r*0.58,r*0.24,4);
}

// ────────────────────────────────────────────────────────────────
// MAIN DISPATCHER
// ────────────────────────────────────────────────────────────────
function drawMonster(bl) {
  if(bl.hp<=0||bl._dead) return;
  const sw=blW(bl);
  const sx=bl.shake>0?(Math.random()-0.5)*4.5:0;
  const sy=bl.shake>0?(Math.random()-0.5)*4.5:0;
  const x=bl.x+sx, y=bl.y+sy, s=BS;
  const hpR=Math.max(0,bl.hp/bl.maxHp);
  // Each block gets a unique animation phase based on grid position
  const phase=frame*0.044+bl.col*0.85+bl.row*1.60;

  ctx.save();
  ctx.translate(x+sw/2, y+s/2);

  if(bl.isBoss) {
    drawBossDemonMonster(s,phase,hpR);
  } else {
    const _isIce = G.levelCfg && G.levelCfg.isIceWorld;
    switch(bl.type) {
      case T_BOMB:     drawFireMonster(s,phase,hpR); break;
      case T_STONE:    drawSkullMonster(s,phase,hpR); break;
      case T_RAINBOW:  drawRainbowMonster(s,phase,hpR); break;
      case T_SPAWNER:  drawBatMonster(s,phase,hpR); break;
      case T_ICE_WALL: drawIceWall(s,phase,hpR); break;
      case T_BIG:      drawBigMonster(sw,s,bl.color>=0?bl.color:0,phase,hpR,_isIce); break;
      default:         drawGhostMonster(s,bl.color>=0?bl.color:0,phase,hpR); break;
    }
  }

  // HP bar (thin strip at bottom of cell)
  drawMonsterHpBar(sw,s,hpR);

  // HP number
  if(bl.hp>1){
    const fs=Math.max(7,Math.min(12,s*0.28));
    ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=4;
    ctx.fillStyle='#ffffff'; ctx.font=`bold ${fs}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.globalAlpha=0.88;
    ctx.fillText(bl.hp, 0, s*0.44);
  }

  // Red flash on hit
  if(bl.shake>3){
    ctx.globalAlpha=Math.min(0.45,(bl.shake/10)*0.45);
    ctx.fillStyle='#ff2200';
    ctx.fillRect(-sw/2,-s/2,sw,s);
  }

  ctx.restore();
}

function drawCollector(co) {
  if(co.collected) return;
  const r=Math.max(6,BS*0.22), pulse=1+Math.sin(co.pulse)*0.14;
  ctx.save();
  ctx.shadowColor='#ffd700';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(co.x,co.y,r*pulse*1.3,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,215,0,0.28)';ctx.lineWidth=2;ctx.stroke();
  const g=ctx.createRadialGradient(co.x-r*0.3,co.y-r*0.3,r*0.05,co.x,co.y,r*pulse);
  g.addColorStop(0,'#fffaaa');g.addColorStop(0.45,'#ffd700');g.addColorStop(1,'#b8860b');
  ctx.beginPath();ctx.arc(co.x,co.y,r*pulse,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.arc(co.x-r*0.28,co.y-r*0.28,r*0.28,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.65)';ctx.fill();
  ctx.restore();
}

// ── Per-skin gerçek top çizimi ──────────────────────────────────
function drawBallSkin(skinId, x, y, r, colorIdx) {
  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.clip();

  if(skinId === 'tennis') {
    // Sarı-yeşil tenis topu
    const g = ctx.createRadialGradient(x-r*.28,y-r*.28,r*.04,x,y,r);
    g.addColorStop(0,'#e8ff44');g.addColorStop(0.55,'#ccee00');g.addColorStop(1,'#7a9900');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    // İki kıvrımlı beyaz çizgi (tenis dikiş)
    ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=r*0.13;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x-r*.85,y-r*.08);
    ctx.bezierCurveTo(x-r*.3,y+r*.48,x+r*.3,y-r*.48,x+r*.85,y+r*.08);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x-r*.85,y+r*.08);
    ctx.bezierCurveTo(x-r*.3,y-r*.48,x+r*.3,y+r*.48,x+r*.85,y-r*.08);ctx.stroke();

  } else if(skinId === 'football') {
    // Siyah-beyaz futbol topu
    const g = ctx.createRadialGradient(x-r*.28,y-r*.28,r*.04,x,y,r);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.5,'#e0e0e0');g.addColorStop(1,'#888888');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    // Merkezdeki siyah beşgen
    ctx.fillStyle='rgba(15,15,15,0.82)';
    function drawPentagon(cx,cy,pr) {
      ctx.beginPath();
      for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2;ctx.lineTo(cx+Math.cos(a)*pr,cy+Math.sin(a)*pr);}
      ctx.closePath();ctx.fill();
    }
    drawPentagon(x,y,r*0.26);
    for(let i=0;i<5;i++){
      const a=i*Math.PI*2/5-Math.PI/2;
      drawPentagon(x+Math.cos(a)*r*0.56,y+Math.sin(a)*r*0.56,r*0.19);
    }

  } else if(skinId === 'basket') {
    // Turuncu basketbol topu
    const g = ctx.createRadialGradient(x-r*.28,y-r*.28,r*.04,x,y,r);
    g.addColorStop(0,'#ff9944');g.addColorStop(0.5,'#ee5500');g.addColorStop(1,'#992200');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    // Siyah dikiş çizgileri
    ctx.strokeStyle='rgba(10,5,0,0.65)';ctx.lineWidth=r*0.09;ctx.lineCap='round';
    // Dikey çizgi
    ctx.beginPath();ctx.moveTo(x,y-r*.9);ctx.lineTo(x,y+r*.9);ctx.stroke();
    // Yatay yay üst
    ctx.beginPath();ctx.arc(x,y,r*.8,Math.PI*.15,Math.PI*.85);ctx.stroke();
    // Yatay yay alt
    ctx.beginPath();ctx.arc(x,y,r*.8,Math.PI*1.15,Math.PI*1.85);ctx.stroke();
    // Kısa yatay ortada
    ctx.beginPath();ctx.moveTo(x-r*.9,y);ctx.bezierCurveTo(x-r*.35,y-r*.2,x+r*.35,y-r*.2,x+r*.9,y);ctx.stroke();

  } else if(skinId === 'bowling') {
    // Koyu mor bowling topu
    const g = ctx.createRadialGradient(x-r*.28,y-r*.28,r*.04,x,y,r);
    g.addColorStop(0,'#aa66ee');g.addColorStop(0.5,'#6622bb');g.addColorStop(1,'#220066');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    // 3 parmak deliği
    ctx.fillStyle='rgba(0,0,0,0.75)';
    ctx.beginPath();ctx.arc(x-r*.22,y-r*.18,r*.11,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+r*.28,y-r*.12,r*.11,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+r*.02,y+r*.30,r*.11,0,Math.PI*2);ctx.fill();

  } else if(skinId === 'dart') {
    // Gümüş dart (sivri uçlu)
    const g = ctx.createLinearGradient(x-r,y,x+r,y);
    g.addColorStop(0,'#555566');g.addColorStop(0.45,'#ccccdd');g.addColorStop(0.55,'#eeeeff');g.addColorStop(1,'#778899');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    // Metal yivler (yatay şeritler)
    ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=r*0.05;
    for(let i=-3;i<=3;i++){const ly=y+i*r*0.25;ctx.beginPath();ctx.moveTo(x-r*0.9,ly);ctx.lineTo(x+r*0.9,ly);ctx.stroke();}
    // Sarı-kırmızı hedef nokta ortada
    ctx.fillStyle='#ff3322';ctx.beginPath();ctx.arc(x,y,r*0.22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(x,y,r*0.10,0,Math.PI*2);ctx.fill();

  } else if(skinId === 'bomb2') {
    // Siyah bomba
    const g = ctx.createRadialGradient(x-r*.28,y-r*.28,r*.04,x,y,r);
    g.addColorStop(0,'#666666');g.addColorStop(0.5,'#333333');g.addColorStop(1,'#111111');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    // Parlak şerit (metal görünümü)
    ctx.strokeStyle='rgba(120,120,120,0.4)';ctx.lineWidth=r*0.08;
    ctx.beginPath();ctx.arc(x,y,r*0.65,Math.PI*1.15,Math.PI*1.85);ctx.stroke();

  } else if(skinId === 'crystal2') {
    // Kristal şeffaf top
    const g = ctx.createRadialGradient(x-r*.3,y-r*.3,r*.05,x,y,r);
    g.addColorStop(0,'#eeffff');g.addColorStop(0.25,'#aaddff');g.addColorStop(0.65,'#44aaee');g.addColorStop(1,'#0055aa');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    // Kristal yüzey çizgileri
    ctx.strokeStyle='rgba(180,240,255,0.50)';ctx.lineWidth=r*0.06;
    ctx.beginPath();ctx.moveTo(x-r*.3,y-r*.8);ctx.lineTo(x,y+r*.8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+r*.3,y-r*.8);ctx.lineTo(x-r*.1,y+r*.8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x-r*.7,y+r*.1);ctx.lineTo(x+r*.7,y-r*.2);ctx.stroke();

  } else {
    // Klasik renkli top (mevcut renk sistemi)
    const C = COLORS[colorIdx % COLORS.length];
    const g = ctx.createRadialGradient(x-r*.3,y-r*.3,r*.02,x,y,r);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.2,C.shine);g.addColorStop(0.55,C.a);g.addColorStop(1,C.b);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  }

  // Ortak: şeffaf cam parlaması (tüm toplar)
  ctx.restore();
  ctx.save();
  const hg = ctx.createRadialGradient(x-r*.28,y-r*.32,0,x-r*.1,y-r*.12,r*.72);
  hg.addColorStop(0,'rgba(255,255,255,0.80)');
  hg.addColorStop(0.4,'rgba(255,255,255,0.18)');
  hg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
  // Speküler nokta
  ctx.beginPath();ctx.arc(x-r*.32,y-r*.30,r*.20,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.65)';ctx.fill();
  ctx.restore();
}

function drawBallAt(x,y,colorIdx,radius,special=null) {
  const c=COLORS[colorIdx];
  // BallBuff varsa glow rengi override
  const activeBuff = G && G.ballBuff && G.ballBuff.turnsLeft > 0 ? BALL_TYPES[G.ballBuff.type] : null;
  ctx.save();
  if(special==='bomb')          {ctx.shadowColor='#ff6600';ctx.shadowBlur=14;}
  else if(special==='lightning'){ctx.shadowColor='#ffd700';ctx.shadowBlur=14;}
  else if(special==='fireball') {ctx.shadowColor='#ff1133';ctx.shadowBlur=16;}
  else if(special==='crystal')  {ctx.shadowColor='#88eeff';ctx.shadowBlur=18;}
  else if(special==='ice')      {ctx.shadowColor='#aaddff';ctx.shadowBlur=16;}
  else if(special==='giant')    {ctx.shadowColor='#ffaa44';ctx.shadowBlur=20;}
  else if(activeBuff)           {ctx.shadowColor=activeBuff.glow; ctx.shadowBlur=16+Math.sin(Date.now()*0.008)*4;}
  else                          {ctx.shadowColor=c.a;     ctx.shadowBlur=10;}

  // Special powerup topları — mevcut çizim
  if(special==='bomb'||special==='lightning'||special==='fireball'||special==='crystal'||special==='ice'||special==='giant') {
    const g=ctx.createRadialGradient(x-radius*.3,y-radius*.35,radius*.02,x,y,radius);
    if(special==='bomb')      {g.addColorStop(0,'#ffe066');g.addColorStop(0.4,'#ff8800');g.addColorStop(0.8,'#cc3300');g.addColorStop(1,'#660000');}
    else if(special==='lightning'){g.addColorStop(0,'#ffffff');g.addColorStop(0.3,'#ffff88');g.addColorStop(0.7,'#ffcc00');g.addColorStop(1,'#886600');}
    else if(special==='fireball'){g.addColorStop(0,'#ffeeaa');g.addColorStop(0.35,'#ff4400');g.addColorStop(0.75,'#cc0022');g.addColorStop(1,'#550000');}
    else if(special==='crystal'){g.addColorStop(0,'#ffffff');g.addColorStop(0.2,'#ccffff');g.addColorStop(0.55,'#44ccee');g.addColorStop(1,'#006688');}
    else if(special==='ice')  {g.addColorStop(0,'#eef8ff');g.addColorStop(0.3,'#aaddff');g.addColorStop(0.7,'#4488cc');g.addColorStop(1,'#112244');}
    else if(special==='giant'){g.addColorStop(0,'#fffaee');g.addColorStop(0.25,'#ffcc44');g.addColorStop(0.6,'#ff8800');g.addColorStop(1,'#883300');}
    ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    const hg=ctx.createRadialGradient(x-radius*.28,y-radius*.32,0,x-radius*.1,y-radius*.1,radius*.72);
    hg.addColorStop(0,'rgba(255,255,255,0.85)');hg.addColorStop(0.45,'rgba(255,255,255,0.18)');hg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
    ctx.beginPath();ctx.arc(x-radius*.32,y-radius*.30,radius*.22,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.70)';ctx.fill();
    // Emoji overlay for powerups
    ctx.shadowBlur=0;
    ctx.font=`${Math.floor(radius*1.1)}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(special==='bomb'?'💣':special==='lightning'?'⚡':special==='fireball'?'🔥':special==='crystal'?'💎':special==='ice'?'🧊':'🌍',x,y+1);
  } else {
    // Skin sistemi ile çiz
    const activeSkinId = SAVE ? (SAVE.ballSkin||'classic') : 'classic';
    drawBallSkin(activeSkinId, x, y, radius, colorIdx);
  }
  ctx.restore();
}

function drawTrails() {
  for(const b of G.activeBalls) {
    if(b.done) continue;
    for(let i=0;i<b.trail.length;i++) {
      const t=b.trail[i], a=(i/b.trail.length)*0.38*(t.life/9);
      ctx.save();ctx.globalAlpha=a;
      const rad=BALL_R*(0.3+(i/b.trail.length)*0.7);
      ctx.beginPath();ctx.arc(t.x,t.y,rad,0,Math.PI*2);
      if(b.special==='fireball') {
        const g=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,rad);
        g.addColorStop(0,'#ffff66');g.addColorStop(0.5,'#ff3d5a');g.addColorStop(1,'#000000');
        ctx.fillStyle=g;
      } else {
        ctx.fillStyle=b.special==='bomb'?'#ff6600':b.special==='lightning'?'#ffd700':COLORS[b.color].a;
      }
      ctx.fill();ctx.restore();
    }
  }
}

function drawAimLine() {
  if(G.aimAngle===null) return;
  const pu=G.activePowerup!==null?G.powerupSlots[G.activePowerup]:null;
  const special=pu?['bomb','lightning','fireball','multi'][pu.type]:null;
  const lineColor=special==='bomb'?'#ff9800':special==='lightning'?'#ffd700':special==='fireball'?'#ff3d5a':COLORS[G.ballColor].a;
  ctx.save();ctx.setLineDash([7,10]);ctx.lineWidth=2.5;ctx.globalAlpha=0.5;ctx.strokeStyle=lineColor;
  let x=G.launchX,y=launchY(),vx=Math.cos(G.aimAngle),vy=Math.sin(G.aimAngle);
  ctx.beginPath();ctx.moveTo(x,y);
  for(let i=0;i<240;i++) {
    x+=vx*7;y+=vy*7;
    if(x-BALL_R<0){x=BALL_R;vx=Math.abs(vx);}
    if(x+BALL_R>W){x=W-BALL_R;vx=-Math.abs(vx);}
    if(y-BALL_R<TOP_H){y=TOP_H+BALL_R;vy=Math.abs(vy);}
    ctx.lineTo(x,y);
    if(y>=launchY()) break;
    let hit=false;
    for(const bl of G.grid){if(bl.hp<=0)continue;if(x+BALL_R>bl.x&&x-BALL_R<bl.x+blW(bl)&&y+BALL_R>bl.y&&y-BALL_R<bl.y+BS){hit=true;break;}}
    if(hit) break;
  }
  ctx.stroke();ctx.restore();
}

function drawParticles() {
  // Renk gruplarına göre batch — save/restore & shadowBlur per-particle yok
  const byColor = {};
  for(const p of G.particles) {
    if(!byColor[p.color]) byColor[p.color]=[];
    byColor[p.color].push(p);
  }
  for(const [color, list] of Object.entries(byColor)) {
    ctx.save(); ctx.fillStyle=color;
    for(const p of list) {
      const a=p.life/p.maxLife;
      ctx.globalAlpha=a;
      ctx.beginPath();
      ctx.arc(p.x,p.y,Math.max(0.5,p.size*a),0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawFloaters() {
  for(const f of G.floaters) {
    ctx.save();ctx.globalAlpha=f.life/f.maxLife;
    ctx.fillStyle=f.color;ctx.font=`bold ${Math.min(15,BS*0.27)}px Arial`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=f.color;ctx.shadowBlur=10;
    ctx.fillText(f.text,f.x,f.y);ctx.restore();
  }
}

const PU_SLOT_Y = () => H - BOT_H + BOT_H * 0.46;

// Skill açıklamaları (kısa, net)
const PU_DESC = [
  '3×3 patlama',   // Bomba
  'Tüm sırayı vur',// Şimşek
  'Delerek geçer', // Ateş
  '2× top ateşle', // Çoklu

  'Bölgeyi dondur',// Buz

function drawPowerupBar() {
  const slotY = PU_SLOT_Y();
  for(let i=0;i<2;i++) {
    const sx=puSlotX(i), pu=G.powerupSlots[i], isActive=G.activePowerup===i;
    const R = PU_SLOT_R * (isActive ? 1.18 : 1);
    ctx.save();

    if(pu) {
      // ── Dolu slot ──────────────────────────────────────────────
      // Dış glow
      ctx.shadowColor = PU_COLOR[pu.type];
      ctx.shadowBlur  = isActive ? 26 : 10;

      // Daire arka planı
      ctx.beginPath(); ctx.arc(sx, slotY, R, 0, Math.PI*2);
      const g = ctx.createRadialGradient(sx-R*0.3, slotY-R*0.3, 1, sx, slotY, R);
      if(isActive) {
        g.addColorStop(0, PU_COLOR[pu.type]+'cc');
        g.addColorStop(1, 'rgba(0,0,0,0.88)');
      } else {
        g.addColorStop(0, 'rgba(50,50,90,0.95)');
        g.addColorStop(1, 'rgba(10,10,28,0.98)');
      }
      ctx.fillStyle=g; ctx.fill();

      // Kenarlık
      ctx.strokeStyle = isActive ? PU_COLOR[pu.type] : 'rgba(200,200,255,0.30)';
      ctx.lineWidth   = isActive ? 2.5 : 1.5; ctx.stroke();
      ctx.shadowBlur  = 0;

      // Büyük emoji
      ctx.font = `${Math.round(R*1.15)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(PU_EMOJI[pu.type], sx, slotY);

      // Sayı badge — slot doluysa "1" göster (kırmızı daire, beyaz rakam)
      {
        const badgeR = Math.max(7, R*0.35);
        const bx = sx + R*0.65, bby = slotY - R*0.65;
        ctx.beginPath(); ctx.arc(bx, bby, badgeR, 0, Math.PI*2);
        ctx.fillStyle = '#ff2244'; ctx.fill();
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.round(badgeR*1.3)}px Arial`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('1', bx, bby+0.5);
      }

      // Skill adı — altında, net okunabilir
      ctx.font = `bold ${Math.min(11,W*0.027)}px Arial`;
      ctx.fillStyle = isActive ? PU_COLOR[pu.type] : 'rgba(220,230,255,0.75)';
      ctx.textBaseline='top';
      if(isActive){ ctx.shadowColor=PU_COLOR[pu.type]; ctx.shadowBlur=7; }
      ctx.fillText(PU_LABEL[pu.type], sx, slotY+R+3);

      // Açıklama metni
      ctx.shadowBlur=0;
      ctx.font=`${Math.min(9,W*0.022)}px Arial`;
      ctx.fillStyle='rgba(170,185,220,0.55)';
      ctx.fillText(PU_DESC[pu.type], sx, slotY+R+16);

      // Yeni satın alındıysa "👆 AKTİF ET" pulsing etiketi
      if(!isActive && G.puActivateFlash[i] > 0) {
        const flashAlpha = Math.min(1, G.puActivateFlash[i] / 30) * (0.6 + 0.4 * Math.sin(frame * 0.2));
        ctx.globalAlpha = flashAlpha;
        ctx.font = `bold ${Math.min(12, W*0.03)}px Arial`;
        ctx.fillStyle = '#ffd700';
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 10;
        ctx.textBaseline = 'bottom';
        ctx.fillText('👆 AKTİF ET', sx, slotY - R - 4);
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }

      // Aktifse üstte belirgin "◀ ATEŞLE!" etiketi
      if(isActive) {
        const pulse = 0.7+0.3*Math.sin(frame*0.18);
        ctx.globalAlpha = pulse;
        ctx.shadowColor=PU_COLOR[pu.type]; ctx.shadowBlur=12;
        ctx.fillStyle=PU_COLOR[pu.type];
        ctx.font=`bold ${Math.min(11,W*0.027)}px Arial`;
        ctx.textBaseline='bottom';
        ctx.fillText('▼ ATEŞLE!', sx, slotY-R-3);
        ctx.globalAlpha=1; ctx.shadowBlur=0;
      }
    } else {
      // ── Boş slot — önerilen güç-up ile renkli buton ──────────────
      // Sıradaki öneri: slot 0 → Bomba (ucuz), slot 1 → Ateş Topu
      const suggest = i === 0
        ? {emoji:'💣', cost:15, color:'#ff9800', label:'Bomba'}
        : {emoji:'🔥', cost:20, color:'#ff3d5a', label:'Ateş'};
      const glowPulse = 0.3 + 0.15 * Math.sin(frame * 0.1 + i * 1.5);

      ctx.globalAlpha = 0.65;
      // Renkli kenarlık glow
      ctx.shadowColor = suggest.color;
      ctx.shadowBlur = 8 + 4 * Math.sin(frame * 0.08);
      ctx.beginPath(); ctx.arc(sx, slotY, PU_SLOT_R, 0, Math.PI*2);
      ctx.fillStyle='rgba(30,30,60,0.85)'; ctx.fill();
      ctx.strokeStyle = suggest.color + '88';
      ctx.lineWidth = 2; ctx.stroke();
      ctx.shadowBlur = 0;

      // Emoji ikon
      ctx.font=`${Math.round(PU_SLOT_R*0.85)}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(suggest.emoji, sx, slotY - 3);

      // Fiyat etiketi (altın)
      ctx.font=`bold ${Math.min(11,W*0.028)}px Arial`;
      ctx.fillStyle = suggest.color;
      ctx.fillText(suggest.cost+'g', sx, slotY + PU_SLOT_R * 0.65);

      // Alt metin
      ctx.globalAlpha = 0.7;
      ctx.font=`bold ${Math.min(10,W*0.025)}px Arial`;
      ctx.fillStyle='#ddeeff';
      ctx.textBaseline='top';
      ctx.fillText('🏪 ' + suggest.label, sx, slotY+PU_SLOT_R+3);
      ctx.globalAlpha=1;
    }
    ctx.restore();
  }
}
